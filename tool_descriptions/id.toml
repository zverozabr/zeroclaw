# Indonesian tool descriptions (Deskripsi alat bahasa Indonesia)
#
# Setiap kunci di bawah [tools] sesuai dengan nilai kembalian name() alat.
# Nilai adalah deskripsi yang dapat dibaca manusia yang ditampilkan di system prompt.
# Kunci yang tidak ada akan menggunakan deskripsi bahasa Inggris (en.toml) sebagai cadangan.

[tools]
backup = "Membuat, melihat daftar, memverifikasi, dan memulihkan cadangan ruang kerja"
browser = "Otomatisasi web/browser dengan backend yang dapat ditukar (agent-browser, rust-native, computer_use). Mendukung aksi DOM serta aksi opsional tingkat OS (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) melalui computer-use sidecar. Gunakan 'snapshot' untuk memetakan elemen interaktif ke referensi (@e1, @e2). Menerapkan browser.allowed_domains untuk aksi open."
browser_delegate = "Mendelegasikan tugas berbasis browser ke CLI berkemampuan browser untuk berinteraksi dengan aplikasi web seperti Teams, Outlook, Jira, Confluence"
browser_open = "Membuka URL HTTPS yang disetujui di browser sistem. Batasan keamanan: hanya domain yang ada di allowlist, tidak ada host lokal/privat, tidak ada scraping."
cloud_ops = "Alat konsultasi transformasi cloud. Menganalisis rencana IaC, menilai jalur migrasi, meninjau biaya, dan memeriksa arsitektur berdasarkan pilar Well-Architected Framework. Hanya-baca: tidak membuat atau mengubah sumber daya cloud."
cloud_patterns = "Pustaka pola cloud. Berdasarkan deskripsi beban kerja, menyarankan pola arsitektur cloud-native yang berlaku (kontainerisasi, serverless, modernisasi database, dll.)."
composio = "Menjalankan aksi pada 1000+ aplikasi melalui Composio (Gmail, Notion, GitHub, Slack, dll.). Gunakan action='list' untuk melihat aksi yang tersedia (termasuk nama parameter). action='execute' dengan action_name/tool_slug dan params untuk menjalankan aksi. Jika tidak yakin dengan parameter yang tepat, kirim 'text' dengan deskripsi dalam bahasa alami (Composio akan menyelesaikan parameter yang benar melalui NLP). action='list_accounts' atau action='connected_accounts' untuk melihat akun yang terhubung via OAuth. action='connect' dengan app/auth_config_id untuk mendapatkan URL OAuth. connected_account_id diselesaikan secara otomatis jika tidak disertakan."
content_search = "Mencari konten file berdasarkan pola regex dalam ruang kerja. Mendukung ripgrep (rg) dengan cadangan grep. Mode output: 'content' (baris yang cocok dengan konteks), 'files_with_matches' (hanya jalur file), 'count' (jumlah kecocokan per file). Contoh: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Membuat tugas terjadwal cron (shell atau agent) dengan jadwal cron/at/every. Gunakan job_type='agent' dengan prompt untuk menjalankan agen AI sesuai jadwal. Untuk mengirim output ke kanal (Discord, Telegram, Slack, Mattermost, Matrix), atur delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Ini adalah alat yang direkomendasikan untuk mengirim pesan terjadwal/tertunda kepada pengguna melalui kanal."""
cron_list = "Melihat daftar semua tugas cron yang terjadwal"
cron_remove = "Menghapus tugas cron berdasarkan ID"
cron_run = "Menjalankan paksa tugas cron secara langsung dan mencatat riwayat eksekusi"
cron_runs = "Melihat riwayat eksekusi terbaru tugas cron"
cron_update = "Memperbarui tugas cron yang ada (jadwal, perintah, prompt, aktif, pengiriman, model, dll.)"
data_management = "Retensi data ruang kerja, pembersihan, dan statistik penyimpanan"
delegate = "Mendelegasikan subtugas ke agen khusus. Gunakan ketika: tugas mendapat manfaat dari model yang berbeda (mis. ringkasan cepat, penalaran mendalam, pembuatan kode). Sub-agen menjalankan satu prompt secara default; dengan agentic=true dapat melakukan iterasi dengan loop pemanggilan alat yang difilter."
file_edit = "Mengedit file dengan mengganti kecocokan string yang tepat dengan konten baru"
file_read = "Membaca konten file dengan nomor baris. Mendukung pembacaan parsial melalui offset dan limit. Mengekstrak teks dari PDF; file biner lainnya dibaca dengan konversi UTF-8 lossy."
file_write = "Menulis konten ke file di ruang kerja"
git_operations = "Menjalankan operasi Git terstruktur (status, diff, log, branch, commit, add, checkout, stash). Menyediakan output JSON yang diparsing dan terintegrasi dengan kebijakan keamanan untuk kontrol otonomi."
glob_search = "Mencari file yang cocok dengan pola glob dalam ruang kerja. Mengembalikan daftar jalur file yang diurutkan relatif terhadap root ruang kerja. Contoh: '**/*.rs' (semua file Rust), 'src/**/mod.rs' (semua mod.rs di src)."
google_workspace = "Berinteraksi dengan layanan Google Workspace (Drive, Gmail, Calendar, Sheets, Docs, dll.) melalui gws CLI. Memerlukan gws yang terinstal dan terautentikasi."
hardware_board_info = "Mengembalikan informasi lengkap papan (chip, arsitektur, peta memori) untuk perangkat keras yang terhubung. Gunakan ketika: pengguna bertanya tentang info papan, perangkat keras yang terhubung, info chip, atau peta memori."
hardware_memory_map = "Mengembalikan peta memori (rentang alamat Flash dan RAM) untuk perangkat keras yang terhubung. Gunakan ketika: pengguna bertanya tentang alamat memori, ruang alamat, atau alamat yang dapat dibaca. Mengembalikan rentang Flash/RAM dari datasheet."
hardware_memory_read = "Membaca nilai memori/register aktual dari Nucleo melalui USB. Gunakan ketika: pengguna meminta membaca nilai register, membaca memori di alamat tertentu, dump memori, dll. Mengembalikan hex dump. Memerlukan Nucleo yang terhubung melalui USB dan fitur probe. Parameter: address (hex, mis. 0x20000000 untuk awal RAM), length (byte, default 128)."
http_request = "Mengirim permintaan HTTP ke API eksternal. Mendukung metode GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Batasan keamanan: hanya domain yang ada di allowlist, tidak ada host lokal/privat, batas waktu dan ukuran respons yang dapat dikonfigurasi."
image_info = "Membaca metadata file gambar (format, dimensi, ukuran) dan secara opsional mengembalikan data yang dikodekan base64."
jira = "Berinteraksi dengan Jira: mengambil tiket dengan tingkat detail yang dapat dikonfigurasi, mencari isu dengan JQL, dan menambahkan komentar dengan dukungan mention dan pemformatan."
knowledge = "Mengelola graf pengetahuan keputusan arsitektur, pola solusi, pelajaran yang dipetik, dan pakar. Aksi: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Mengelola LinkedIn: membuat postingan, melihat daftar postingan, berkomentar, bereaksi, menghapus postingan, melihat keterlibatan, mendapatkan info profil, dan membaca strategi konten yang dikonfigurasi. Memerlukan kredensial LINKEDIN_* di file .env."
discord_search = "Mencari riwayat pesan Discord yang tersimpan di discord.db. Gunakan untuk menemukan pesan lampau, meringkas aktivitas kanal, atau mencari apa yang dikatakan pengguna. Mendukung pencarian kata kunci dan filter opsional: channel_id, since, until."
memory_forget = "Menghapus memori berdasarkan kunci. Gunakan untuk menghapus fakta yang sudah usang atau data sensitif. Mengembalikan apakah memori ditemukan dan dihapus."
memory_recall = "Mencari fakta, preferensi, atau konteks yang relevan di memori jangka panjang. Mengembalikan hasil berskor yang diurutkan berdasarkan relevansi."
memory_store = "Menyimpan fakta, preferensi, atau catatan di memori jangka panjang. Gunakan kategori 'core' untuk fakta permanen, 'daily' untuk catatan sesi, 'conversation' untuk konteks obrolan, atau nama kategori kustom."
microsoft365 = "Integrasi Microsoft 365: mengelola email Outlook, pesan Teams, acara Kalender, file OneDrive, dan pencarian SharePoint melalui Microsoft Graph API"
model_routing_config = "Mengelola pengaturan model default, rute penyedia/model berbasis skenario, aturan klasifikasi, dan profil sub-agen yang didelegasikan"
notion = "Berinteraksi dengan Notion: melakukan kueri database, membaca/membuat/memperbarui halaman, dan mencari di ruang kerja."
pdf_read = "Mengekstrak teks biasa dari file PDF di ruang kerja. Mengembalikan semua teks yang dapat dibaca. PDF yang hanya berisi gambar atau PDF terenkripsi mengembalikan hasil kosong. Memerlukan fitur build 'rag-pdf'."
project_intel = "Intelijen pengiriman proyek: menghasilkan laporan status, mendeteksi risiko, menyusun pembaruan klien, meringkas sprint, dan memperkirakan upaya. Alat analisis hanya-baca."
proxy_config = "Mengelola pengaturan proxy ZeroClaw (cakupan: environment | zeroclaw | services), termasuk penerapan lingkungan runtime dan proses"
pushover = "Mengirim notifikasi Pushover ke perangkat Anda. Memerlukan PUSHOVER_TOKEN dan PUSHOVER_USER_KEY di file .env."
schedule = """Mengelola tugas terjadwal khusus shell. Aksi: create/add/once/list/get/cancel/remove/pause/resume. PERINGATAN: Alat ini membuat tugas shell yang outputnya hanya dicatat dalam log dan TIDAK dikirim ke kanal manapun. Untuk mengirim pesan terjadwal ke Discord/Telegram/Slack/Matrix, gunakan alat cron_add dengan job_type='agent' dan konfigurasi pengiriman seperti {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Mengambil tangkapan layar dari layar saat ini. Mengembalikan jalur file dan data PNG yang dikodekan base64."
security_ops = "Alat operasi keamanan untuk layanan keamanan siber terkelola. Aksi: triage_alert (mengklasifikasi/memprioritaskan peringatan), run_playbook (menjalankan langkah respons insiden), parse_vulnerability (mengurai hasil pemindaian), generate_report (membuat laporan postur keamanan), list_playbooks (melihat daftar playbook yang tersedia), alert_stats (meringkas metrik peringatan)."
shell = "Menjalankan perintah shell di direktori ruang kerja"
sop_advance = "Melaporkan hasil langkah SOP saat ini dan melanjutkan ke langkah berikutnya. Berikan run_id, apakah langkah berhasil atau gagal, dan ringkasan output singkat."
sop_approve = "Menyetujui langkah SOP yang tertunda dan menunggu persetujuan operator. Mengembalikan instruksi langkah yang akan dijalankan. Gunakan sop_status untuk melihat eksekusi mana yang menunggu."
sop_execute = "Memicu Standard Operating Procedure (SOP) secara manual berdasarkan nama. Mengembalikan ID eksekusi dan instruksi langkah pertama. Gunakan sop_list untuk melihat SOP yang tersedia."
sop_list = "Melihat daftar semua Standard Operating Procedure (SOP) yang dimuat beserta trigger, prioritas, jumlah langkah, dan jumlah eksekusi aktif. Filter opsional berdasarkan nama atau prioritas."
sop_status = "Mengkueri status eksekusi SOP. Berikan run_id untuk eksekusi tertentu, atau sop_name untuk melihat daftar eksekusi SOP tersebut. Tanpa argumen, menampilkan semua eksekusi aktif."
swarm = "Mengorkestrasi sekumpulan agen untuk menangani tugas secara kolaboratif. Mendukung strategi sekuensial (pipeline), paralel (fan-out/fan-in), dan router (dipilih LLM)."
tool_search = """Mengambil definisi skema lengkap untuk alat MCP yang ditangguhkan agar dapat dipanggil. Gunakan "select:name1,name2" untuk pencocokan tepat atau kata kunci untuk mencari."""
web_fetch = "Mengambil halaman web dan mengembalikan kontennya sebagai teks biasa yang bersih. Halaman HTML secara otomatis dikonversi ke teks yang dapat dibaca. Respons JSON dan teks biasa dikembalikan apa adanya. Hanya permintaan GET; mengikuti redirect. Keamanan: hanya domain yang ada di allowlist, tidak ada host lokal/privat."
web_search_tool = "Mencari informasi di web. Mengembalikan hasil pencarian yang relevan dengan judul, URL, dan deskripsi. Gunakan untuk menemukan informasi terkini, berita, atau topik penelitian."
workspace = "Mengelola ruang kerja multi-klien. Subperintah: list, switch, create, info, export. Setiap ruang kerja menyediakan memori, audit, rahasia, dan batasan alat yang terisolasi."
weather = "Mendapatkan kondisi cuaca saat ini dan prakiraan untuk lokasi manapun di seluruh dunia. Mendukung nama kota (dalam bahasa atau aksara apapun), kode bandara IATA (mis. 'CGK'), koordinat GPS (mis. '-6.2,106.8'), kode pos, dan geolokasi berbasis domain. Mengembalikan suhu, suhu terasa, kelembapan, kecepatan/arah angin, curah hujan, jarak pandang, tekanan, indeks UV, dan tutupan awan. Prakiraan opsional 0–3 hari dengan rincian per jam. Default satuan metrik (°C, km/jam, mm), dapat diatur ke imperial (°F, mph, inci) per permintaan. Tidak memerlukan API key."

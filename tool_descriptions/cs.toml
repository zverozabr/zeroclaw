# Czech tool descriptions (České popisy nástrojů)
#
# Každý klíč v sekci [tools] odpovídá návratové hodnotě name() nástroje.
# Hodnoty jsou popisy čitelné pro člověka, zobrazované v systémových výzvách.
# Chybějící klíče se vrátí k anglickým popisům (en.toml).

[tools]
backup = "Vytváření, výpis, ověření a obnovení záloh pracovního prostoru"
browser = "Automatizace webu/prohlížeče s vyměnitelnými backendy (agent-browser, rust-native, computer_use). Podporuje akce DOM a volitelné akce na úrovni OS (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) prostřednictvím computer-use sidecar. Použijte 'snapshot' pro mapování interaktivních prvků na reference (@e1, @e2). Vynucuje browser.allowed_domains pro akce open."
browser_delegate = "Delegování úloh založených na prohlížeči na CLI s podporou prohlížeče pro interakci s webovými aplikacemi jako Teams, Outlook, Jira, Confluence"
browser_open = "Otevření schválené HTTPS URL v systémovém prohlížeči. Bezpečnostní omezení: pouze povolené domény, žádní lokální/soukromí hostitelé, žádný scraping."
cloud_ops = "Poradenský nástroj pro cloudovou transformaci. Analyzuje plány IaC, hodnotí cesty migrace, kontroluje náklady a ověřuje architekturu podle pilířů Well-Architected Framework. Pouze čtení: nevytváří ani nemodifikuje cloudové zdroje."
cloud_patterns = "Knihovna cloudových vzorů. Na základě popisu úlohy navrhuje vhodné cloud-native architektonické vzory (kontejnerizace, serverless, modernizace databáze atd.)."
composio = "Provádění akcí na 1000+ aplikacích přes Composio (Gmail, Notion, GitHub, Slack atd.). Použijte action='list' pro zobrazení dostupných akcí (včetně názvů parametrů). action='execute' s action_name/tool_slug a params pro spuštění akce. Pokud si nejste jisti přesnými parametry, předejte 'text' s popisem v přirozeném jazyce (Composio vyřeší správné parametry přes NLP). action='list_accounts' nebo action='connected_accounts' pro výpis OAuth připojených účtů. action='connect' s app/auth_config_id pro získání OAuth URL. connected_account_id se automaticky vyřeší, pokud je vynechán."
content_search = "Vyhledávání obsahu souborů pomocí regex vzoru v pracovním prostoru. Podporuje ripgrep (rg) s fallbackem na grep. Režimy výstupu: 'content' (odpovídající řádky s kontextem), 'files_with_matches' (pouze cesty k souborům), 'count' (počty shod na soubor). Příklad: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Vytvoření naplánované úlohy cron (shell nebo agent) s rozvrhy cron/at/every. Použijte job_type='agent' s promptem pro spuštění AI agenta podle rozvrhu. Pro doručení výstupu do kanálu (Discord, Telegram, Slack, Mattermost, Matrix) nastavte delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Toto je preferovaný nástroj pro odesílání naplánovaných/zpožděných zpráv uživatelům přes kanály."""
cron_list = "Výpis všech naplánovaných úloh cron"
cron_remove = "Odebrání úlohy cron podle ID"
cron_run = "Okamžité vynucené spuštění úlohy cron a záznam historie běhu"
cron_runs = "Výpis nedávné historie běhů úlohy cron"
cron_update = "Úprava existující úlohy cron (rozvrh, příkaz, prompt, povolení, doručení, model atd.)"
data_management = "Retence dat pracovního prostoru, čištění a statistiky úložiště"
delegate = "Delegování dílčí úlohy na specializovaného agenta. Použijte, když: úloha těží z jiného modelu (např. rychlé shrnutí, hluboké uvažování, generování kódu). Sub-agent ve výchozím nastavení zpracuje jeden prompt; s agentic=true může iterovat pomocí filtrované smyčky volání nástrojů."
file_edit = "Úprava souboru nahrazením přesné shody řetězce novým obsahem"
file_read = "Čtení obsahu souboru s čísly řádků. Podporuje částečné čtení pomocí offset a limit. Extrahuje text z PDF; ostatní binární soubory jsou čteny se ztrátovou konverzí UTF-8."
file_write = "Zápis obsahu do souboru v pracovním prostoru"
git_operations = "Provádění strukturovaných Git operací (status, diff, log, branch, commit, add, checkout, stash). Poskytuje parsovaný JSON výstup a integruje se s bezpečnostní politikou pro řízení autonomie."
glob_search = "Vyhledávání souborů odpovídajících glob vzoru v pracovním prostoru. Vrací seřazený seznam cest k souborům relativně ke kořenu pracovního prostoru. Příklady: '**/*.rs' (všechny Rust soubory), 'src/**/mod.rs' (všechny mod.rs v src)."
google_workspace = "Interakce se službami Google Workspace (Drive, Gmail, Calendar, Sheets, Docs atd.) přes gws CLI. Vyžaduje nainstalovaný a ověřený gws."
hardware_board_info = "Vrátí kompletní informace o desce (čip, architektura, mapa paměti) pro připojený hardware. Použijte, když: uživatel se ptá na informace o desce, připojený hardware, informace o čipu nebo mapu paměti."
hardware_memory_map = "Vrátí mapu paměti (rozsahy adres Flash a RAM) pro připojený hardware. Použijte, když: uživatel se ptá na adresy paměti, adresní prostor nebo čitelné adresy. Vrací rozsahy Flash/RAM z datasheetů."
hardware_memory_read = "Čtení skutečných hodnot paměti/registrů z Nucleo přes USB. Použijte, když: uživatel požaduje čtení hodnot registrů, čtení paměti na adrese, výpis paměti apod. Vrací hex dump. Vyžaduje Nucleo připojené přes USB a funkci probe. Parametry: address (hex, např. 0x20000000 pro začátek RAM), length (bajty, výchozí 128)."
http_request = "Odesílání HTTP požadavků na externí API. Podporuje metody GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Bezpečnostní omezení: pouze povolené domény, žádní lokální/soukromí hostitelé, konfigurovatelný timeout a limity velikosti odpovědi."
image_info = "Čtení metadat obrazového souboru (formát, rozměry, velikost) a volitelné vrácení dat zakódovaných v base64."
jira = "Interakce s Jira: získávání tiketů s konfigurovatelnou úrovní detailů, vyhledávání issues pomocí JQL a přidávání komentářů s podporou zmínek a formátování."
knowledge = "Správa znalostního grafu architektonických rozhodnutí, vzorů řešení, získaných zkušeností a expertů. Akce: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Správa LinkedIn: vytváření příspěvků, výpis příspěvků, komentáře, reakce, mazání příspěvků, zobrazení zapojení, získání informací o profilu a čtení konfigurované obsahové strategie. Vyžaduje přihlašovací údaje LINKEDIN_* v souboru .env."
discord_search = "Vyhledávání v historii zpráv Discordu uložené v discord.db. Použijte pro nalezení minulých zpráv, shrnutí aktivity kanálu nebo vyhledání toho, co uživatelé řekli. Podporuje vyhledávání klíčových slov a volitelné filtry: channel_id, since, until."
memory_forget = "Odebrání vzpomínky podle klíče. Použijte pro smazání zastaralých faktů nebo citlivých dat. Vrací, zda byla vzpomínka nalezena a odebrána."
memory_recall = "Vyhledávání relevantních faktů, preferencí nebo kontextu v dlouhodobé paměti. Vrací ohodnocené výsledky seřazené podle relevance."
memory_store = "Uložení faktu, preference nebo poznámky do dlouhodobé paměti. Použijte kategorii 'core' pro trvalé fakty, 'daily' pro poznámky relace, 'conversation' pro kontext chatu nebo vlastní název kategorie."
microsoft365 = "Integrace Microsoft 365: správa pošty Outlook, zpráv Teams, událostí Kalendáře, souborů OneDrive a vyhledávání SharePoint přes Microsoft Graph API"
model_routing_config = "Správa výchozích nastavení modelu, směrování poskytovatelů/modelů na základě scénářů, klasifikačních pravidel a profilů delegovaných sub-agentů"
notion = "Interakce s Notion: dotazování databází, čtení/vytváření/aktualizace stránek a vyhledávání v pracovním prostoru."
pdf_read = "Extrakce prostého textu ze souboru PDF v pracovním prostoru. Vrací veškerý čitelný text. PDF obsahující pouze obrázky nebo šifrované PDF vrací prázdný výsledek. Vyžaduje build feature 'rag-pdf'."
project_intel = "Inteligence dodávky projektů: generování stavových reportů, detekce rizik, příprava aktualizací pro klienty, shrnutí sprintů a odhad náročnosti. Analytický nástroj pouze pro čtení."
proxy_config = "Správa nastavení proxy ZeroClaw (rozsah: environment | zeroclaw | services), včetně aplikace na runtime a procesní prostředí"
pushover = "Odeslání Pushover notifikace na vaše zařízení. Vyžaduje PUSHOVER_TOKEN a PUSHOVER_USER_KEY v souboru .env."
schedule = """Správa naplánovaných úloh pouze pro shell. Akce: create/add/once/list/get/cancel/remove/pause/resume. UPOZORNĚNÍ: Tento nástroj vytváří shell úlohy, jejichž výstup je pouze zaznamenáván do logu a NENÍ doručován do žádného kanálu. Pro odesílání naplánovaných zpráv na Discord/Telegram/Slack/Matrix použijte nástroj cron_add s job_type='agent' a konfigurací delivery jako {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Pořízení snímku obrazovky aktuální obrazovky. Vrací cestu k souboru a data PNG zakódovaná v base64."
security_ops = "Nástroj bezpečnostních operací pro řízené služby kybernetické bezpečnosti. Akce: triage_alert (klasifikace/prioritizace výstrah), run_playbook (provádění kroků reakce na incidenty), parse_vulnerability (parsování výsledků skenování), generate_report (vytváření reportů bezpečnostního stavu), list_playbooks (výpis dostupných playbooků), alert_stats (souhrn metrik výstrah)."
shell = "Spuštění příkazu shell v adresáři pracovního prostoru"
sop_advance = "Nahlášení výsledku aktuálního kroku SOP a přechod na další krok. Zadejte run_id, zda krok uspěl nebo selhal, a stručný souhrn výstupu."
sop_approve = "Schválení čekajícího kroku SOP, který čeká na schválení operátora. Vrací instrukci kroku k provedení. Použijte sop_status pro zobrazení čekajících běhů."
sop_execute = "Ruční spuštění standardního operačního postupu (SOP) podle názvu. Vrací ID běhu a instrukci prvního kroku. Použijte sop_list pro zobrazení dostupných SOP."
sop_list = "Výpis všech načtených standardních operačních postupů (SOP) s jejich triggery, prioritou, počtem kroků a počtem aktivních běhů. Volitelné filtrování podle názvu nebo priority."
sop_status = "Dotaz na stav provádění SOP. Zadejte run_id pro konkrétní běh nebo sop_name pro výpis běhů daného SOP. Bez argumentů zobrazí všechny aktivní běhy."
swarm = "Orchestrace skupiny agentů pro spolupráci na úloze. Podporuje sekvenční (pipeline), paralelní (fan-out/fan-in) a routerovou (LLM výběr) strategii."
tool_search = """Získání kompletních definic schémat pro odložené MCP nástroje, aby mohly být volány. Použijte "select:name1,name2" pro přesnou shodu nebo klíčová slova pro vyhledávání."""
web_fetch = "Načtení webové stránky a vrácení jejího obsahu jako čistého textu. HTML stránky jsou automaticky převedeny na čitelný text. JSON a odpovědi v prostém textu jsou vráceny tak, jak jsou. Pouze GET požadavky; následuje přesměrování. Bezpečnost: pouze povolené domény, žádní lokální/soukromí hostitelé."
web_search_tool = "Vyhledávání informací na webu. Vrací relevantní výsledky vyhledávání s titulky, URL a popisy. Použijte pro nalezení aktuálních informací, zpráv nebo výzkumných témat."
workspace = "Správa pracovních prostorů pro více klientů. Podpříkazy: list, switch, create, info, export. Každý pracovní prostor poskytuje izolovanou paměť, audit, tajemství a omezení nástrojů."
weather = "Získání aktuálních povětrnostních podmínek a předpovědi pro libovolné místo na světě. Podporuje názvy měst (v jakémkoli jazyce či písmu), IATA kódy letišť (např. 'PRG'), GPS souřadnice (např. '50.1,14.4'), PSČ a geolokaci na základě domény. Vrací teplotu, pocitovou teplotu, vlhkost, rychlost/směr větru, srážky, viditelnost, tlak, UV index a oblačnost. Volitelná předpověď na 0–3 dny s hodinovým rozpisem. Výchozí jednotky jsou metrické (°C, km/h, mm), lze nastavit na imperiální (°F, mph, palce) pro jednotlivý požadavek. Není vyžadován API klíč."

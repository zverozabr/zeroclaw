sop_execute = "สั่งรันขั้นตอนการปฏิบัติงานมาตรฐาน (SOP) ด้วยชื่อด้วยตนเอง ส่งกลับ run ID และคำสั่งขั้นตอนแรก ใช้ sop_list เพื่อดู SOP ที่มี"

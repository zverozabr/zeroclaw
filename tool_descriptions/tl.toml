# Tagalog tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Lumikha, maglista, mag-verify, at mag-restore ng mga backup ng workspace"
browser = "Web/browser automation na may mga pluggable backend (agent-browser, rust-native, computer_use). Sumusuporta ng mga DOM action kasama ang opsyonal na OS-level na mga aksyon (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) sa pamamagitan ng computer-use sidecar. Gamitin ang 'snapshot' para i-map ang mga interactive element sa ref (@e1, @e2). Ipinapatupad ang browser.allowed_domains para sa mga open action."
browser_delegate = "Mag-delegate ng mga browser-based na gawain sa isang browser-capable na CLI para makipag-ugnayan sa mga web application tulad ng Teams, Outlook, Jira, Confluence"
browser_open = "Buksan ang isang aprubadong HTTPS URL sa system browser. Mga security constraint: mga domain sa allowlist lamang, walang local/private host, walang scraping."
cloud_ops = "Tool para sa cloud transformation advisory. Nag-a-analyze ng mga IaC plan, nag-a-assess ng mga migration path, nagrereview ng gastos, at sinusuri ang arkitektura laban sa mga pillar ng Well-Architected Framework. Read-only: hindi lumilikha o nagbabago ng mga cloud resource."
cloud_patterns = "Cloud pattern library. Batay sa paglalarawan ng workload, nagmumungkahi ng mga naaangkop na cloud-native architectural pattern (containerization, serverless, database modernization, atbp.)."
composio = "Mag-execute ng mga aksyon sa higit 1000 app sa pamamagitan ng Composio (Gmail, Notion, GitHub, Slack, atbp.). Gamitin ang action='list' para makita ang mga available na aksyon (kasama ang mga pangalan ng parameter). action='execute' na may action_name/tool_slug at params para mag-run ng aksyon. Kung hindi sigurado sa eksaktong params, ipasa ang 'text' na may natural-language na paglalarawan (ireresolba ng Composio ang tamang mga parameter sa pamamagitan ng NLP). action='list_accounts' o action='connected_accounts' para maglista ng mga OAuth-connected account. action='connect' na may app/auth_config_id para makuha ang OAuth URL. Awtomatikong nireresolba ang connected_account_id kapag inalis."
content_search = "Maghanap ng mga nilalaman ng file gamit ang regex pattern sa loob ng workspace. Sumusuporta ng ripgrep (rg) na may grep fallback. Mga output mode: 'content' (mga tumutugmang linya na may konteksto), 'files_with_matches' (mga file path lamang), 'count' (bilang ng tugma bawat file). Halimbawa: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Lumikha ng isang naka-schedule na cron job (shell o agent) gamit ang cron/at/every schedule. Gamitin ang job_type='agent' na may prompt para patakbuhin ang AI agent ayon sa iskedyul. Para mag-deliver ng output sa isang channel (Discord, Telegram, Slack, Mattermost, Matrix), i-set ang delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Ito ang inirerekomendang tool para magpadala ng naka-schedule/delayed na mga mensahe sa mga user sa pamamagitan ng mga channel."""
cron_list = "Ilista ang lahat ng naka-schedule na cron job"
cron_remove = "Alisin ang isang cron job gamit ang ID"
cron_run = "Puwersahang patakbuhin agad ang isang cron job at itala ang run history"
cron_runs = "Ilista ang kamakailang run history ng isang cron job"
cron_update = "I-update ang isang umiiral na cron job (schedule, command, prompt, enabled, delivery, model, atbp.)"
data_management = "Pamamahala ng data retention, purge, at storage statistics ng workspace"
delegate = "Mag-delegate ng subtask sa isang specialized agent. Gamitin kapag: ang isang gawain ay makikinabang sa ibang modelo (hal. mabilis na pagbubuod, malalim na pangangatwiran, pagbuo ng code). Ang sub-agent ay nagpapatakbo ng isang prompt bilang default; sa agentic=true maaari itong mag-iterate gamit ang filtered tool-call loop."
file_edit = "Mag-edit ng file sa pamamagitan ng pagpapalit ng eksaktong tumutugmang string ng bagong nilalaman"
file_read = "Basahin ang mga nilalaman ng file na may mga numero ng linya. Sumusuporta ng partial na pagbabasa sa pamamagitan ng offset at limit. Nag-e-extract ng teksto mula sa PDF; ang ibang binary file ay binabasa gamit ang lossy UTF-8 conversion."
file_write = "Magsulat ng nilalaman sa isang file sa workspace"
git_operations = "Magsagawa ng mga structured na Git operation (status, diff, log, branch, commit, add, checkout, stash). Nagbibigay ng parsed JSON output at nag-i-integrate sa security policy para sa autonomy control."
glob_search = "Maghanap ng mga file na tumutugma sa isang glob pattern sa loob ng workspace. Nagbabalik ng sorted na listahan ng mga tumutugmang file path na relative sa workspace root. Mga halimbawa: '**/*.rs' (lahat ng Rust file), 'src/**/mod.rs' (lahat ng mod.rs sa src)."
google_workspace = "Makipag-ugnayan sa mga serbisyo ng Google Workspace (Drive, Gmail, Calendar, Sheets, Docs, atbp.) sa pamamagitan ng gws CLI. Kinakailangan na naka-install at naka-authenticate ang gws."
hardware_board_info = "Ibalik ang buong impormasyon ng board (chip, arkitektura, memory map) para sa nakakonektang hardware. Gamitin kapag: nagtatanong ang user tungkol sa 'board info', 'nakakonektang hardware', 'chip info', o 'memory map'."
hardware_memory_map = "Ibalik ang memory map (mga saklaw ng address ng flash at RAM) para sa nakakonektang hardware. Gamitin kapag: nagtatanong ang user tungkol sa 'upper at lower memory address', 'memory map', 'address space', o 'mga nababasang address'. Nagbabalik ng mga saklaw ng flash/RAM mula sa mga datasheet."
hardware_memory_read = "Magbasa ng aktwal na halaga ng memory/register mula sa Nucleo sa pamamagitan ng USB. Gamitin kapag: humihiling ang user na 'basahin ang mga halaga ng register', 'basahin ang memory sa address', 'memory dump', 'lower memory 0-126', o 'ibigay ang address at halaga'. Nagbabalik ng hex dump. Kinakailangan ang Nucleo na nakakonekta sa USB at probe feature. Mga parameter: address (hex, hal. 0x20000000 para sa simula ng RAM), length (bytes, default 128)."
http_request = "Magpadala ng mga HTTP request sa mga panlabas na API. Sumusuporta ng GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS na mga method. Mga security constraint: mga domain sa allowlist lamang, walang local/private host, nako-configure na timeout at limitasyon sa laki ng response."
image_info = "Basahin ang metadata ng image file (format, dimensyon, laki) at opsyonal na ibalik ang base64-encoded na data."
jira = "Makipag-ugnayan sa Jira: kumuha ng mga ticket na may nako-configure na antas ng detalye, maghanap ng mga issue gamit ang JQL, at magdagdag ng mga komento na may suporta sa mention at formatting."
knowledge = "Pamahalaan ang isang knowledge graph ng mga desisyon sa arkitektura, mga pattern ng solusyon, mga natutunan, at mga eksperto. Mga aksyon: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Pamahalaan ang LinkedIn: lumikha ng mga post, ilista ang iyong mga post, mag-komento, mag-react, mag-delete ng mga post, tingnan ang engagement, kumuha ng impormasyon ng profile, at basahin ang naka-configure na content strategy. Kinakailangan ang mga LINKEDIN_* credential sa .env file."
discord_search = "Maghanap sa Discord message history na naka-store sa discord.db. Gamitin para maghanap ng mga nakaraang mensahe, mag-summarize ng channel activity, o hanapin ang mga sinabi ng mga user. Sumusuporta ng keyword search at mga opsyonal na filter: channel_id, since, until."
memory_forget = "Alisin ang isang memory gamit ang key. Gamitin para mag-delete ng mga lipas na na katotohanan o sensitibong data. Ibinabalik kung natagpuan at naalis ang memory."
memory_recall = "Maghanap sa long-term memory ng mga kaugnay na katotohanan, kagustuhan, o konteksto. Nagbabalik ng mga scored na resulta na naka-rank ayon sa kaugnayan."
memory_store = "Mag-store ng isang katotohanan, kagustuhan, o tala sa long-term memory. Gamitin ang kategoryang 'core' para sa mga permanenteng katotohanan, 'daily' para sa mga session note, 'conversation' para sa chat context, o isang custom na pangalan ng kategorya."
microsoft365 = "Microsoft 365 integration: pamahalaan ang Outlook mail, Teams message, Calendar event, OneDrive file, at SharePoint search sa pamamagitan ng Microsoft Graph API"
model_routing_config = "Pamahalaan ang mga default na setting ng modelo, mga scenario-based na provider/model route, mga classification rule, at mga delegate sub-agent profile"
notion = "Makipag-ugnayan sa Notion: mag-query ng mga database, magbasa/lumikha/mag-update ng mga page, at maghanap sa workspace."
pdf_read = "Mag-extract ng plain text mula sa isang PDF file sa workspace. Ibinabalik ang lahat ng nababasang teksto. Ang mga image-only o encrypted na PDF ay nagbabalik ng walang laman na resulta. Kinakailangan ang 'rag-pdf' build feature."
project_intel = "Project delivery intelligence: gumawa ng mga status report, mag-detect ng mga panganib, mag-draft ng mga client update, mag-summarize ng mga sprint, at mag-estimate ng effort. Read-only na analysis tool."
proxy_config = "Pamahalaan ang mga setting ng ZeroClaw proxy (scope: environment | zeroclaw | services), kasama ang runtime at process env application"
pushover = "Magpadala ng Pushover notification sa iyong device. Kinakailangan ang PUSHOVER_TOKEN at PUSHOVER_USER_KEY sa .env file."
schedule = """Pamahalaan ang mga naka-schedule na shell-only na gawain. Mga aksyon: create/add/once/list/get/cancel/remove/pause/resume. BABALA: Ang tool na ito ay lumilikha ng mga shell job na ang output ay naka-log lamang, HINDI ipinapadala sa anumang channel. Para magpadala ng naka-schedule na mensahe sa Discord/Telegram/Slack/Matrix, gamitin ang cron_add tool na may job_type='agent' at delivery config tulad ng {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Mag-capture ng screenshot ng kasalukuyang screen. Ibinabalik ang file path at base64-encoded na PNG data."
security_ops = "Security operations tool para sa mga managed cybersecurity service. Mga aksyon: triage_alert (pag-classify/pag-prioritize ng mga alerto), run_playbook (pag-execute ng mga hakbang sa incident response), parse_vulnerability (pag-parse ng mga resulta ng scan), generate_report (paggawa ng mga security posture report), list_playbooks (paglista ng mga available na playbook), alert_stats (pagbubuod ng mga alert metric)."
shell = "Mag-execute ng shell command sa workspace directory"
sop_advance = "Mag-report ng resulta ng kasalukuyang hakbang ng SOP at mag-advance sa susunod na hakbang. Ibigay ang run_id, kung nagtagumpay o nabigo ang hakbang, at maikling buod ng output."
sop_approve = "Mag-approve ng isang pending na hakbang ng SOP na naghihintay ng operator approval. Ibinabalik ang instruksyon ng hakbang na isasagawa. Gamitin ang sop_status para makita kung aling mga run ang naghihintay."
sop_execute = "Manu-manong mag-trigger ng isang Standard Operating Procedure (SOP) gamit ang pangalan. Ibinabalik ang run ID at instruksyon ng unang hakbang. Gamitin ang sop_list para makita ang mga available na SOP."
sop_list = "Ilista ang lahat ng na-load na Standard Operating Procedure (SOP) kasama ang kanilang mga trigger, priyoridad, bilang ng mga hakbang, at bilang ng mga aktibong run. Opsyonal na i-filter ayon sa pangalan o priyoridad."
sop_status = "Mag-query ng SOP execution status. Ibigay ang run_id para sa isang partikular na run, o sop_name para ilista ang mga run para sa SOP na iyon. Walang argumento, ipinapakita ang lahat ng aktibong run."
swarm = "Mag-orchestrate ng isang swarm ng mga agent para sama-samang pangasiwaan ang isang gawain. Sumusuporta ng sequential (pipeline), parallel (fan-out/fan-in), at router (LLM-selected) na mga diskarte."
tool_search = """Kunin ang buong schema definition para sa mga deferred na MCP tool para magamit ang mga ito. Gamitin ang "select:name1,name2" para sa eksaktong tugma o mga keyword para maghanap."""
web_fetch = "Mag-fetch ng isang web page at ibalik ang nilalaman bilang malinis na plain text. Awtomatikong kino-convert ang mga HTML page sa nababasang teksto. Ang mga JSON at plain text na tugon ay ibinibigay nang walang pagbabago. GET request lamang; sumusunod sa mga redirect. Seguridad: mga domain sa allowlist lamang, walang local/private host."
web_search_tool = "Maghanap ng impormasyon sa web. Nagbabalik ng mga kaugnay na resulta ng paghahanap na may mga pamagat, URL, at paglalarawan. Gamitin para maghanap ng kasalukuyang impormasyon, balita, o mga paksa ng pananaliksik."
workspace = "Pamahalaan ang mga multi-client workspace. Mga subcommand: list, switch, create, info, export. Ang bawat workspace ay nagbibigay ng hiwalay na memory, audit, secret, at tool restriction."
weather = "Kumuha ng kasalukuyang kondisyon ng panahon at forecast para sa anumang lokasyon sa buong mundo. Sumusuporta ng mga pangalan ng lungsod (sa anumang wika o script), mga IATA airport code (hal. 'LAX'), mga GPS coordinate (hal. '51.5,-0.1'), mga postal/zip code, at domain-based na geolocation. Nagbabalik ng temperatura, nararamdamang temperatura, halumigmig, bilis/direksyon ng hangin, pag-ulan, visibility, presyon, UV index, at cloud cover. Opsyonal na 0-3 araw na forecast na may hourly breakdown. Ang mga yunit ay default na metric (°C, km/h, mm) ngunit maaaring itakda sa imperial (°F, mph, inches) bawat request. Hindi kinakailangan ang API key."

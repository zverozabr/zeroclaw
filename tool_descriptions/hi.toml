[tools]
backup = "वर्कस्पेस बैकअप बनाएँ, सूचीबद्ध करें, सत्यापित करें और पुनर्स्थापित करें"
browser = "प्लगेबल बैकएंड (agent-browser, rust-native, computer_use) के साथ वेब/browser ऑटोमेशन। DOM एक्शन और वैकल्पिक OS-स्तरीय एक्शन (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) को computer-use sidecar के माध्यम से सपोर्ट करता है। इंटरैक्टिव एलिमेंट को refs (@e1, @e2) से मैप करने के लिए 'snapshot' का उपयोग करें। open एक्शन के लिए browser.allowed_domains लागू करता है।"

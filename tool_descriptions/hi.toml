browser_open = "सिस्टम browser में एक स्वीकृत HTTPS URL खोलें। सुरक्षा प्रतिबंध: केवल अनुमति-सूची वाले डोमेन, कोई स्थानीय/निजी होस्ट नहीं, कोई स्क्रैपिंग नहीं।"
cloud_ops = "क्लाउड ट्रांसफ़ॉर्मेशन सलाहकार टूल। IaC योजनाओं का विश्लेषण करता है, माइग्रेशन पथों का आकलन करता है, लागत की समीक्षा करता है, और Well-Architected Framework स्तंभों के विरुद्ध आर्किटेक्चर की जाँच करता है। केवल रीड-ओनली: क्लाउड संसाधन बनाता या संशोधित नहीं करता।"
cloud_patterns = "क्लाउड पैटर्न लाइब्रेरी। वर्कलोड विवरण दिए जाने पर, लागू क्लाउड-नेटिव आर्किटेक्चरल पैटर्न सुझाता है (कंटेनराइज़ेशन, सर्वरलेस, डेटाबेस मॉडर्नाइज़ेशन, आदि)।"
composio = "Composio के माध्यम से 1000+ ऐप्स पर एक्शन निष्पादित करें (Gmail, Notion, GitHub, Slack, आदि)। उपलब्ध एक्शन देखने के लिए action='list' का उपयोग करें (पैरामीटर नाम शामिल हैं)। एक्शन चलाने के लिए action='execute' के साथ action_name/tool_slug और params दें। यदि सटीक params की जानकारी नहीं है, तो 'text' में प्राकृतिक भाषा विवरण दें (Composio NLP के माध्यम से सही पैरामीटर हल करेगा)। OAuth-कनेक्टेड अकाउंट सूचीबद्ध करने के लिए action='list_accounts' या action='connected_accounts'। OAuth URL प्राप्त करने के लिए action='connect' के साथ app/auth_config_id। connected_account_id छोड़ने पर स्वतः हल होता है।"

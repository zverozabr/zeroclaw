# Arabic tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "إنشاء وسرد والتحقق من واستعادة نسخ احتياطية لمساحة العمل"
browser = "أتمتة الويب/المتصفح مع واجهات خلفية قابلة للتبديل (agent-browser, rust-native, computer_use). يدعم إجراءات DOM بالإضافة إلى إجراءات اختيارية على مستوى نظام التشغيل (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) عبر مرافق computer-use. استخدم 'snapshot' لتعيين العناصر التفاعلية إلى مراجع (@e1, @e2). يفرض browser.allowed_domains لإجراءات open."
browser_delegate = "تفويض المهام المستندة إلى المتصفح إلى CLI قادر على التعامل مع المتصفح للتفاعل مع تطبيقات الويب مثل Teams وOutlook وJira وConfluence"
browser_open = "فتح عنوان HTTPS معتمد في متصفح النظام. قيود أمنية: نطاقات من قائمة السماح فقط، بدون مضيفين محليين/خاصين، بدون scraping."
cloud_ops = "أداة استشارية لتحول السحابة. تحلل خطط IaC، وتقيّم مسارات الترحيل، وتراجع التكاليف، وتتحقق من البنية المعمارية وفق ركائز Well-Architected Framework. للقراءة فقط: لا تنشئ أو تعدّل موارد سحابية."
cloud_patterns = "مكتبة أنماط سحابية. بناءً على وصف حمل العمل، تقترح أنماطاً معمارية cloud-native قابلة للتطبيق (حاويات، serverless، تحديث قواعد البيانات، إلخ)."
composio = "تنفيذ إجراءات على أكثر من 1000 تطبيق عبر Composio (Gmail, Notion, GitHub, Slack, إلخ). استخدم action='list' لعرض الإجراءات المتاحة (تتضمن أسماء المعاملات). action='execute' مع action_name/tool_slug وparams لتنفيذ إجراء. إذا لم تكن متأكداً من المعاملات الدقيقة، مرر 'text' مع وصف بلغة طبيعية لما تريده (Composio سيحل المعاملات الصحيحة عبر NLP). action='list_accounts' أو action='connected_accounts' لسرد حسابات OAuth المتصلة. action='connect' مع app/auth_config_id للحصول على رابط OAuth. يتم حل connected_account_id تلقائياً عند حذفه."
content_search = "البحث في محتويات الملفات بنمط regex داخل مساحة العمل. يدعم ripgrep (rg) مع احتياطي grep. أوضاع الإخراج: 'content' (سطور مطابقة مع سياق)، 'files_with_matches' (مسارات ملفات فقط)، 'count' (عدد المطابقات لكل ملف). مثال: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """إنشاء مهمة cron مجدولة (shell أو agent) بجداول cron/at/every. استخدم job_type='agent' مع prompt لتشغيل وكيل AI حسب الجدول. لتوصيل المخرجات إلى قناة (Discord, Telegram, Slack, Mattermost, Matrix)، عيّن delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. هذه هي الأداة المفضلة لإرسال رسائل مجدولة/مؤجلة للمستخدمين عبر القنوات."""
cron_list = "سرد جميع مهام cron المجدولة"
cron_remove = "إزالة مهمة cron بواسطة المعرّف"
cron_run = "فرض تشغيل فوري لمهمة cron وتسجيل سجل التشغيل"
cron_runs = "عرض سجل التشغيل الأخير لمهمة cron"
cron_update = "تحديث مهمة cron موجودة (schedule, command, prompt, enabled, delivery, model, إلخ)"
data_management = "الاحتفاظ ببيانات مساحة العمل، والتطهير، وإحصائيات التخزين"
delegate = "تفويض مهمة فرعية إلى وكيل متخصص. استخدم عندما: تستفيد مهمة من نموذج مختلف (مثل التلخيص السريع، الاستدلال العميق، توليد الكود). يُنفّذ الوكيل الفرعي prompt واحداً افتراضياً؛ مع agentic=true يمكنه التكرار عبر حلقة استدعاءات أدوات مفلترة."
file_edit = "تعديل ملف باستبدال مطابقة نصية دقيقة بمحتوى جديد"
file_read = "قراءة محتويات ملف مع أرقام الأسطر. يدعم القراءة الجزئية عبر offset وlimit. يستخرج النص من PDF؛ الملفات الثنائية الأخرى تُقرأ بتحويل UTF-8 مع فقدان."
file_write = "كتابة محتوى في ملف داخل مساحة العمل"
git_operations = "تنفيذ عمليات Git منظمة (status, diff, log, branch, commit, add, checkout, stash). يوفر مخرجات JSON منظمة ويتكامل مع سياسة الأمان لضوابط الاستقلالية."
glob_search = "البحث عن ملفات تطابق نمط glob داخل مساحة العمل. يُرجع قائمة مرتبة من مسارات الملفات نسبة إلى جذر مساحة العمل. أمثلة: '**/*.rs' (جميع ملفات Rust)، 'src/**/mod.rs' (جميع mod.rs في src)."
google_workspace = "التفاعل مع خدمات Google Workspace (Drive, Gmail, Calendar, Sheets, Docs, إلخ) عبر CLI gws. يتطلب تثبيت gws ومصادقته."
hardware_board_info = "إرجاع معلومات كاملة عن اللوحة (الشريحة، البنية، خريطة الذاكرة) للأجهزة المتصلة. استخدم عندما: يسأل المستخدم عن 'board info'، 'أي لوحة لدي'، 'الأجهزة المتصلة'، 'chip info'، 'أي أجهزة'، أو 'خريطة الذاكرة'."
hardware_memory_map = "إرجاع خريطة الذاكرة (نطاقات عناوين flash وRAM) للأجهزة المتصلة. استخدم عندما: يسأل المستخدم عن 'عناوين الذاكرة العليا والسفلى'، 'خريطة الذاكرة'، 'مساحة العناوين'، أو 'العناوين القابلة للقراءة'. يُرجع نطاقات flash/RAM من أوراق البيانات."
hardware_memory_read = "قراءة قيم الذاكرة/السجلات الفعلية من Nucleo عبر USB. استخدم عندما: يطلب المستخدم 'قراءة قيم السجلات'، 'قراءة الذاكرة عند العنوان'، 'تفريغ الذاكرة'، 'الذاكرة السفلى 0-126'، أو 'إعطاء العنوان والقيمة'. يُرجع تفريغاً سداسي عشري. يتطلب Nucleo متصلاً عبر USB وميزة probe. المعاملات: address (سداسي عشري، مثال 0x20000000 لبداية RAM)، length (بايت، الافتراضي 128)."
http_request = "إرسال طلبات HTTP إلى واجهات API خارجية. يدعم الطرق GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. قيود أمنية: نطاقات من قائمة السماح فقط، بدون مضيفين محليين/خاصين، مهلة وحدود حجم استجابة قابلة للتكوين."
image_info = "قراءة بيانات وصفية لملف صورة (التنسيق، الأبعاد، الحجم) وإرجاع البيانات المشفرة بـ base64 اختيارياً."
jira = "التفاعل مع Jira: الحصول على التذاكر بمستوى تفصيل قابل للتكوين، والبحث عن المسائل باستخدام JQL، وإضافة تعليقات مع دعم الإشارات والتنسيق."
knowledge = "إدارة رسم بياني معرفي للقرارات المعمارية وأنماط الحلول والدروس المستفادة والخبراء. الإجراءات: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "إدارة LinkedIn: إنشاء منشورات، سرد منشوراتك، التعليق، التفاعل، حذف المنشورات، عرض التفاعل، الحصول على معلومات الملف الشخصي، وقراءة استراتيجية المحتوى المهيأة. يتطلب بيانات اعتماد LINKEDIN_* في ملف .env."
discord_search = "البحث في سجل رسائل Discord المخزن في discord.db. استخدم للعثور على رسائل سابقة، تلخيص نشاط القناة، أو البحث عما قاله المستخدمون. يدعم البحث بالكلمات المفتاحية والمرشحات الاختيارية: channel_id, since, until."
memory_forget = "إزالة ذاكرة بواسطة المفتاح. استخدم لحذف حقائق قديمة أو بيانات حساسة. يُرجع ما إذا تم العثور على الذاكرة وإزالتها."
memory_recall = "البحث في الذاكرة طويلة المدى عن حقائق أو تفضيلات أو سياق ذي صلة. يُرجع نتائج مُقيّمة مرتبة حسب الصلة."
memory_store = "تخزين حقيقة أو تفضيل أو ملاحظة في الذاكرة طويلة المدى. استخدم الفئة 'core' للحقائق الدائمة، 'daily' لملاحظات الجلسة، 'conversation' لسياق المحادثة، أو اسم فئة مخصص."
microsoft365 = "تكامل Microsoft 365: إدارة بريد Outlook، رسائل Teams، أحداث Calendar، ملفات OneDrive، والبحث في SharePoint عبر Microsoft Graph API"
model_routing_config = "إدارة إعدادات النموذج الافتراضية، ومسارات المزود/النموذج المستندة إلى السيناريو، وقواعد التصنيف، وملفات تعريف الوكلاء الفرعيين delegate"
notion = "التفاعل مع Notion: الاستعلام عن قواعد البيانات، قراءة/إنشاء/تحديث الصفحات، والبحث في مساحة العمل."
pdf_read = "استخراج نص عادي من ملف PDF في مساحة العمل. يُرجع كل النص القابل للقراءة. ملفات PDF المكونة من صور فقط أو المشفرة تُرجع نتيجة فارغة. يتطلب ميزة البناء 'rag-pdf'."
project_intel = "ذكاء تسليم المشاريع: توليد تقارير الحالة، اكتشاف المخاطر، صياغة تحديثات العملاء، تلخيص السبرنت، وتقدير الجهد. أداة تحليل للقراءة فقط."
proxy_config = "إدارة إعدادات وكيل ZeroClaw (النطاق: environment | zeroclaw | services)، بما في ذلك التطبيق أثناء التشغيل ومتغيرات بيئة العملية"
pushover = "إرسال إشعار Pushover إلى جهازك. يتطلب PUSHOVER_TOKEN وPUSHOVER_USER_KEY في ملف .env."
schedule = """إدارة المهام المجدولة بالـ shell فقط. الإجراءات: create/add/once/list/get/cancel/remove/pause/resume. تحذير: هذه الأداة تنشئ مهام shell يتم تسجيل مخرجاتها فقط، ولا يتم توصيلها إلى أي قناة. لإرسال رسالة مجدولة إلى Discord/Telegram/Slack/Matrix، استخدم أداة cron_add مع job_type='agent' وتكوين delivery مثل {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "التقاط لقطة شاشة للشاشة الحالية. يُرجع مسار الملف وبيانات PNG المشفرة بـ base64."
security_ops = "أداة عمليات الأمان لخدمات الأمن السيبراني المُدارة. الإجراءات: triage_alert (تصنيف/ترتيب أولويات التنبيهات)، run_playbook (تنفيذ خطوات الاستجابة للحوادث)، parse_vulnerability (تحليل نتائج الفحص)، generate_report (إنشاء تقارير الوضع الأمني)، list_playbooks (سرد كتب التشغيل المتاحة)، alert_stats (تلخيص مقاييس التنبيهات)."
shell = "تنفيذ أمر shell في مجلد مساحة العمل"
sop_advance = "الإبلاغ عن نتيجة خطوة SOP الحالية والتقدم إلى الخطوة التالية. قدّم run_id، وما إذا نجحت الخطوة أو فشلت، وملخصاً موجزاً للمخرجات."
sop_approve = "الموافقة على خطوة SOP معلقة تنتظر موافقة المشغّل. يُرجع تعليمات الخطوة المطلوب تنفيذها. استخدم sop_status لمعرفة عمليات التشغيل المنتظرة."
sop_execute = "تشغيل إجراء تشغيل قياسي (SOP) يدوياً بالاسم. يُرجع معرّف التشغيل وتعليمات الخطوة الأولى. استخدم sop_list لعرض إجراءات SOP المتاحة."
sop_list = "سرد جميع إجراءات التشغيل القياسية (SOP) المحملة مع مشغلاتها وأولويتها وعدد خطواتها وعدد عمليات التشغيل النشطة. مع إمكانية التصفية اختيارياً بالاسم أو الأولوية."
sop_status = "الاستعلام عن حالة تنفيذ SOP. قدّم run_id لتشغيل محدد، أو sop_name لسرد عمليات تشغيل تلك الـ SOP. بدون معاملات، يعرض جميع عمليات التشغيل النشطة."
swarm = "تنسيق سرب من الوكلاء للتعامل التعاوني مع مهمة. يدعم الاستراتيجيات التسلسلية (pipeline)، المتوازية (fan-out/fan-in)، والموجّه (اختيار بواسطة LLM)."
tool_search = """جلب تعريفات المخطط الكاملة لأدوات MCP المؤجلة حتى يمكن استدعاؤها. استخدم "select:name1,name2" للمطابقة الدقيقة أو كلمات مفتاحية للبحث."""
web_fetch = "جلب صفحة ويب وإرجاع محتواها كنص عادي نظيف. يتم تحويل صفحات HTML تلقائياً إلى نص مقروء. تُرجع استجابات JSON والنص العادي كما هي. طلبات GET فقط؛ يتبع عمليات إعادة التوجيه. الأمان: نطاقات من قائمة السماح فقط، بدون مضيفين محليين/خاصين."
web_search_tool = "البحث في الويب عن معلومات. يُرجع نتائج بحث ذات صلة مع عناوين وروابط URL وأوصاف. استخدم للعثور على معلومات حالية أو أخبار أو البحث في مواضيع."
workspace = "إدارة مساحات عمل متعددة العملاء. الأوامر الفرعية: list, switch, create, info, export. توفر كل مساحة عمل ذاكرة وتدقيقاً وأسراراً وقيود أدوات معزولة."
weather = "الحصول على الأحوال الجوية الحالية والتوقعات لأي موقع حول العالم. يدعم أسماء المدن (بأي لغة أو خط)، رموز مطارات IATA (مثل 'LAX')، إحداثيات GPS (مثل '51.5,-0.1')، الرموز البريدية، والموقع الجغرافي المستند إلى النطاق. يُرجع درجة الحرارة، الإحساس الحراري، الرطوبة، سرعة/اتجاه الرياح، الهطول، الرؤية، الضغط، مؤشر الأشعة فوق البنفسجية، والغطاء السحابي. توقعات اختيارية من 0 إلى 3 أيام مع تفصيل بالساعة. الوحدات الافتراضية متريّة (°C, km/h, mm) لكن يمكن ضبطها إلى إمبراطورية (°F, mph, بوصات) لكل طلب. لا يتطلب API key."

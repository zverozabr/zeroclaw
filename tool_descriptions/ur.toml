weather = "دنیا بھر میں کسی بھی مقام کے لیے موجودہ موسمی حالات اور پیشن گوئی حاصل کریں۔ شہر کے نام (کسی بھی زبان یا رسم الخط میں)، IATA ایئرپورٹ کوڈز (مثلاً 'LHE')، GPS نقاط (مثلاً '31.5,74.3')، پوسٹل/زپ کوڈز، اور ڈومین پر مبنی جغرافیائی مقام سپورٹ کرتا ہے۔ درجہ حرارت، محسوس درجہ حرارت، نمی، ہوا کی رفتار/سمت، بارش، مرئیت، دباؤ، UV انڈیکس، اور بادل واپس کرتا ہے۔ اختیاری 0–3 دن کی پیشن گوئی فی گھنٹہ تفصیل کے ساتھ۔ پہلے سے میٹرک اکائیاں (°C، km/h، mm) لیکن فی درخواست امپیریل (°F، mph، انچ) پر سیٹ کیا جا سکتا ہے۔ API کلید کی ضرورت نہیں۔"

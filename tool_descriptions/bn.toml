[tools]
backup = "ওয়ার্কস্পেস ব্যাকআপ তৈরি, তালিকা, যাচাই এবং পুনরুদ্ধার করুন"
browser = "প্লাগযোগ্য ব্যাকএন্ড (agent-browser, rust-native, computer_use) সহ ওয়েব/browser অটোমেশন। DOM অ্যাকশন এবং ঐচ্ছিক OS-স্তরের অ্যাকশন (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) computer-use sidecar-এর মাধ্যমে সমর্থন করে। ইন্টারেক্টিভ এলিমেন্টকে refs (@e1, @e2) এ ম্যাপ করতে 'snapshot' ব্যবহার করুন। open অ্যাকশনের জন্য browser.allowed_domains প্রয়োগ করে।"

cloud_patterns = "ক্লাউড প্যাটার্ন লাইব্রেরি। ওয়ার্কলোড বিবরণ দেওয়া হলে, প্রযোজ্য ক্লাউড-নেটিভ আর্কিটেক্চারাল প্যাটার্ন (কন্টেইনারাইজেশন, সার্ভারলেস, ডেটাবেস আধুনিকীকরণ ইত্যাদি) সুপারিশ করে।"
composio = "Composio-এর মাধ্যমে 1000+ অ্যাপে অ্যাকশন সম্পাদন করুন (Gmail, Notion, GitHub, Slack ইত্যাদি)। উপলব্ধ অ্যাকশন দেখতে action='list' ব্যবহার করুন (প্যারামিটার নাম সহ)। অ্যাকশন চালাতে action='execute' সহ action_name/tool_slug এবং params দিন। সঠিক params জানা না থাকলে, প্রাকৃতিক ভাষায় বিবরণ সহ 'text' পাঠান (Composio NLP-এর মাধ্যমে সঠিক প্যারামিটার সমাধান করবে)। OAuth-সংযুক্ত অ্যাকাউন্ট তালিকা করতে action='list_accounts' বা action='connected_accounts'। OAuth URL পেতে action='connect' সহ app/auth_config_id। connected_account_id বাদ দিলে স্বয়ংক্রিয়ভাবে সমাধান হয়।"
content_search = "ওয়ার্কস্পেসে regex প্যাটার্ন দিয়ে ফাইলের বিষয়বস্তু অনুসন্ধান করুন। grep ফলব্যাক সহ ripgrep (rg) সমর্থন করে। আউটপুট মোড: 'content' (প্রসঙ্গ সহ মিলিত লাইন), 'files_with_matches' (শুধু ফাইল পাথ), 'count' (প্রতি ফাইলে মিলের সংখ্যা)। উদাহরণ: pattern='fn main', include='*.rs', output_mode='content'।"
cron_add = """cron/at/every সময়সূচী সহ একটি নির্ধারিত cron জব (shell বা agent) তৈরি করুন। সময়সূচীতে AI এজেন্ট চালাতে প্রম্পট সহ job_type='agent' ব্যবহার করুন। একটি চ্যানেলে (Discord, Telegram, Slack, Mattermost, Matrix) আউটপুট পাঠাতে delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"} সেট করুন। চ্যানেলের মাধ্যমে ব্যবহারকারীদের নির্ধারিত/বিলম্বিত বার্তা পাঠানোর জন্য এটি পছন্দের টুল।"""

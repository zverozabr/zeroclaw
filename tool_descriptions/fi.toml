# Finnish tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Luo, listaa, vahvista ja palauta työtilan varmuuskopioita"
browser = "Web/selainautomaatio vaihdettavilla taustamoottoreilla (agent-browser, rust-native, computer_use). Tukee DOM-toimintoja sekä valinnaisia käyttöjärjestelmätason toimintoja (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) computer-use-apuprosessin kautta. Käytä 'snapshot'-komentoa vuorovaikutteisten elementtien kartoittamiseksi viitteiksi (@e1, @e2). Noudattaa browser.allowed_domains-sääntöä open-toiminnoissa."
browser_delegate = "Delegoi selainpohjaisia tehtäviä selainkykyiselle CLI-työkalulle vuorovaikutukseen verkkosovellusten kuten Teams, Outlook, Jira ja Confluence kanssa"
browser_open = "Avaa hyväksytty HTTPS URL järjestelmän selaimessa. Turvarajoitukset: vain sallittujen listalla olevat verkkotunnukset, ei paikallisia/yksityisiä isäntiä, ei tiedonkaavintaa."
cloud_ops = "Pilvimuunnoksen neuvontatyökalu. Analysoi IaC-suunnitelmia, arvioi migraatiopolkuja, tarkistaa kustannuksia ja vertaa arkkitehtuuria Well-Architected Framework -pilareihin. Vain luku: ei luo tai muokkaa pilviresursseja."
cloud_patterns = "Pilvisuunnittelumallikirjasto. Ehdottaa sovellettavia pilvipohjaisia arkkitehtuurimalleja (kontittaminen, serverless, tietokantamodernisointi jne.) kuormaukuvauksen perusteella."
composio = "Suorita toimintoja yli 1000 sovelluksessa Composion kautta (Gmail, Notion, GitHub, Slack jne.). Käytä action='list' nähdäksesi saatavilla olevat toiminnot (sisältää parametrien nimet). action='execute' parametreilla action_name/tool_slug ja params suorittaaksesi toiminnon. Jos et ole varma tarkoista parametreista, käytä 'text'-kenttää luonnollisella kielellä kuvaamaan mitä haluat (Composio ratkaisee oikeat parametrit NLP:n avulla). action='list_accounts' tai action='connected_accounts' listaa OAuth-yhdistetyt tilit. action='connect' parametreilla app/auth_config_id OAuth URL:n saamiseksi. connected_account_id ratkaistaan automaattisesti kun se puuttuu."
content_search = "Hae tiedostojen sisällöstä regex-hakulausekkeella työtilassa. Tukee ripgrep (rg) -työkalua grep-varavaihtoehdolla. Tulostilat: 'content' (vastaavat rivit kontekstilla), 'files_with_matches' (vain tiedostopolut), 'count' (osumamäärät tiedostoittain). Esimerkki: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Luo ajastettu cron-tehtävä (shell tai agentti) cron/at/every-aikatauluilla. Käytä job_type='agent' ja promptia suorittaaksesi tekoälyagentin aikataulun mukaan. Tulosten toimittamiseksi kanavalle (Discord, Telegram, Slack, Mattermost, Matrix), aseta delivery={"mode":"announce","channel":"discord","to":"<channel_id_tai_chat_id>"}. Tämä on suositeltu työkalu ajastettujen/viivästettyjen viestien lähettämiseen käyttäjille kanavien kautta."""
cron_list = "Listaa kaikki ajastetut cron-tehtävät"
cron_remove = "Poista cron-tehtävä tunnisteen perusteella"
cron_run = "Pakota cron-tehtävä suoritettavaksi välittömästi ja tallenna suoritushistoria"
cron_runs = "Listaa cron-tehtävän viimeaikainen suoritushistoria"
cron_update = "Päivitä olemassa oleva cron-tehtävä (aikataulu, komento, prompt, käytössä, toimitus, malli jne.)"
data_management = "Työtilan tietojen säilytys, puhdistus ja tallennustilastot"
delegate = "Delegoi alitehtävä erikoistuneelle agentille. Käytä kun: tehtävä hyötyy eri mallista (esim. nopea tiivistäminen, syvä päättely, koodingenerointi). Aliagentit suorittaa oletuksena yhden promptin; agentic=true-asetuksella se voi iteroida suodatetulla työkalukutsusilmukalla."
file_edit = "Muokkaa tiedostoa korvaamalla tarkka merkkijonon vastaavuus uudella sisällöllä"
file_read = "Lue tiedoston sisältö rivinumeroilla. Tukee osittaista lukemista offset- ja limit-parametreilla. Poimii tekstin PDF-tiedostoista; muut binääritiedostot luetaan häviöllisellä UTF-8-muunnoksella."
file_write = "Kirjoita sisältöä työtilan tiedostoon"
git_operations = "Suorita rakenteellisia Git-operaatioita (status, diff, log, branch, commit, add, checkout, stash). Tuottaa jäsennettyä JSON-tulostetta ja integroituu turvallisuuskäytäntöön autonomianhallintaa varten."
glob_search = "Etsi tiedostoja glob-hakulausekkeen perusteella työtilassa. Palauttaa lajitellun listan vastaavista tiedostopoluista suhteessa työtilan juureen. Esimerkkejä: '**/*.rs' (kaikki Rust-tiedostot), 'src/**/mod.rs' (kaikki mod.rs src-hakemistossa)."
google_workspace = "Vuorovaikutus Google Workspace -palveluiden kanssa (Drive, Gmail, Calendar, Sheets, Docs jne.) gws CLI:n kautta. Vaatii gws-asennuksen ja todennuksen."
hardware_board_info = "Palauta täydelliset korttitiedot (siru, arkkitehtuuri, muistikartta) yhdistetystä laitteistosta. Käytä kun: käyttäjä kysyy 'korttitiedot', 'mikä kortti minulla on', 'yhdistetty laitteisto', 'sirutiedot', 'mikä laitteisto' tai 'muistikartta'."
hardware_memory_map = "Palauta muistikartta (flash- ja RAM-osoitealueet) yhdistetylle laitteistolle. Käytä kun: käyttäjä kysyy 'ylä- ja alamuistiosoitteet', 'muistikartta', 'osoiteavaruus' tai 'luettavat osoitteet'. Palauttaa flash/RAM-alueet datalehdistä."
hardware_memory_read = "Lue todellisia muisti-/rekisteriarvoja Nucleosta USB:n kautta. Käytä kun: käyttäjä pyytää 'lue rekisteriarvot', 'lue muisti osoitteesta', 'tyhjennä muisti', 'alamuisti 0-126' tai 'anna osoite ja arvo'. Palauttaa hex-tyhjennyksen. Vaatii Nucleon USB-yhteyden ja probe-ominaisuuden. Parametrit: address (hex, esim. 0x20000000 RAM:n alku), length (tavua, oletus 128)."
http_request = "Tee HTTP-pyyntöjä ulkoisiin API-rajapintoihin. Tukee GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS -menetelmiä. Turvarajoitukset: vain sallittujen listalla olevat verkkotunnukset, ei paikallisia/yksityisiä isäntiä, säädettävät aikakatkaisu- ja vastauksen kokorajat."
image_info = "Lue kuvatiedoston metatiedot (muoto, mitat, koko) ja palauta valinnaisesti base64-koodattu data."
jira = "Vuorovaikutus Jiran kanssa: hae tikettejä säädettävällä yksityiskohtatasolla, etsi asioita JQL:llä ja lisää kommentteja maininta- ja muotoilutuella."
knowledge = "Hallitse tietograafia arkkitehtuuripäätöksistä, ratkaisumalleista, opituista asioista ja asiantuntijoista. Toiminnot: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Hallitse LinkedIniä: luo julkaisuja, listaa julkaisusi, kommentoi, reagoi, poista julkaisuja, tarkastele sitoutumista, hae profiilitietoja ja lue määritetty sisältöstrategia. Vaatii LINKEDIN_*-tunnistetiedot .env-tiedostossa."
discord_search = "Etsi Discord-viestihistoriaa discord.db-tietokannasta. Käytä aiempien viestien etsimiseen, kanava-aktiviteetin tiivistämiseen tai käyttäjien sanomien hakuun. Tukee avainsanahakua ja valinnaisia suodattimia: channel_id, since, until."
memory_forget = "Poista muisti avaimen perusteella. Käytä vanhentuneiden tietojen tai arkaluontoisten tietojen poistamiseen. Palauttaa tiedon löytyikö ja poistettiinko muisti."
memory_recall = "Hae pitkäaikaismuistista relevantteja tietoja, asetuksia tai kontekstia. Palauttaa pisteytettyjä tuloksia relevanssin mukaan järjestettynä."
memory_store = "Tallenna tieto, asetus tai muistiinpano pitkäaikaismuistiin. Käytä kategoriaa 'core' pysyville tiedoille, 'daily' istuntomuistiinpanoille, 'conversation' keskustelukontekstille tai mukautettua kategorianimeä."
microsoft365 = "Microsoft 365 -integraatio: hallitse Outlook-sähköpostia, Teams-viestejä, Calendar-tapahtumia, OneDrive-tiedostoja ja SharePoint-hakua Microsoft Graph API:n kautta"
model_routing_config = "Hallitse oletusmalliasetuksia, skenaariopohjaisia palveluntarjoaja-/mallireitityksiä, luokittelusääntöjä ja delegointi-aliagenttien profiileja"
notion = "Vuorovaikutus Notionin kanssa: kyselytietokannat, lue/luo/päivitä sivuja ja hae työtilasta."
pdf_read = "Poimi teksti PDF-tiedostosta työtilassa. Palauttaa kaiken luettavan tekstin. Pelkkää kuvaa sisältävät tai salatut PDF-tiedostot palauttavat tyhjän tuloksen. Vaatii 'rag-pdf'-käännösominaisuuden."
project_intel = "Projektin toimituksen tiedustelu: luo tilanneraportteja, tunnista riskejä, luonnostele asiakaspäivityksiä, tiivistä sprintit ja arvioi työmäärä. Vain luku -analyysityökalu."
proxy_config = "Hallitse ZeroClaw-välityspalvelinasetuksia (laajuus: environment | zeroclaw | services), mukaan lukien suoritusaikainen ja prosessiympäristön soveltaminen"
pushover = "Lähetä Pushover-ilmoitus laitteeseesi. Vaatii PUSHOVER_TOKEN- ja PUSHOVER_USER_KEY-arvot .env-tiedostossa."
schedule = """Hallitse ajastettuja shell-tehtäviä. Toiminnot: create/add/once/list/get/cancel/remove/pause/resume. VAROITUS: Tämä työkalu luo shell-tehtäviä, joiden tuloste vain kirjataan lokiin, EIKÄ toimiteta mihinkään kanavaan. Ajastetun viestin lähettämiseen Discordiin/Telegramiin/Slackiin/Matrixiin käytä cron_add-työkalua parametreilla job_type='agent' ja delivery-asetuksella kuten {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Ota kuvakaappaus nykyisestä näytöstä. Palauttaa tiedostopolun ja base64-koodatun PNG-datan."
security_ops = "Turvallisuusoperaatiotyökalu hallinnoituihin kyberturvallisuuspalveluihin. Toiminnot: triage_alert (luokittele/priorisoi hälytykset), run_playbook (suorita tapausvastaustoimenpiteet), parse_vulnerability (jäsennä skannaustulokset), generate_report (luo turvallisuustilanneraportit), list_playbooks (listaa käytettävissä olevat ohjekirjat), alert_stats (tiivistä hälytysmittarit)."
shell = "Suorita shell-komento työtilan hakemistossa"
sop_advance = "Raportoi nykyisen SOP-vaiheen tulos ja siirry seuraavaan vaiheeseen. Anna run_id, onnistuiko vai epäonnistuiko vaihe, ja lyhyt tulosyhteenveto."
sop_approve = "Hyväksy odottava SOP-vaihe, joka odottaa operaattorin hyväksyntää. Palauttaa vaiheen ohjeen suoritettavaksi. Käytä sop_status-komentoa nähdäksesi mitkä suoritukset odottavat."
sop_execute = "Käynnistä manuaalisesti vakiotoimintamenettely (SOP) nimellä. Palauttaa suoritustunnuksen ja ensimmäisen vaiheen ohjeen. Käytä sop_list-komentoa nähdäksesi saatavilla olevat SOP:t."
sop_list = "Listaa kaikki ladatut vakiotoimintamenettelyt (SOP) niiden käynnistimien, prioriteetin, vaihemäärän ja aktiivisten suoritusten määrän kanssa. Voidaan suodattaa nimen tai prioriteetin mukaan."
sop_status = "Kysele SOP-suorituksen tila. Anna run_id tietyn suorituksen tilalle tai sop_name listataksesi kyseisen SOP:n suoritukset. Ilman argumentteja näyttää kaikki aktiiviset suoritukset."
swarm = "Orkesteroi agenttiparvi käsittelemään tehtävä yhteistyössä. Tukee peräkkäisiä (pipeline), rinnakkaisia (fan-out/fan-in) ja reititin (LLM-valittu) strategioita."
tool_search = """Hae viivästettyjen MCP-työkalujen täydelliset skeemamäärittelyt, jotta niitä voidaan kutsua. Käytä "select:nimi1,nimi2" tarkkaan hakuun tai avainsanoja etsintään."""
web_fetch = "Hae verkkosivu ja palauta sen sisältö puhtaana tekstinä. HTML-sivut muunnetaan automaattisesti luettavaksi tekstiksi. JSON- ja tekstivastaukset palautetaan sellaisinaan. Vain GET-pyynnöt; seuraa uudelleenohjauksia. Turvallisuus: vain sallittujen listalla olevat verkkotunnukset, ei paikallisia/yksityisiä isäntiä."
web_search_tool = "Etsi tietoa verkosta. Palauttaa relevantteja hakutuloksia otsikoineen, URL-osoitteineen ja kuvauksineen. Käytä tätä ajankohtaisen tiedon, uutisten tai tutkimusaiheiden etsimiseen."
workspace = "Hallitse moniasiakastyötiloja. Alikomennot: list, switch, create, info, export. Jokainen työtila tarjoaa eristetyn muistin, auditoinnin, salaisuudet ja työkalurajoitukset."
weather = "Hae nykyiset säätiedot ja ennuste mille tahansa sijainnille maailmassa. Tukee kaupunkinimiä (millä tahansa kielellä tai kirjoitusjärjestelmällä), IATA-lentokenttäkoodeja (esim. 'LAX'), GPS-koordinaatteja (esim. '51.5,-0.1'), posti-/postinumeroita ja verkkotunnuspohjaista geosijaintia. Palauttaa lämpötilan, tuntuu kuin -arvon, kosteuden, tuulen nopeuden/suunnan, sateen, näkyvyyden, paineen, UV-indeksin ja pilvisyyden. Valinnainen 0–3 päivän ennuste tuntikohtaisella erittelyllä. Yksiköt oletuksena metriset (°C, km/h, mm), mutta voidaan asettaa imperiaalisiksi (°F, mph, tuumaa) pyyntökohtaisesti. Ei vaadi API-avainta."

# Danish tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Opret, vis, verificer og gendan sikkerhedskopier af arbejdsområdet"
browser = "Web/browserautomatisering med udskiftelige backends (agent-browser, rust-native, computer_use). Understøtter DOM-handlinger samt valgfrie OS-niveau-handlinger (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) gennem en computer-use-sidecar. Brug 'snapshot' til at kortlægge interaktive elementer til referencer (@e1, @e2). Håndhæver browser.allowed_domains for open-handlinger."
browser_delegate = "Deleger browserbaserede opgaver til en browserkompetent CLI til interaktion med webapplikationer som Teams, Outlook, Jira, Confluence"
browser_open = "Åbn en godkendt HTTPS URL i systemets browser. Sikkerhedsbegrænsninger: kun domæner på tilladelseslisten, ingen lokale/private værter, ingen scraping."
cloud_ops = "Rådgivningsværktøj til cloud-transformation. Analyserer IaC-planer, vurderer migrationsruter, gennemgår omkostninger og kontrollerer arkitektur mod Well-Architected Framework-søjlerne. Skrivebeskyttet: opretter eller ændrer ikke cloud-ressourcer."
cloud_patterns = "Cloud-mønsterbibliotek. Foreslår anvendelige cloud-native arkitekturmønstre (containerisering, serverless, databasemodernisering osv.) baseret på en workload-beskrivelse."
composio = "Udfør handlinger på over 1000 apps via Composio (Gmail, Notion, GitHub, Slack osv.). Brug action='list' for at se tilgængelige handlinger (inkluderer parameternavne). action='execute' med action_name/tool_slug og params for at køre en handling. Hvis du er usikker på de præcise parametre, send 'text' i stedet med en naturlig sprogbeskrivelse af hvad du ønsker (Composio løser de korrekte parametre via NLP). action='list_accounts' eller action='connected_accounts' for at liste OAuth-forbundne konti. action='connect' med app/auth_config_id for at få OAuth URL. connected_account_id løses automatisk når den udelades."
content_search = "Søg i filindhold med regex-mønster i arbejdsområdet. Understøtter ripgrep (rg) med grep-fallback. Outputtilstande: 'content' (matchende linjer med kontekst), 'files_with_matches' (kun filstier), 'count' (antal matches pr. fil). Eksempel: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Opret et planlagt cron-job (shell eller agent) med cron/at/every-tidsplaner. Brug job_type='agent' med en prompt til at køre AI-agenten efter tidsplan. For at levere output til en kanal (Discord, Telegram, Slack, Mattermost, Matrix), sæt delivery={"mode":"announce","channel":"discord","to":"<channel_id_eller_chat_id>"}. Dette er det foretrukne værktøj til at sende planlagte/forsinkede beskeder til brugere via kanaler."""
cron_list = "Vis alle planlagte cron-jobs"
cron_remove = "Fjern et cron-job efter id"
cron_run = "Tving et cron-job til at køre med det samme og registrer kørselshistorik"
cron_runs = "Vis seneste kørselshistorik for et cron-job"
cron_update = "Opdater et eksisterende cron-job (tidsplan, kommando, prompt, aktiveret, levering, model osv.)"
data_management = "Dataopbevaring, sletning og lagerstatistik for arbejdsområdet"
delegate = "Deleger en delopgave til en specialiseret agent. Brug når: en opgave drager fordel af en anden model (f.eks. hurtig opsummering, dyb ræsonnering, kodegenerering). Sub-agenten kører som standard en enkelt prompt; med agentic=true kan den iterere med en filtreret værktøjskaldsløjfe."
file_edit = "Rediger en fil ved at erstatte en eksakt strengmatch med nyt indhold"
file_read = "Læs filindhold med linjenumre. Understøtter delvis læsning via offset og limit. Udtrækker tekst fra PDF; andre binære filer læses med lossy UTF-8-konvertering."
file_write = "Skriv indhold til en fil i arbejdsområdet"
git_operations = "Udfør strukturerede Git-operationer (status, diff, log, branch, commit, add, checkout, stash). Giver parset JSON-output og integrerer med sikkerhedspolitik for autonomikontrol."
glob_search = "Søg efter filer der matcher et glob-mønster i arbejdsområdet. Returnerer en sorteret liste over matchende filstier relativt til arbejdsområdets rod. Eksempler: '**/*.rs' (alle Rust-filer), 'src/**/mod.rs' (alle mod.rs i src)."
google_workspace = "Interager med Google Workspace-tjenester (Drive, Gmail, Calendar, Sheets, Docs osv.) via gws CLI. Kræver at gws er installeret og autentificeret."
hardware_board_info = "Returner fuld kortinfo (chip, arkitektur, hukommelseskort) for tilsluttet hardware. Brug når: bruger spørger om 'kortinfo', 'hvilket kort har jeg', 'tilsluttet hardware', 'chipinfo', 'hvilken hardware' eller 'hukommelseskort'."
hardware_memory_map = "Returner hukommelseskortet (flash- og RAM-adresseområder) for tilsluttet hardware. Brug når: bruger spørger om 'øvre og nedre hukommelsesadresser', 'hukommelseskort', 'adresserum' eller 'læsbare adresser'. Returnerer flash/RAM-områder fra datablade."
hardware_memory_read = "Læs faktiske hukommelses-/registerværdier fra Nucleo via USB. Brug når: bruger beder om at 'læse registerværdier', 'læse hukommelse på adresse', 'dumpe hukommelse', 'nedre hukommelse 0-126' eller 'giv adresse og værdi'. Returnerer hex-dump. Kræver Nucleo tilsluttet via USB og probe-funktion. Parametre: address (hex, f.eks. 0x20000000 for RAM-start), length (bytes, standard 128)."
http_request = "Lav HTTP-forespørgsler til eksterne API'er. Understøtter GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS-metoder. Sikkerhedsbegrænsninger: kun domæner på tilladelseslisten, ingen lokale/private værter, konfigurerbar timeout og svarmaksimumstørrelser."
image_info = "Læs billedfilens metadata (format, dimensioner, størrelse) og returner valgfrit base64-kodet data."
jira = "Interager med Jira: hent billetter med konfigurerbart detaljeniveau, søg efter sager med JQL, og tilføj kommentarer med omtale- og formateringsstøtte."
knowledge = "Administrer en videngraf over arkitekturbeslutninger, løsningsmønstre, erfaringer og eksperter. Handlinger: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Administrer LinkedIn: opret opslag, vis dine opslag, kommenter, reager, slet opslag, se engagement, hent profilinfo og læs den konfigurerede indholdsstrategi. Kræver LINKEDIN_*-legitimationsoplysninger i .env-filen."
discord_search = "Søg i Discord-beskedhistorik gemt i discord.db. Brug til at finde tidligere beskeder, opsummere kanalaktivitet eller slå op hvad brugere sagde. Understøtter nøgleordssøgning og valgfrie filtre: channel_id, since, until."
memory_forget = "Fjern en hukommelse efter nøgle. Brug til at slette forældede fakta eller følsomme data. Returnerer om hukommelsen blev fundet og fjernet."
memory_recall = "Søg i langtidshukommelsen efter relevante fakta, præferencer eller kontekst. Returnerer scorede resultater rangeret efter relevans."
memory_store = "Gem et faktum, en præference eller en note i langtidshukommelsen. Brug kategori 'core' for permanente fakta, 'daily' for sessionsnoter, 'conversation' for chatkontekst eller et brugerdefineret kategorinavn."
microsoft365 = "Microsoft 365-integration: administrer Outlook-mail, Teams-beskeder, Calendar-begivenheder, OneDrive-filer og SharePoint-søgning via Microsoft Graph API"
model_routing_config = "Administrer standardmodelindstillinger, scenariebaserede udbyder-/modelruter, klassifikationsregler og delegeret sub-agent-profiler"
notion = "Interager med Notion: forespørg databaser, læs/opret/opdater sider og søg i arbejdsområdet."
pdf_read = "Udtræk ren tekst fra en PDF-fil i arbejdsområdet. Returnerer al læsbar tekst. PDF-filer med kun billeder eller krypterede PDF-filer returnerer et tomt resultat. Kræver 'rag-pdf'-build-funktionen."
project_intel = "Projektleveringsintelligens: generer statusrapporter, opdag risici, udkast til kundeopdateringer, opsummer sprints og estimer indsats. Skrivebeskyttet analyseværktøj."
proxy_config = "Administrer ZeroClaw-proxyindstillinger (scope: environment | zeroclaw | services), herunder runtime- og processmiljøanvendelse"
pushover = "Send en Pushover-notifikation til din enhed. Kræver PUSHOVER_TOKEN og PUSHOVER_USER_KEY i .env-filen."
schedule = """Administrer planlagte shell-opgaver. Handlinger: create/add/once/list/get/cancel/remove/pause/resume. ADVARSEL: Dette værktøj opretter shell-jobs hvis output kun logges, IKKE leveres til nogen kanal. For at sende en planlagt besked til Discord/Telegram/Slack/Matrix, brug cron_add-værktøjet med job_type='agent' og en delivery-konfiguration som {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Tag et skærmbillede af den aktuelle skærm. Returnerer filstien og base64-kodet PNG-data."
security_ops = "Sikkerhedsoperationsværktøj til administrerede cybersikkerhedstjenester. Handlinger: triage_alert (klassificer/prioriter alarmer), run_playbook (udfør hændelsesresponsstrin), parse_vulnerability (parse scanningsresultater), generate_report (opret sikkerhedsstatusrapporter), list_playbooks (vis tilgængelige playbooks), alert_stats (opsummer alarmmetrikker)."
shell = "Udfør en shell-kommando i arbejdsområdets mappe"
sop_advance = "Rapporter resultatet af det aktuelle SOP-trin og gå videre til næste trin. Angiv run_id, om trinnet lykkedes eller fejlede, og en kort outputoversigt."
sop_approve = "Godkend et afventende SOP-trin der venter på operatørgodkendelse. Returnerer trininstruktionen til udførelse. Brug sop_status for at se hvilke kørsler der venter."
sop_execute = "Udløs manuelt en standardprocedure (SOP) efter navn. Returnerer kørsel-ID og første trininstruktion. Brug sop_list for at se tilgængelige SOP'er."
sop_list = "Vis alle indlæste standardprocedurer (SOP'er) med deres udløsere, prioritet, antal trin og antal aktive kørsler. Kan valgfrit filtreres efter navn eller prioritet."
sop_status = "Forespørg SOP-udførelsesstatus. Angiv run_id for en specifik kørsel eller sop_name for at liste kørsler for den SOP. Uden argumenter vises alle aktive kørsler."
swarm = "Orkestrér en sværm af agenter til samarbejdende håndtering af en opgave. Understøtter sekventielle (pipeline), parallelle (fan-out/fan-in) og router (LLM-valgt) strategier."
tool_search = """Hent fulde skemadefinitioner for udskudte MCP-værktøjer så de kan kaldes. Brug "select:navn1,navn2" for præcis match eller nøgleord til søgning."""
web_fetch = "Hent en webside og returner dens indhold som ren tekst. HTML-sider konverteres automatisk til læsbar tekst. JSON- og tekstsvar returneres som de er. Kun GET-forespørgsler; følger omdirigeringer. Sikkerhed: kun domæner på tilladelseslisten, ingen lokale/private værter."
web_search_tool = "Søg på nettet efter information. Returnerer relevante søgeresultater med titler, URL'er og beskrivelser. Brug dette til at finde aktuel information, nyheder eller forskningstemaer."
workspace = "Administrer multi-klient-arbejdsområder. Underkommandoer: list, switch, create, info, export. Hvert arbejdsområde giver isoleret hukommelse, revision, hemmeligheder og værktøjsbegrænsninger."
weather = "Hent aktuelle vejrforhold og prognoser for enhver placering i verden. Understøtter bynavne (på ethvert sprog eller skrift), IATA-lufthavnskoder (f.eks. 'LAX'), GPS-koordinater (f.eks. '51.5,-0.1'), post-/postnumre og domænebaseret geolokation. Returnerer temperatur, føles som-værdi, luftfugtighed, vindhastighed/-retning, nedbør, sigtbarhed, tryk, UV-indeks og skydække. Valgfri 0–3 dages prognose med timebaseret opdeling. Enheder er som standard metriske (°C, km/h, mm) men kan sættes til imperiale (°F, mph, tommer) pr. forespørgsel. Kræver ingen API-nøgle."

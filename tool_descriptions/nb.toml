# Norwegian Bokmål tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Opprett, list, verifiser og gjenopprett sikkerhetskopier av arbeidsområdet"
browser = "Web/nettleserautomatisering med utskiftbare backends (agent-browser, rust-native, computer_use). Støtter DOM-handlinger samt valgfrie OS-nivå-handlinger (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) gjennom en computer-use-sidecar. Bruk 'snapshot' for å kartlegge interaktive elementer til referanser (@e1, @e2). Håndhever browser.allowed_domains for open-handlinger."
browser_delegate = "Deleger nettleserbaserte oppgaver til en nettleserdyktig CLI for interaksjon med webapplikasjoner som Teams, Outlook, Jira, Confluence"
browser_open = "Åpne en godkjent HTTPS URL i systemets nettleser. Sikkerhetsbegrensninger: kun domener på tillatelseslisten, ingen lokale/private verter, ingen scraping."
cloud_ops = "Rådgivningsverktøy for skytransformasjon. Analyserer IaC-planer, vurderer migreringsruter, gjennomgår kostnader og kontrollerer arkitektur mot Well-Architected Framework-søylene. Skrivebeskyttet: oppretter eller endrer ikke skyressurser."
cloud_patterns = "Skymønsterbibliotek. Foreslår anvendelige skybaserte arkitekturmønstre (kontainerisering, serverless, databasemodernisering osv.) basert på en workload-beskrivelse."
composio = "Utfør handlinger på over 1000 apper via Composio (Gmail, Notion, GitHub, Slack osv.). Bruk action='list' for å se tilgjengelige handlinger (inkluderer parameternavn). action='execute' med action_name/tool_slug og params for å kjøre en handling. Hvis du er usikker på de nøyaktige parameterne, send 'text' i stedet med en naturlig språkbeskrivelse av hva du ønsker (Composio løser de riktige parameterne via NLP). action='list_accounts' eller action='connected_accounts' for å liste OAuth-tilkoblede kontoer. action='connect' med app/auth_config_id for å få OAuth URL. connected_account_id løses automatisk når den utelates."
content_search = "Søk i filinnhold med regex-mønster i arbeidsområdet. Støtter ripgrep (rg) med grep-fallback. Utdatamoduser: 'content' (treffende linjer med kontekst), 'files_with_matches' (kun filstier), 'count' (antall treff per fil). Eksempel: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Opprett en planlagt cron-jobb (shell eller agent) med cron/at/every-tidsplaner. Bruk job_type='agent' med en prompt for å kjøre AI-agenten etter tidsplan. For å levere utdata til en kanal (Discord, Telegram, Slack, Mattermost, Matrix), sett delivery={"mode":"announce","channel":"discord","to":"<channel_id_eller_chat_id>"}. Dette er det foretrukne verktøyet for å sende planlagte/forsinkede meldinger til brukere via kanaler."""
cron_list = "List alle planlagte cron-jobber"
cron_remove = "Fjern en cron-jobb etter id"
cron_run = "Tving en cron-jobb til å kjøre umiddelbart og registrer kjørehistorikk"
cron_runs = "List nylig kjørehistorikk for en cron-jobb"
cron_update = "Oppdater en eksisterende cron-jobb (tidsplan, kommando, prompt, aktivert, levering, modell osv.)"
data_management = "Dataoppbevaring, sletting og lagringsstatistikk for arbeidsområdet"
delegate = "Deleger en deloppgave til en spesialisert agent. Bruk når: en oppgave drar nytte av en annen modell (f.eks. rask oppsummering, dyp resonnering, kodegenerering). Sub-agenten kjører som standard en enkelt prompt; med agentic=true kan den iterere med en filtrert verktøykallsløkke."
file_edit = "Rediger en fil ved å erstatte en eksakt strengmatch med nytt innhold"
file_read = "Les filinnhold med linjenumre. Støtter delvis lesing via offset og limit. Trekker ut tekst fra PDF; andre binærfiler leses med tapsbringende UTF-8-konvertering."
file_write = "Skriv innhold til en fil i arbeidsområdet"
git_operations = "Utfør strukturerte Git-operasjoner (status, diff, log, branch, commit, add, checkout, stash). Gir parset JSON-utdata og integrerer med sikkerhetspolicy for autonomikontroll."
glob_search = "Søk etter filer som matcher et glob-mønster i arbeidsområdet. Returnerer en sortert liste over matchende filstier relativt til arbeidsområdets rot. Eksempler: '**/*.rs' (alle Rust-filer), 'src/**/mod.rs' (alle mod.rs i src)."
google_workspace = "Samhandle med Google Workspace-tjenester (Drive, Gmail, Calendar, Sheets, Docs osv.) via gws CLI. Krever at gws er installert og autentisert."
hardware_board_info = "Returner full kortinfo (brikke, arkitektur, minnekart) for tilkoblet maskinvare. Bruk når: bruker spør om 'kortinfo', 'hvilket kort har jeg', 'tilkoblet maskinvare', 'brikkeinfo', 'hvilken maskinvare' eller 'minnekart'."
hardware_memory_map = "Returner minnekartet (flash- og RAM-adresseområder) for tilkoblet maskinvare. Bruk når: bruker spør om 'øvre og nedre minneadresser', 'minnekart', 'adresserom' eller 'lesbare adresser'. Returnerer flash/RAM-områder fra datablad."
hardware_memory_read = "Les faktiske minne-/registerverdier fra Nucleo via USB. Bruk når: bruker ber om å 'lese registerverdier', 'lese minne på adresse', 'dumpe minne', 'nedre minne 0-126' eller 'gi adresse og verdi'. Returnerer hex-dump. Krever Nucleo tilkoblet via USB og probe-funksjon. Parametere: address (hex, f.eks. 0x20000000 for RAM-start), length (bytes, standard 128)."
http_request = "Gjør HTTP-forespørsler til eksterne API-er. Støtter GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS-metoder. Sikkerhetsbegrensninger: kun domener på tillatelseslisten, ingen lokale/private verter, konfigurerbar tidsavbrudd og svarmaksimumsstørrelser."
image_info = "Les bildefil-metadata (format, dimensjoner, størrelse) og returner valgfritt base64-kodet data."
jira = "Samhandle med Jira: hent billetter med konfigurerbart detaljnivå, søk etter saker med JQL, og legg til kommentarer med omtale- og formateringsstøtte."
knowledge = "Administrer en kunnskapsgraf over arkitekturbeslutninger, løsningsmønstre, erfaringer og eksperter. Handlinger: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Administrer LinkedIn: opprett innlegg, list dine innlegg, kommenter, reager, slett innlegg, se engasjement, hent profilinfo og les den konfigurerte innholdsstrategien. Krever LINKEDIN_*-legitimasjon i .env-filen."
discord_search = "Søk i Discord-meldingshistorikk lagret i discord.db. Bruk for å finne tidligere meldinger, oppsummere kanalaktivitet eller slå opp hva brukere sa. Støtter nøkkelordsøk og valgfrie filtre: channel_id, since, until."
memory_forget = "Fjern et minne etter nøkkel. Bruk for å slette utdaterte fakta eller sensitive data. Returnerer om minnet ble funnet og fjernet."
memory_recall = "Søk i langtidsminnet etter relevante fakta, preferanser eller kontekst. Returnerer rangerte resultater sortert etter relevans."
memory_store = "Lagre et faktum, en preferanse eller et notat i langtidsminnet. Bruk kategori 'core' for permanente fakta, 'daily' for øktnotater, 'conversation' for chattekontekst eller et egendefinert kategorinavn."
microsoft365 = "Microsoft 365-integrasjon: administrer Outlook-e-post, Teams-meldinger, Calendar-hendelser, OneDrive-filer og SharePoint-søk via Microsoft Graph API"
model_routing_config = "Administrer standardmodellinnstillinger, scenariobaserte leverandør-/modellruter, klassifiseringsregler og delegert sub-agent-profiler"
notion = "Samhandle med Notion: spør databaser, les/opprett/oppdater sider og søk i arbeidsområdet."
pdf_read = "Trekk ut ren tekst fra en PDF-fil i arbeidsområdet. Returnerer all lesbar tekst. PDF-filer med kun bilder eller krypterte PDF-filer returnerer et tomt resultat. Krever 'rag-pdf'-byggefunksjonen."
project_intel = "Prosjektleveringsintelligens: generer statusrapporter, oppdag risikoer, utkast til kundeoppdateringer, oppsummer sprinter og estimer innsats. Skrivebeskyttet analyseverktøy."
proxy_config = "Administrer ZeroClaw-proxyinnstillinger (scope: environment | zeroclaw | services), inkludert kjøretids- og prosessmiljøanvendelse"
pushover = "Send en Pushover-varsling til enheten din. Krever PUSHOVER_TOKEN og PUSHOVER_USER_KEY i .env-filen."
schedule = """Administrer planlagte shell-oppgaver. Handlinger: create/add/once/list/get/cancel/remove/pause/resume. ADVARSEL: Dette verktøyet oppretter shell-jobber hvis utdata kun logges, IKKE leveres til noen kanal. For å sende en planlagt melding til Discord/Telegram/Slack/Matrix, bruk cron_add-verktøyet med job_type='agent' og en delivery-konfigurasjon som {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Ta et skjermbilde av gjeldende skjerm. Returnerer filstien og base64-kodet PNG-data."
security_ops = "Sikkerhetsoperasjonsverktøy for administrerte cybersikkerhetstjenester. Handlinger: triage_alert (klassifiser/prioriter varsler), run_playbook (utfør hendelsesrespons-steg), parse_vulnerability (parse skanneresultater), generate_report (opprett sikkerhetsstatusrapporter), list_playbooks (list tilgjengelige playbooks), alert_stats (oppsummer varslingsmetrikker)."
shell = "Kjør en shell-kommando i arbeidsområdets mappe"
sop_advance = "Rapporter resultatet av gjeldende SOP-steg og gå videre til neste steg. Oppgi run_id, om steget lyktes eller feilet, og et kort utdatasammendrag."
sop_approve = "Godkjenn et ventende SOP-steg som venter på operatørgodkjenning. Returnerer steginstruksjonen for utførelse. Bruk sop_status for å se hvilke kjøringer som venter."
sop_execute = "Utløs manuelt en standard operasjonsprosedyre (SOP) etter navn. Returnerer kjørings-ID og første steginstruksjon. Bruk sop_list for å se tilgjengelige SOP-er."
sop_list = "List alle lastede standard operasjonsprosedyrer (SOP-er) med deres utløsere, prioritet, antall steg og antall aktive kjøringer. Kan valgfritt filtreres etter navn eller prioritet."
sop_status = "Spør om SOP-utførelsesstatus. Oppgi run_id for en spesifikk kjøring eller sop_name for å liste kjøringer for den SOP-en. Uten argumenter vises alle aktive kjøringer."
swarm = "Orkestrer en sverm av agenter for samarbeidende håndtering av en oppgave. Støtter sekvensielle (pipeline), parallelle (fan-out/fan-in) og ruter (LLM-valgt) strategier."
tool_search = """Hent fullstendige skjemadefinisjoner for utsatte MCP-verktøy slik at de kan kalles. Bruk "select:navn1,navn2" for eksakt treff eller nøkkelord for søk."""
web_fetch = "Hent en nettside og returner innholdet som ren tekst. HTML-sider konverteres automatisk til lesbar tekst. JSON- og tekstsvar returneres som de er. Kun GET-forespørsler; følger omdirigeringer. Sikkerhet: kun domener på tillatelseslisten, ingen lokale/private verter."
web_search_tool = "Søk på nettet etter informasjon. Returnerer relevante søkeresultater med titler, URL-er og beskrivelser. Bruk dette for å finne aktuell informasjon, nyheter eller forskningstemaer."
workspace = "Administrer flerklient-arbeidsområder. Underkommandoer: list, switch, create, info, export. Hvert arbeidsområde gir isolert minne, revisjon, hemmeligheter og verktøybegrensninger."
weather = "Hent gjeldende værforhold og varsel for enhver plassering i verden. Støtter bynavn (på ethvert språk eller skrift), IATA-flyplasskoder (f.eks. 'LAX'), GPS-koordinater (f.eks. '51.5,-0.1'), post-/postnumre og domenebasert geolokasjon. Returnerer temperatur, føles som-verdi, fuktighet, vindhastighet/-retning, nedbør, sikt, trykk, UV-indeks og skydekke. Valgfri 0–3 dagers varsel med timesbasert fordeling. Enheter er som standard metriske (°C, km/h, mm) men kan settes til imperiale (°F, mph, tommer) per forespørsel. Krever ingen API-nøkkel."

# Polish tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Tworzenie, wyświetlanie, weryfikacja i przywracanie kopii zapasowych przestrzeni roboczej"
browser = "Automatyzacja web/browser z wymiennymi backendami (agent-browser, rust-native, computer_use). Obsługuje akcje DOM oraz opcjonalne akcje na poziomie systemu operacyjnego (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) przez sidecar computer-use. Użyj 'snapshot' do mapowania elementów interaktywnych na refs (@e1, @e2). Wymusza browser.allowed_domains dla akcji open."
browser_delegate = "Delegowanie zadań opartych na browser do CLI z obsługą browser w celu interakcji z aplikacjami webowymi takimi jak Teams, Outlook, Jira, Confluence"
browser_open = "Otwórz zatwierdzony HTTPS URL w systemowej przeglądarce. Ograniczenia bezpieczeństwa: tylko domeny z listy dozwolonych, brak hostów lokalnych/prywatnych, brak scrapingu."
cloud_ops = "Narzędzie doradcze transformacji chmurowej. Analizuje plany IaC, ocenia ścieżki migracji, weryfikuje koszty i sprawdza architekturę pod kątem filarów Well-Architected Framework. Tylko do odczytu: nie tworzy ani nie modyfikuje zasobów chmurowych."
cloud_patterns = "Biblioteka wzorców chmurowych. Na podstawie opisu obciążenia sugeruje odpowiednie wzorce architektoniczne cloud-native (konteneryzacja, serverless, modernizacja baz danych itp.)."
composio = "Wykonywanie akcji w ponad 1000 aplikacjach przez Composio (Gmail, Notion, GitHub, Slack itp.). Użyj action='list' aby zobaczyć dostępne akcje (zawiera nazwy parametrów). action='execute' z action_name/tool_slug i params do uruchomienia akcji. Jeśli dokładne params nie są znane, przekaż 'text' z opisem w języku naturalnym (Composio rozwiąże poprawne parametry przez NLP). action='list_accounts' lub action='connected_accounts' do wyświetlenia kont połączonych przez OAuth. action='connect' z app/auth_config_id do uzyskania OAuth URL. connected_account_id jest automatycznie rozwiązywany, gdy pominięty."
content_search = "Wyszukiwanie zawartości plików według wzorca regex w przestrzeni roboczej. Obsługuje ripgrep (rg) z fallbackiem na grep. Tryby wyjścia: 'content' (pasujące linie z kontekstem), 'files_with_matches' (tylko ścieżki plików), 'count' (liczba dopasowań na plik). Przykład: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Tworzenie zaplanowanego zadania cron (shell lub agent) z harmonogramami cron/at/every. Użyj job_type='agent' z promptem do uruchamiania agenta AI według harmonogramu. Aby dostarczyć wyjście do kanału (Discord, Telegram, Slack, Mattermost, Matrix), ustaw delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. To preferowane narzędzie do wysyłania zaplanowanych/opóźnionych wiadomości do użytkowników przez kanały."""
cron_list = "Wyświetlenie listy wszystkich zaplanowanych zadań cron"
cron_remove = "Usunięcie zadania cron według id"
cron_run = "Wymuszone natychmiastowe uruchomienie zadania cron z zapisem w historii wykonań"
cron_runs = "Wyświetlenie ostatniej historii wykonań zadania cron"
cron_update = "Aktualizacja istniejącego zadania cron (schedule, command, prompt, enabled, delivery, model itp.)"
data_management = "Retencja danych przestrzeni roboczej, czyszczenie i statystyki przechowywania"
delegate = "Delegowanie podzadania do wyspecjalizowanego agenta. Użyj gdy: zadanie korzysta z innego modelu (np. szybkie podsumowanie, głębokie rozumowanie, generowanie kodu). Podagent domyślnie wykonuje pojedynczy prompt; z agentic=true może iterować z filtrowaną pętlą wywołań narzędzi."
file_edit = "Edycja pliku przez zastąpienie dokładnego dopasowania ciągu znaków nową zawartością"
file_read = "Odczyt zawartości pliku z numerami linii. Obsługuje częściowy odczyt przez offset i limit. Wyodrębnia tekst z PDF; inne pliki binarne są odczytywane z konwersją lossy UTF-8."
file_write = "Zapis zawartości do pliku w przestrzeni roboczej"
git_operations = "Wykonywanie strukturalnych operacji Git (status, diff, log, branch, commit, add, checkout, stash). Dostarcza sparsowane wyjście JSON i integruje się z polityką bezpieczeństwa w zakresie kontroli autonomii."
glob_search = "Wyszukiwanie plików pasujących do wzorca glob w przestrzeni roboczej. Zwraca posortowaną listę ścieżek plików względem katalogu głównego przestrzeni roboczej. Przykłady: '**/*.rs' (wszystkie pliki Rust), 'src/**/mod.rs' (wszystkie mod.rs w src)."
google_workspace = "Interakcja z usługami Google Workspace (Drive, Gmail, Calendar, Sheets, Docs itp.) przez CLI gws. Wymaga zainstalowanego i uwierzytelnionego gws."
hardware_board_info = "Zwrócenie pełnych informacji o płycie (układ, architektura, mapa pamięci) dla podłączonego sprzętu. Użyj gdy: użytkownik pyta o 'board info', 'what board do I have', 'connected hardware', 'chip info', 'what hardware' lub 'memory map'."
hardware_memory_map = "Zwrócenie mapy pamięci (zakresy adresów flash i RAM) dla podłączonego sprzętu. Użyj gdy: użytkownik pyta o 'upper and lower memory addresses', 'memory map', 'address space' lub 'readable addresses'. Zwraca zakresy flash/RAM z kart katalogowych."
hardware_memory_read = "Odczyt rzeczywistych wartości pamięci/rejestrów z Nucleo przez USB. Użyj gdy: użytkownik prosi o 'read register values', 'read memory at address', 'dump memory', 'lower memory 0-126' lub 'give address and value'. Zwraca zrzut hex. Wymaga podłączonego Nucleo przez USB i funkcji probe. Parametry: address (hex, np. 0x20000000 dla początku RAM), length (bajty, domyślnie 128)."
http_request = "Wykonywanie żądań HTTP do zewnętrznych API. Obsługuje metody GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Ograniczenia bezpieczeństwa: tylko domeny z listy dozwolonych, brak hostów lokalnych/prywatnych, konfigurowalne limity timeout i rozmiaru odpowiedzi."
image_info = "Odczyt metadanych pliku obrazu (format, wymiary, rozmiar) z opcjonalnym zwróceniem danych zakodowanych w base64."
jira = "Interakcja z Jira: pobieranie zgłoszeń z konfigurowalnym poziomem szczegółowości, wyszukiwanie problemów za pomocą JQL oraz dodawanie komentarzy z obsługą wzmianek i formatowania."
knowledge = "Zarządzanie grafem wiedzy obejmującym decyzje architektoniczne, wzorce rozwiązań, wyciągnięte wnioski i ekspertów. Akcje: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Zarządzanie LinkedIn: tworzenie postów, wyświetlanie swoich postów, komentowanie, reagowanie, usuwanie postów, przeglądanie zaangażowania, pobieranie informacji o profilu i odczyt skonfigurowanej strategii treści. Wymaga poświadczeń LINKEDIN_* w pliku .env."
discord_search = "Wyszukiwanie historii wiadomości Discord przechowywanej w discord.db. Użyj do znajdowania przeszłych wiadomości, podsumowywania aktywności kanału lub sprawdzania co napisali użytkownicy. Obsługuje wyszukiwanie słów kluczowych i opcjonalne filtry: channel_id, since, until."
memory_forget = "Usunięcie wpisu z pamięci według klucza. Użyj do usuwania nieaktualnych faktów lub wrażliwych danych. Zwraca, czy wpis został znaleziony i usunięty."
memory_recall = "Wyszukiwanie w pamięci długoterminowej odpowiednich faktów, preferencji lub kontekstu. Zwraca wyniki z oceną trafności."
memory_store = "Zapisanie faktu, preferencji lub notatki w pamięci długoterminowej. Użyj kategorii 'core' dla trwałych faktów, 'daily' dla notatek sesji, 'conversation' dla kontekstu czatu lub niestandardowej nazwy kategorii."
microsoft365 = "Integracja z Microsoft 365: zarządzanie pocztą Outlook, wiadomościami Teams, wydarzeniami Calendar, plikami OneDrive i wyszukiwaniem SharePoint przez Microsoft Graph API"
model_routing_config = "Zarządzanie domyślnymi ustawieniami modelu, trasami dostawca/model opartymi na scenariuszach, regułami klasyfikacji i profilami podagentów delegate"
notion = "Interakcja z Notion: zapytania do baz danych, odczyt/tworzenie/aktualizacja stron i wyszukiwanie w przestrzeni roboczej."
pdf_read = "Wyodrębnienie zwykłego tekstu z pliku PDF w przestrzeni roboczej. Zwraca cały czytelny tekst. PDF zawierające tylko obrazy lub zaszyfrowane zwracają pusty wynik. Wymaga funkcji kompilacji 'rag-pdf'."
project_intel = "Analiza dostarczania projektu: generowanie raportów statusu, wykrywanie ryzyk, szkicowanie aktualizacji dla klienta, podsumowywanie sprintów i szacowanie nakładu pracy. Narzędzie analityczne tylko do odczytu."
proxy_config = "Zarządzanie ustawieniami proxy ZeroClaw (zakres: environment | zeroclaw | services), w tym zastosowanie w runtime i zmiennych środowiskowych procesu"
pushover = "Wysłanie powiadomienia Pushover na Twoje urządzenie. Wymaga PUSHOVER_TOKEN i PUSHOVER_USER_KEY w pliku .env."
schedule = """Zarządzanie zaplanowanymi zadaniami tylko dla shell. Akcje: create/add/once/list/get/cancel/remove/pause/resume. OSTRZEŻENIE: To narzędzie tworzy zadania shell, których wyjście jest tylko logowane i NIE dostarczane do żadnego kanału. Aby wysłać zaplanowaną wiadomość do Discord/Telegram/Slack/Matrix, użyj narzędzia cron_add z job_type='agent' i konfiguracją delivery taką jak {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Przechwycenie zrzutu ekranu bieżącego ekranu. Zwraca ścieżkę pliku i dane PNG zakodowane w base64."
security_ops = "Narzędzie operacji bezpieczeństwa dla zarządzanych usług cyberbezpieczeństwa. Akcje: triage_alert (klasyfikacja/priorytetyzacja alertów), run_playbook (wykonanie kroków reagowania na incydent), parse_vulnerability (parsowanie wyników skanowania), generate_report (generowanie raportów o stanie bezpieczeństwa), list_playbooks (lista dostępnych playbooków), alert_stats (podsumowanie metryk alertów)."
shell = "Wykonanie polecenia shell w katalogu przestrzeni roboczej"
sop_advance = "Raportowanie wyniku bieżącego kroku SOP i przejście do następnego kroku. Podaj run_id, czy krok się powiódł czy nie, oraz krótkie podsumowanie wyjścia."
sop_approve = "Zatwierdzenie oczekującego kroku SOP czekającego na zatwierdzenie operatora. Zwraca instrukcję kroku do wykonania. Użyj sop_status aby zobaczyć, które uruchomienia czekają."
sop_execute = "Ręczne uruchomienie standardowej procedury operacyjnej (SOP) według nazwy. Zwraca identyfikator uruchomienia i instrukcję pierwszego kroku. Użyj sop_list aby zobaczyć dostępne SOP."
sop_list = "Wyświetlenie wszystkich załadowanych standardowych procedur operacyjnych (SOP) z ich wyzwalaczami, priorytetem, liczbą kroków i liczbą aktywnych uruchomień. Opcjonalne filtrowanie według nazwy lub priorytetu."
sop_status = "Zapytanie o status wykonania SOP. Podaj run_id dla konkretnego uruchomienia lub sop_name aby wyświetlić uruchomienia danego SOP. Bez argumentów wyświetla wszystkie aktywne uruchomienia."
swarm = "Orkiestracja roju agentów do wspólnej obsługi zadania. Obsługuje strategie sekwencyjne (pipeline), równoległe (fan-out/fan-in) i routerowe (wybór przez LLM)."
tool_search = """Pobranie pełnych definicji schematów dla odroczonych narzędzi MCP, aby można było je wywołać. Użyj "select:name1,name2" do dokładnego dopasowania lub słów kluczowych do wyszukiwania."""
web_fetch = "Pobranie strony internetowej i zwrócenie jej zawartości jako czystego tekstu. Strony HTML są automatycznie konwertowane na czytelny tekst. Odpowiedzi JSON i zwykły tekst zwracane są bez zmian. Tylko żądania GET; podąża za przekierowaniami. Bezpieczeństwo: tylko domeny z listy dozwolonych, brak hostów lokalnych/prywatnych."
web_search_tool = "Wyszukiwanie informacji w internecie. Zwraca odpowiednie wyniki wyszukiwania z tytułami, adresami URL i opisami. Użyj do znajdowania aktualnych informacji, wiadomości lub tematów badawczych."
workspace = "Zarządzanie wieloklientowymi przestrzeniami roboczymi. Podkomendy: list, switch, create, info, export. Każda przestrzeń robocza zapewnia izolowaną pamięć, audyt, sekrety i ograniczenia narzędzi."
weather = "Pobieranie aktualnych warunków pogodowych i prognozy dla dowolnej lokalizacji na świecie. Obsługuje nazwy miast (w dowolnym języku lub piśmie), kody lotnisk IATA (np. 'LAX'), współrzędne GPS (np. '51.5,-0.1'), kody pocztowe i geolokalizację opartą na domenie. Zwraca temperaturę, temperaturę odczuwalną, wilgotność, prędkość/kierunek wiatru, opady, widoczność, ciśnienie, indeks UV i zachmurzenie. Opcjonalna prognoza na 0-3 dni z podziałem godzinowym. Jednostki domyślnie metryczne (°C, km/h, mm), ale można ustawić imperialne (°F, mph, cale) dla każdego żądania. Nie wymaga klucza API."

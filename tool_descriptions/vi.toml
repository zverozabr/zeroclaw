# Vietnamese tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Tạo, liệt kê, xác minh và khôi phục các bản sao lưu workspace"
browser = "Tự động hóa web/trình duyệt với các backend có thể thay thế (agent-browser, rust-native, computer_use). Hỗ trợ các hành động DOM cùng các hành động cấp OS tùy chọn (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) thông qua sidecar computer-use. Sử dụng 'snapshot' để ánh xạ các phần tử tương tác tới ref (@e1, @e2). Áp dụng browser.allowed_domains cho các hành động open."
browser_delegate = "Ủy thác các tác vụ dựa trên trình duyệt cho CLI hỗ trợ trình duyệt để tương tác với các ứng dụng web như Teams, Outlook, Jira, Confluence"
browser_open = "Mở một URL HTTPS đã được phê duyệt trong trình duyệt hệ thống. Ràng buộc bảo mật: chỉ các domain trong danh sách cho phép, không cho phép host cục bộ/riêng tư, không scraping."
cloud_ops = "Công cụ tư vấn chuyển đổi đám mây. Phân tích kế hoạch IaC, đánh giá lộ trình di chuyển, xem xét chi phí và kiểm tra kiến trúc theo các trụ cột Well-Architected Framework. Chỉ đọc: không tạo hoặc sửa đổi tài nguyên đám mây."
cloud_patterns = "Thư viện mẫu đám mây. Dựa trên mô tả khối lượng công việc, đề xuất các mẫu kiến trúc cloud-native phù hợp (container hóa, serverless, hiện đại hóa cơ sở dữ liệu, v.v.)."
composio = "Thực thi hành động trên hơn 1000 ứng dụng qua Composio (Gmail, Notion, GitHub, Slack, v.v.). Sử dụng action='list' để xem các hành động khả dụng (bao gồm tên tham số). action='execute' với action_name/tool_slug và params để chạy một hành động. Nếu không chắc chắn về tham số chính xác, hãy truyền 'text' thay thế với mô tả bằng ngôn ngữ tự nhiên (Composio sẽ giải quyết các tham số chính xác qua NLP). action='list_accounts' hoặc action='connected_accounts' để liệt kê các tài khoản đã kết nối OAuth. action='connect' với app/auth_config_id để lấy URL OAuth. connected_account_id được tự động giải quyết khi bỏ qua."
content_search = "Tìm kiếm nội dung tệp bằng mẫu regex trong workspace. Hỗ trợ ripgrep (rg) với fallback grep. Chế độ đầu ra: 'content' (dòng khớp với ngữ cảnh), 'files_with_matches' (chỉ đường dẫn tệp), 'count' (số lượng khớp mỗi tệp). Ví dụ: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Tạo một cron job theo lịch (shell hoặc agent) với lịch trình cron/at/every. Sử dụng job_type='agent' với prompt để chạy AI agent theo lịch. Để chuyển đầu ra tới kênh (Discord, Telegram, Slack, Mattermost, Matrix), đặt delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Đây là công cụ ưu tiên để gửi tin nhắn theo lịch/trì hoãn tới người dùng qua các kênh."""
cron_list = "Liệt kê tất cả các cron job đã lên lịch"
cron_remove = "Xóa một cron job theo ID"
cron_run = "Buộc chạy một cron job ngay lập tức và ghi lại lịch sử chạy"
cron_runs = "Liệt kê lịch sử chạy gần đây của một cron job"
cron_update = "Cập nhật một cron job hiện có (schedule, command, prompt, enabled, delivery, model, v.v.)"
data_management = "Quản lý lưu giữ dữ liệu workspace, xóa sạch và thống kê lưu trữ"
delegate = "Ủy thác tác vụ con cho agent chuyên biệt. Sử dụng khi: một tác vụ được hưởng lợi từ mô hình khác (ví dụ: tóm tắt nhanh, suy luận sâu, sinh mã). Agent con chạy một prompt đơn theo mặc định; với agentic=true nó có thể lặp với vòng lặp gọi công cụ có bộ lọc."
file_edit = "Chỉnh sửa tệp bằng cách thay thế một chuỗi khớp chính xác bằng nội dung mới"
file_read = "Đọc nội dung tệp với số dòng. Hỗ trợ đọc từng phần qua offset và limit. Trích xuất văn bản từ PDF; các tệp nhị phân khác được đọc với chuyển đổi lossy UTF-8."
file_write = "Ghi nội dung vào một tệp trong workspace"
git_operations = "Thực hiện các thao tác Git có cấu trúc (status, diff, log, branch, commit, add, checkout, stash). Cung cấp đầu ra JSON đã phân tích cú pháp và tích hợp với chính sách bảo mật cho điều khiển tự chủ."
glob_search = "Tìm kiếm tệp khớp với mẫu glob trong workspace. Trả về danh sách đường dẫn tệp khớp được sắp xếp, tương đối so với gốc workspace. Ví dụ: '**/*.rs' (tất cả tệp Rust), 'src/**/mod.rs' (tất cả mod.rs trong src)."
google_workspace = "Tương tác với các dịch vụ Google Workspace (Drive, Gmail, Calendar, Sheets, Docs, v.v.) qua gws CLI. Yêu cầu cài đặt và xác thực gws."
hardware_board_info = "Trả về thông tin đầy đủ của bo mạch (chip, kiến trúc, bản đồ bộ nhớ) cho phần cứng đã kết nối. Sử dụng khi: người dùng hỏi về 'thông tin bo mạch', 'phần cứng đã kết nối', 'thông tin chip', hoặc 'bản đồ bộ nhớ'."
hardware_memory_map = "Trả về bản đồ bộ nhớ (dải địa chỉ flash và RAM) cho phần cứng đã kết nối. Sử dụng khi: người dùng hỏi về 'địa chỉ bộ nhớ trên và dưới', 'bản đồ bộ nhớ', 'không gian địa chỉ', hoặc 'các địa chỉ có thể đọc'. Trả về dải flash/RAM từ datasheet."
hardware_memory_read = "Đọc giá trị bộ nhớ/thanh ghi thực tế từ Nucleo qua USB. Sử dụng khi: người dùng yêu cầu 'đọc giá trị thanh ghi', 'đọc bộ nhớ tại địa chỉ', 'kết xuất bộ nhớ', 'bộ nhớ thấp 0-126', hoặc 'cho địa chỉ và giá trị'. Trả về kết xuất hex. Yêu cầu Nucleo kết nối qua USB và tính năng probe. Tham số: address (hex, ví dụ: 0x20000000 cho đầu RAM), length (byte, mặc định 128)."
http_request = "Gửi yêu cầu HTTP tới các API bên ngoài. Hỗ trợ các phương thức GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Ràng buộc bảo mật: chỉ các domain trong danh sách cho phép, không cho phép host cục bộ/riêng tư, giới hạn timeout và kích thước phản hồi có thể cấu hình."
image_info = "Đọc siêu dữ liệu tệp hình ảnh (định dạng, kích thước, độ phân giải) và tùy chọn trả về dữ liệu mã hóa base64."
jira = "Tương tác với Jira: lấy ticket với mức chi tiết có thể cấu hình, tìm kiếm issue bằng JQL, và thêm bình luận với hỗ trợ mention và định dạng."
knowledge = "Quản lý đồ thị tri thức về quyết định kiến trúc, mẫu giải pháp, bài học kinh nghiệm và chuyên gia. Hành động: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Quản lý LinkedIn: tạo bài đăng, liệt kê bài đăng, bình luận, phản ứng, xóa bài đăng, xem mức tương tác, lấy thông tin hồ sơ và đọc chiến lược nội dung đã cấu hình. Yêu cầu thông tin LINKEDIN_* trong tệp .env."
discord_search = "Tìm kiếm lịch sử tin nhắn Discord được lưu trong discord.db. Sử dụng để tìm tin nhắn cũ, tóm tắt hoạt động kênh, hoặc tra cứu phát ngôn của người dùng. Hỗ trợ tìm kiếm từ khóa và bộ lọc tùy chọn: channel_id, since, until."
memory_forget = "Xóa một bản ghi nhớ theo khóa. Sử dụng để xóa dữ liệu lỗi thời hoặc nhạy cảm. Trả về kết quả bản ghi nhớ đã được tìm thấy và xóa hay chưa."
memory_recall = "Tìm kiếm bộ nhớ dài hạn để tìm các sự kiện, tùy chọn hoặc ngữ cảnh liên quan. Trả về kết quả có điểm xếp hạng theo mức độ liên quan."
memory_store = "Lưu một sự kiện, tùy chọn hoặc ghi chú vào bộ nhớ dài hạn. Sử dụng danh mục 'core' cho sự kiện vĩnh viễn, 'daily' cho ghi chú phiên, 'conversation' cho ngữ cảnh trò chuyện, hoặc tên danh mục tùy chỉnh."
microsoft365 = "Tích hợp Microsoft 365: quản lý thư Outlook, tin nhắn Teams, sự kiện Calendar, tệp OneDrive và tìm kiếm SharePoint qua Microsoft Graph API"
model_routing_config = "Quản lý cài đặt mô hình mặc định, tuyến nhà cung cấp/mô hình theo kịch bản, quy tắc phân loại và hồ sơ agent con delegate"
notion = "Tương tác với Notion: truy vấn cơ sở dữ liệu, đọc/tạo/cập nhật trang và tìm kiếm workspace."
pdf_read = "Trích xuất văn bản thuần từ tệp PDF trong workspace. Trả về tất cả văn bản có thể đọc được. PDF chỉ có hình ảnh hoặc được mã hóa trả về kết quả rỗng. Yêu cầu tính năng build 'rag-pdf'."
project_intel = "Trí tuệ giao hàng dự án: tạo báo cáo trạng thái, phát hiện rủi ro, soạn thảo cập nhật khách hàng, tóm tắt sprint và ước tính công sức. Công cụ phân tích chỉ đọc."
proxy_config = "Quản lý cài đặt proxy ZeroClaw (scope: environment | zeroclaw | services), bao gồm áp dụng runtime và process env"
pushover = "Gửi thông báo Pushover tới thiết bị của bạn. Yêu cầu PUSHOVER_TOKEN và PUSHOVER_USER_KEY trong tệp .env."
schedule = """Quản lý các tác vụ đã lên lịch chỉ dành cho shell. Hành động: create/add/once/list/get/cancel/remove/pause/resume. CẢNH BÁO: Công cụ này tạo các job shell mà đầu ra chỉ được ghi log, KHÔNG được gửi tới bất kỳ kênh nào. Để gửi tin nhắn theo lịch tới Discord/Telegram/Slack/Matrix, hãy sử dụng công cụ cron_add với job_type='agent' và cấu hình delivery như {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Chụp ảnh màn hình hiện tại. Trả về đường dẫn tệp và dữ liệu PNG mã hóa base64."
security_ops = "Công cụ vận hành bảo mật cho dịch vụ an ninh mạng được quản lý. Hành động: triage_alert (phân loại/ưu tiên cảnh báo), run_playbook (thực thi các bước ứng phó sự cố), parse_vulnerability (phân tích kết quả quét), generate_report (tạo báo cáo tình trạng bảo mật), list_playbooks (liệt kê các playbook khả dụng), alert_stats (tóm tắt số liệu cảnh báo)."
shell = "Thực thi lệnh shell trong thư mục workspace"
sop_advance = "Báo cáo kết quả bước SOP hiện tại và chuyển sang bước tiếp theo. Cung cấp run_id, bước thành công hay thất bại, và tóm tắt đầu ra ngắn gọn."
sop_approve = "Phê duyệt một bước SOP đang chờ phê duyệt của người vận hành. Trả về hướng dẫn bước cần thực thi. Sử dụng sop_status để xem các lần chạy đang chờ."
sop_execute = "Kích hoạt thủ công một Quy trình Vận hành Chuẩn (SOP) theo tên. Trả về ID lần chạy và hướng dẫn bước đầu tiên. Sử dụng sop_list để xem các SOP khả dụng."
sop_list = "Liệt kê tất cả các Quy trình Vận hành Chuẩn (SOP) đã tải với trigger, độ ưu tiên, số bước và số lần chạy đang hoạt động. Tùy chọn lọc theo tên hoặc độ ưu tiên."
sop_status = "Truy vấn trạng thái thực thi SOP. Cung cấp run_id cho lần chạy cụ thể, hoặc sop_name để liệt kê các lần chạy cho SOP đó. Không có đối số sẽ hiển thị tất cả các lần chạy đang hoạt động."
swarm = "Điều phối một bầy agent để xử lý tác vụ một cách cộng tác. Hỗ trợ các chiến lược tuần tự (pipeline), song song (fan-out/fan-in) và router (LLM chọn)."
tool_search = """Lấy định nghĩa schema đầy đủ cho các công cụ MCP đã trì hoãn để có thể gọi chúng. Sử dụng "select:name1,name2" để khớp chính xác hoặc từ khóa để tìm kiếm."""
web_fetch = "Tải một trang web và trả về nội dung dưới dạng văn bản thuần sạch. Các trang HTML được tự động chuyển đổi thành văn bản dễ đọc. Phản hồi JSON và văn bản thuần được trả về nguyên trạng. Chỉ yêu cầu GET; theo dõi chuyển hướng. Bảo mật: chỉ domain trong danh sách cho phép, không cho phép host cục bộ/riêng tư."
web_search_tool = "Tìm kiếm thông tin trên web. Trả về kết quả tìm kiếm liên quan với tiêu đề, URL và mô tả. Sử dụng để tìm thông tin hiện tại, tin tức hoặc chủ đề nghiên cứu."
workspace = "Quản lý workspace đa khách hàng. Lệnh con: list, switch, create, info, export. Mỗi workspace cung cấp bộ nhớ, kiểm toán, bí mật và hạn chế công cụ cách ly."
weather = "Lấy điều kiện thời tiết hiện tại và dự báo cho bất kỳ vị trí nào trên thế giới. Hỗ trợ tên thành phố (bằng bất kỳ ngôn ngữ hoặc ký tự nào), mã sân bay IATA (ví dụ: 'LAX'), tọa độ GPS (ví dụ: '51.5,-0.1'), mã bưu chính, và định vị dựa trên domain. Trả về nhiệt độ, cảm giác thực, độ ẩm, tốc độ/hướng gió, lượng mưa, tầm nhìn, áp suất, chỉ số UV và mây che phủ. Tùy chọn dự báo 0-3 ngày với phân tích theo giờ. Đơn vị mặc định là hệ mét (°C, km/h, mm) nhưng có thể đặt thành hệ Anh (°F, mph, inches) cho mỗi yêu cầu. Không cần API key."

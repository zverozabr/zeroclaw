# Magyar eszközleírások (Hungarian tool descriptions)
#
# A [tools] alatt minden kulcs az eszköz name() visszatérési értékének felel meg.
# Az értékek a system promptokban megjelenő, ember által olvasható leírások.
# A hiányzó kulcsok az angol (en.toml) leírásokra esnek vissza.

[tools]
backup = "Munkaterületi biztonsági mentések létrehozása, listázása, ellenőrzése és visszaállítása"
browser = "Web-/böngészőautomatizálás cserélhető backend-ekkel (agent-browser, rust-native, computer_use). Támogatja a DOM-műveleteket és opcionális OS-szintű műveleteket (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) a computer-use segédprogramon keresztül. Használja a 'snapshot'-ot az interaktív elemek refs-ekhez (@e1, @e2) való hozzárendeléséhez. Az open műveleteknél érvényesíti a browser.allowed_domains beállítást."
browser_delegate = "Böngészőalapú feladatok delegálása böngészőképes CLI-nek webalkalmazásokkal (Teams, Outlook, Jira, Confluence) való interakcióhoz"
browser_open = "Jóváhagyott HTTPS URL megnyitása a rendszer böngészőjében. Biztonsági korlátozások: csak engedélyezett domainek, nincs helyi/privát host, nincs scraping."
cloud_ops = "Felhőtranszformációs tanácsadó eszköz. Elemzi az IaC-terveket, értékeli a migrációs útvonalakat, felülvizsgálja a költségeket és ellenőrzi az architektúrát a Well-Architected Framework pillérei szerint. Csak olvasás: nem hoz létre és nem módosít felhőerőforrásokat."
cloud_patterns = "Felhőminta-könyvtár. A munkaterhelés leírása alapján alkalmazható felhőalapú architektúramintákat javasol (konténerizáció, serverless, adatbázis-modernizáció stb.)."
composio = "Műveletek végrehajtása 1000+ alkalmazáson a Composio segítségével (Gmail, Notion, GitHub, Slack stb.). Használja az action='list'-et az elérhető műveletek megtekintéséhez (paraméterneveket is tartalmaz). action='execute' az action_name/tool_slug és params paraméterekkel művelet futtatásához. Ha nem biztos a pontos paraméterekben, adja meg a 'text'-et természetes nyelvű leírással (a Composio NLP-vel oldja fel a helyes paramétereket). action='list_accounts' vagy action='connected_accounts' az OAuth-csatlakoztatott fiókok listázásához. action='connect' az app/auth_config_id paraméterrel az OAuth URL lekéréséhez. A connected_account_id automatikusan feloldódik, ha nincs megadva."
content_search = "Fájltartalom keresése regex mintával a munkaterületen belül. Támogatja a ripgrep-et (rg) grep tartalékkal. Kimeneti módok: 'content' (egyező sorok kontextussal), 'files_with_matches' (csak fájlelérési utak), 'count' (egyezésszám fájlonként). Példa: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Ütemezett cron feladat létrehozása (shell vagy agent) cron/at/every ütemezéssel. Használja a job_type='agent'-et prompt-tal az AI agent ütemezett futtatásához. A kimenet csatornára (Discord, Telegram, Slack, Mattermost, Matrix) való kézbesítéséhez állítsa be: delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Ez az előnyben részesített eszköz ütemezett/késleltetett üzenetek küldéséhez felhasználóknak csatornákon keresztül."""
cron_list = "Az összes ütemezett cron feladat listázása"
cron_remove = "Cron feladat eltávolítása ID alapján"
cron_run = "Cron feladat azonnali kényszerített futtatása és futási előzmények rögzítése"
cron_runs = "Cron feladat legutóbbi futási előzményeinek listázása"
cron_update = "Meglévő cron feladat módosítása (ütemezés, parancs, prompt, engedélyezés, kézbesítés, modell stb.)"
data_management = "Munkaterületi adatmegőrzés, törlés és tárolási statisztikák"
delegate = "Részfeladat delegálása specializált agentnek. Használat: ha a feladat más modellből profitál (pl. gyors összefoglalás, mély következtetés, kódgenerálás). Az alárendelt agent alapértelmezetten egyetlen promptot futtat; agentic=true esetén szűrt eszközhívás-ciklussal iterálhat."
file_edit = "Fájl szerkesztése pontos karakterlánc-egyezés új tartalommal való cseréjével"
file_read = "Fájltartalom olvasása sorszámokkal. Támogatja a részleges olvasást offset és limit segítségével. Szöveget kinyeri PDF-ből; más bináris fájlokat veszteséges UTF-8 konverzióval olvas."
file_write = "Tartalom írása fájlba a munkaterületen"
git_operations = "Strukturált Git műveletek végrehajtása (status, diff, log, branch, commit, add, checkout, stash). Elemzett JSON kimenetet biztosít és integrálódik a biztonsági házirenddel az autonómia-vezérlésekhez."
glob_search = "A munkaterületen belül glob mintának megfelelő fájlok keresése. A munkaterület gyökeréhez képest relatív, rendezett fájlelérési utak listáját adja vissza. Példák: '**/*.rs' (minden Rust fájl), 'src/**/mod.rs' (minden mod.rs az src-ben)."
google_workspace = "Interakció Google Workspace szolgáltatásokkal (Drive, Gmail, Calendar, Sheets, Docs stb.) a gws CLI-n keresztül. A gws telepítése és hitelesítése szükséges."
hardware_board_info = "Csatlakoztatott hardver teljes alaplapinformációinak visszaadása (chip, architektúra, memóriatérkép). Használat: ha a felhasználó alaplapinformációt, csatlakoztatott hardvert vagy chipinformációt kérdez."
hardware_memory_map = "Csatlakoztatott hardver memóriatérképének visszaadása (flash és RAM címtartományok). Használat: ha a felhasználó memóriacímeket, címteret vagy olvasható címeket kérdez. Flash/RAM tartományokat ad vissza az adatlapokból."
hardware_memory_read = "Valós memória-/regiszterértékek olvasása a Nucleo-ról USB-n keresztül. Használat: ha a felhasználó regiszterértékek olvasását, memória olvasását adott címen vagy memória dumpolását kéri. Hexadecimális dump-ot ad vissza. Nucleo USB-csatlakoztatása és probe funkció szükséges."
http_request = "HTTP kérések küldése külső API-khoz. Támogatja a GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS metódusokat. Biztonsági korlátozások: csak engedélyezett domainek, nincs helyi/privát host, konfigurálható időtúllépés és válaszméret-korlátok."
image_info = "Képfájl metaadatainak olvasása (formátum, méretek, méret) és opcionálisan base64 kódolású adatok visszaadása."
jira = "Interakció a Jira-val: jegyek lekérése konfigurálható részletességgel, problémák keresése JQL-lel, és megjegyzések hozzáadása említés- és formázástámogatással."
knowledge = "Architektúrai döntések, megoldásmintk, tanulságok és szakértők tudásgráfjának kezelése. Műveletek: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "LinkedIn kezelése: bejegyzések létrehozása, saját bejegyzések listázása, hozzászólás, reakció, bejegyzések törlése, elköteleződés megtekintése, profilinformáció lekérése és a beállított tartalomstratégia olvasása. LINKEDIN_* hitelesítő adatok szükségesek a .env fájlban."
discord_search = "Discord üzenetelőzmények keresése a discord.db-ben. Használat: korábbi üzenetek keresése, csatornaaktivitás összefoglalása vagy felhasználói üzenetek keresése. Támogatja a kulcsszavas keresést és opcionális szűrőket: channel_id, since, until."
memory_forget = "Emlék eltávolítása kulcs alapján. Elavult tények vagy érzékeny adatok törlésére használható. Visszaadja, hogy az emlék megtalálható és eltávolítható volt-e."
memory_recall = "Releváns tények, preferenciák vagy kontextus keresése a hosszú távú memóriában. Relevancia szerint rangsorolt, pontozott eredményeket ad vissza."
memory_store = "Tény, preferencia vagy jegyzet tárolása a hosszú távú memóriában. Használja a 'core' kategóriát állandó tényekhez, a 'daily'-t munkamenet-jegyzetekhez, a 'conversation'-t csevegési kontextushoz, vagy egyéni kategorianevet."
microsoft365 = "Microsoft 365 integráció: Outlook levelek, Teams üzenetek, Calendar események, OneDrive fájlok és SharePoint keresés kezelése a Microsoft Graph API-n keresztül"
model_routing_config = "Alapértelmezett modellbeállítások, forgatókönyv-alapú szolgáltató/modell útvonalak, osztályozási szabályok és delegált alárendelt agent profilok kezelése"
notion = "Interakció a Notion-nel: adatbázisok lekérdezése, oldalak olvasása/létrehozása/frissítése és munkaterületi keresés."
pdf_read = "Egyszerű szöveg kinyerése PDF fájlból a munkaterületen. Minden olvasható szöveget visszaad. Csak képeket tartalmazó vagy titkosított PDF-ek üres eredményt adnak. A 'rag-pdf' build funkció szükséges."
project_intel = "Projektszállítási intelligencia: állapotjelentések generálása, kockázatok felismerése, ügyfélfrissítések vázlata, sprintek összefoglalása és erőfeszítés becslése. Csak olvasható elemzőeszköz."
proxy_config = "ZeroClaw proxy beállítások kezelése (hatókör: environment | zeroclaw | services), beleértve a runtime és folyamatkörnyezeti alkalmazást"
pushover = "Pushover értesítés küldése az eszközére. PUSHOVER_TOKEN és PUSHOVER_USER_KEY szükséges a .env fájlban."
schedule = """Csak shell ütemezett feladatok kezelése. Műveletek: create/add/once/list/get/cancel/remove/pause/resume. FIGYELMEZTETÉS: Ez az eszköz shell feladatokat hoz létre, amelyek kimenete csak naplózva van, NEM kézbesítve semmilyen csatornára. Ütemezett üzenet küldéséhez Discord/Telegram/Slack/Matrix csatornára használja a cron_add eszközt job_type='agent' és kézbesítési konfigurációval, mint {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Képernyőkép készítése az aktuális képernyőről. A fájl elérési útját és base64 kódolású PNG adatokat ad vissza."
security_ops = "Biztonsági műveleti eszköz felügyelt kiberbiztonsági szolgáltatásokhoz. Műveletek: triage_alert (riasztások osztályozása/prioritizálása), run_playbook (incidenskezelési lépések végrehajtása), parse_vulnerability (vizsgálati eredmények elemzése), generate_report (biztonsági helyzetjelentések létrehozása), list_playbooks (elérhető forgatókönyvek listázása), alert_stats (riasztási metrikák összefoglalása)."
shell = "Shell parancs végrehajtása a munkaterület könyvtárában"
sop_advance = "Az aktuális SOP lépés eredményének jelentése és továbblépés a következő lépésre. Adja meg a run_id-t, hogy a lépés sikeres vagy sikertelen volt-e, és egy rövid kimeneti összefoglalót."
sop_approve = "Operátori jóváhagyásra váró függő SOP lépés jóváhagyása. Visszaadja a végrehajtandó lépés utasítását. Használja a sop_status-t a várakozó futtatások megtekintéséhez."
sop_execute = "Szabványos Működési Eljárás (SOP) manuális indítása név alapján. Visszaadja a futtatási ID-t és az első lépés utasítását. Használja a sop_list-et az elérhető SOP-ok megtekintéséhez."
sop_list = "Az összes betöltött Szabványos Működési Eljárás (SOP) listázása triggerekkel, prioritással, lépésszámmal és aktív futtatások számával. Opcionális szűrés név vagy prioritás alapján."
sop_status = "SOP végrehajtási állapot lekérdezése. Adjon meg run_id-t egy adott futtatáshoz, vagy sop_name-et az adott SOP futtatásainak listázásához. Argumentumok nélkül az összes aktív futtatást mutatja."
swarm = "Agent-raj összehangolása feladatok együttműködő kezeléséhez. Támogatja a szekvenciális (pipeline), párhuzamos (fan-out/fan-in) és router (LLM által kiválasztott) stratégiákat."
tool_search = """Halasztott MCP eszközök teljes sémadefinícióinak lekérése a meghívásukhoz. Használja a "select:name1,name2" formátumot pontos egyezéshez vagy kulcsszavakat kereséshez."""
web_fetch = "Weboldal lekérése és tartalom visszaadása tiszta egyszerű szövegként. A HTML oldalak automatikusan olvasható szöveggé alakulnak. A JSON és egyszerű szöveges válaszok változatlanul kerülnek visszaadásra. Csak GET kérések; követi az átirányításokat. Biztonság: csak engedélyezett domainek, nincs helyi/privát host."
web_search_tool = "Információkeresés a weben. Releváns keresési eredményeket ad vissza címekkel, URL-ekkel és leírásokkal. Használja aktuális információk, hírek vagy kutatási témák kereséséhez."
workspace = "Többkliens munkaterületek kezelése. Alparancsok: list, switch, create, info, export. Minden munkaterület elkülönített memóriát, auditot, titkokat és eszközkorlátozásokat biztosít."
weather = "Aktuális időjárási viszonyok és előrejelzés lekérése a világ bármely pontjáról. Támogatja a városneveket (bármilyen nyelven vagy írásrendszerben), IATA repülőtéri kódokat (pl. 'BUD'), GPS koordinátákat (pl. '47.5,19.0'), irányítószámokat és domain-alapú geolokációt. Visszaadja a hőmérsékletet, hőérzetet, páratartalmat, szélsebességet/-irányt, csapadékot, láthatóságot, légnyomást, UV-indexet és felhőzetet. Opcionális 0–3 napos előrejelzés óránkénti bontással. Az egységek alapértelmezetten metrikusak (°C, km/h, mm), de kérésenként beállíthatók angolszász (°F, mph, hüvelyk) mértékegységre. Nincs szükség API kulcsra."

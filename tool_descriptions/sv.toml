# Svenska verktygsbeskrivningar (Swedish tool descriptions)
#
# Varje nyckel under [tools] motsvarar verktygets name()-returvärde.
# Värdena är de läsbara beskrivningar som visas i system prompts.
# Saknade nycklar faller tillbaka på engelska (en.toml) beskrivningar.

[tools]
backup = "Skapa, lista, verifiera och återställa säkerhetskopior av arbetsytan"
browser = "Webb-/webbläsarautomation med utbytbara backend:ar (agent-browser, rust-native, computer_use). Stödjer DOM-åtgärder samt valfria OS-nivååtgärder (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) via en computer-use-sidovagn. Använd 'snapshot' för att mappa interaktiva element till refs (@e1, @e2). Tillämpar browser.allowed_domains för open-åtgärder."
browser_delegate = "Delegera webbläsarbaserade uppgifter till en webbläsarkapabel CLI för interaktion med webbapplikationer som Teams, Outlook, Jira, Confluence"
browser_open = "Öppna en godkänd HTTPS URL i systemets webbläsare. Säkerhetsbegränsningar: endast tillåtna domäner, inga lokala/privata värdar, ingen skrapning."
cloud_ops = "Rådgivningsverktyg för molntransformation. Analyserar IaC-planer, bedömer migreringsvägar, granskar kostnader och kontrollerar arkitektur mot Well-Architected Framework-pelarna. Skrivskyddat: skapar eller ändrar inte molnresurser."
cloud_patterns = "Molnmönsterbibliotek. Givet en arbetsbelastningsbeskrivning föreslås tillämpliga molnbaserade arkitekturmönster (containerisering, serverless, databasmodernisering etc.)."
composio = "Utför åtgärder på 1000+ appar via Composio (Gmail, Notion, GitHub, Slack etc.). Använd action='list' för att se tillgängliga åtgärder (inkluderar parameternamn). action='execute' med action_name/tool_slug och params för att köra en åtgärd. Om du är osäker på exakta parametrar, skicka 'text' istället med en beskrivning i naturligt språk (Composio löser rätt parametrar via NLP). action='list_accounts' eller action='connected_accounts' för att lista OAuth-anslutna konton. action='connect' med app/auth_config_id för att få OAuth URL. connected_account_id löses automatiskt när det utelämnas."
content_search = "Sök filinnehåll med regex-mönster inom arbetsytan. Stödjer ripgrep (rg) med grep-fallback. Utdatalägen: 'content' (matchande rader med kontext), 'files_with_matches' (endast filsökvägar), 'count' (antal matchningar per fil). Exempel: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Skapa ett schemalagt cron-jobb (shell eller agent) med cron/at/every-scheman. Använd job_type='agent' med en prompt för att köra AI-agenten enligt schema. För att leverera utdata till en kanal (Discord, Telegram, Slack, Mattermost, Matrix), ställ in delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Detta är det föredragna verktyget för att skicka schemalagda/fördröjda meddelanden till användare via kanaler."""
cron_list = "Lista alla schemalagda cron-jobb"
cron_remove = "Ta bort ett cron-jobb efter ID"
cron_run = "Tvångskör ett cron-jobb omedelbart och registrera körhistorik"
cron_runs = "Lista senaste körhistoriken för ett cron-jobb"
cron_update = "Ändra ett befintligt cron-jobb (schema, kommando, prompt, aktiverat, leverans, modell etc.)"
data_management = "Datalagring, rensning och lagringsstatistik för arbetsytan"
delegate = "Delegera en deluppgift till en specialiserad agent. Använd när: en uppgift drar nytta av en annan modell (t.ex. snabb sammanfattning, djup resonering, kodgenerering). Underagenten kör som standard en enda prompt; med agentic=true kan den iterera med en filtrerad verktygsanropsloop."
file_edit = "Redigera en fil genom att ersätta en exakt strängmatchning med nytt innehåll"
file_read = "Läs filinnehåll med radnummer. Stödjer partiell läsning via offset och limit. Extraherar text från PDF; andra binärfiler läses med förlustbringande UTF-8-konvertering."
file_write = "Skriv innehåll till en fil i arbetsytan"
git_operations = "Utför strukturerade Git-operationer (status, diff, log, branch, commit, add, checkout, stash). Ger parsad JSON-utdata och integrerar med säkerhetspolicyn för autonomikontroller."
glob_search = "Sök efter filer som matchar ett glob-mönster inom arbetsytan. Returnerar en sorterad lista med filsökvägar relativt arbetsytans rot. Exempel: '**/*.rs' (alla Rust-filer), 'src/**/mod.rs' (alla mod.rs i src)."
google_workspace = "Interagera med Google Workspace-tjänster (Drive, Gmail, Calendar, Sheets, Docs etc.) via gws CLI. Kräver att gws är installerat och autentiserat."
hardware_board_info = "Returnera fullständig kortinformation (chip, arkitektur, minneskarta) för anslutet hårdvara. Använd när: användaren frågar om kortinformation, ansluten hårdvara, chipinformation."
hardware_memory_map = "Returnera minneskartan (flash- och RAM-adressintervall) för ansluten hårdvara. Använd när: användaren frågar om minnesadresser, adressutrymme eller läsbara adresser. Returnerar flash/RAM-intervall från datablad."
hardware_memory_read = "Läs faktiska minnes-/registervärden från Nucleo via USB. Använd när: användaren ber om att läsa registervärden, läsa minne vid en adress, dumpa minne. Returnerar hexdump. Kräver Nucleo ansluten via USB och probe-funktionen."
http_request = "Gör HTTP-förfrågningar till externa API:er. Stödjer metoderna GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Säkerhetsbegränsningar: endast tillåtna domäner, inga lokala/privata värdar, konfigurerbar timeout och svarsstorleksgränser."
image_info = "Läs bildfils metadata (format, dimensioner, storlek) och returnera valfritt base64-kodade data."
jira = "Interagera med Jira: hämta ärenden med konfigurerbar detaljnivå, sök ärenden med JQL och lägg till kommentarer med stöd för omnämnanden och formatering."
knowledge = "Hantera en kunskapsgraf med arkitekturbeslut, lösningsmönster, lärdomar och experter. Åtgärder: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Hantera LinkedIn: skapa inlägg, lista dina inlägg, kommentera, reagera, ta bort inlägg, visa engagemang, hämta profilinformation och läs den konfigurerade innehållsstrategin. Kräver LINKEDIN_*-autentiseringsuppgifter i .env-filen."
discord_search = "Sök i Discord-meddelandehistorik lagrad i discord.db. Använd för att hitta tidigare meddelanden, sammanfatta kanalaktivitet eller slå upp vad användare sagt. Stödjer nyckelordssökning och valfria filter: channel_id, since, until."
memory_forget = "Ta bort ett minne efter nyckel. Använd för att radera föråldrade fakta eller känsliga data. Returnerar om minnet hittades och togs bort."
memory_recall = "Sök i långtidsminnet efter relevanta fakta, preferenser eller kontext. Returnerar poängsatta resultat rankade efter relevans."
memory_store = "Lagra ett faktum, en preferens eller en anteckning i långtidsminnet. Använd kategorin 'core' för permanenta fakta, 'daily' för sessionsanteckningar, 'conversation' för chattkontext eller ett anpassat kategorinamn."
microsoft365 = "Microsoft 365-integration: hantera Outlook-e-post, Teams-meddelanden, Calendar-händelser, OneDrive-filer och SharePoint-sökning via Microsoft Graph API"
model_routing_config = "Hantera standardmodellinställningar, scenariobaserade leverantörs-/modellvägar, klassificeringsregler och delegerade underagentprofiler"
notion = "Interagera med Notion: fråga databaser, läs/skapa/uppdatera sidor och sök i arbetsytan."
pdf_read = "Extrahera ren text från en PDF-fil i arbetsytan. Returnerar all läsbar text. PDF:er med enbart bilder eller krypterade PDF:er ger tomt resultat. Kräver build-funktionen 'rag-pdf'."
project_intel = "Projektleveransintelligens: generera statusrapporter, upptäck risker, utkasta kunduppdateringar, sammanfatta sprintar och uppskatta arbetsinsats. Skrivskyddat analysverktyg."
proxy_config = "Hantera ZeroClaw proxy-inställningar (omfång: environment | zeroclaw | services), inklusive tillämpning på runtime och processmiljö"
pushover = "Skicka en Pushover-avisering till din enhet. Kräver PUSHOVER_TOKEN och PUSHOVER_USER_KEY i .env-filen."
schedule = """Hantera schemalagda uppgifter (enbart shell). Åtgärder: create/add/once/list/get/cancel/remove/pause/resume. VARNING: Detta verktyg skapar shell-jobb vars utdata bara loggas, INTE levereras till någon kanal. För att skicka ett schemalagt meddelande till Discord/Telegram/Slack/Matrix, använd verktyget cron_add med job_type='agent' och en leveranskonfiguration som {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Ta en skärmbild av aktuell skärm. Returnerar filsökvägen och base64-kodade PNG-data."
security_ops = "Säkerhetsoperationsverktyg för hanterade cybersäkerhetstjänster. Åtgärder: triage_alert (klassificera/prioritera larm), run_playbook (utför incidentresponssteg), parse_vulnerability (tolka skanningsresultat), generate_report (skapa säkerhetsstatusrapporter), list_playbooks (lista tillgängliga playbooks), alert_stats (sammanfatta larmmetrik)."
shell = "Kör ett shell-kommando i arbetsytans katalog"
sop_advance = "Rapportera resultatet av det aktuella SOP-steget och gå vidare till nästa steg. Ange run_id, om steget lyckades eller misslyckades och en kort utdatasammanfattning."
sop_approve = "Godkänn ett väntande SOP-steg som inväntar operatörsgodkännande. Returnerar steginstruktionen att utföra. Använd sop_status för att se vilka körningar som väntar."
sop_execute = "Utlös manuellt en standardoperativprocedur (SOP) efter namn. Returnerar körnings-ID och första stegets instruktion. Använd sop_list för att se tillgängliga SOP:er."
sop_list = "Lista alla laddade standardoperativprocedurer (SOP) med deras utlösare, prioritet, antal steg och antal aktiva körningar. Filtrera valfritt efter namn eller prioritet."
sop_status = "Fråga SOP-exekveringsstatus. Ange run_id för en specifik körning eller sop_name för att lista körningar för den SOP:en. Utan argument visas alla aktiva körningar."
swarm = "Orkestrera en svärm av agenter för att samarbeta kring en uppgift. Stödjer sekventiella (pipeline), parallella (fan-out/fan-in) och router (LLM-vald) strategier."
tool_search = """Hämta fullständiga schemadefinitioner för uppskjutna MCP-verktyg så att de kan anropas. Använd "select:name1,name2" för exakt matchning eller nyckelord för sökning."""
web_fetch = "Hämta en webbsida och returnera innehållet som ren text. HTML-sidor konverteras automatiskt till läsbar text. JSON- och rentextsvar returneras som de är. Endast GET-förfrågningar; följer omdirigeringar. Säkerhet: endast tillåtna domäner, inga lokala/privata värdar."
web_search_tool = "Sök på webben efter information. Returnerar relevanta sökresultat med titlar, URL:er och beskrivningar. Använd för att hitta aktuell information, nyheter eller forskningsämnen."
workspace = "Hantera arbetsytor för flera klienter. Underkommandon: list, switch, create, info, export. Varje arbetsyta ger isolerat minne, revision, hemligheter och verktygsbegränsningar."
weather = "Hämta aktuella väderförhållanden och prognos för valfri plats i världen. Stödjer stadsnamn (på valfritt språk eller skrift), IATA-flygplatskoder (t.ex. 'ARN'), GPS-koordinater (t.ex. '59.3,18.1'), postnummer och domänbaserad geolokalisering. Returnerar temperatur, upplevd temperatur, luftfuktighet, vindhastighet/-riktning, nederbörd, sikt, lufttryck, UV-index och molntäcke. Valfri 0–3 dagars prognos med timvis uppdelning. Enheter är som standard metriska (°C, km/h, mm) men kan ställas in på imperial (°F, mph, tum) per förfrågan. Ingen API-nyckel krävs."

# Hebrew tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "יצירה, הצגה, אימות ושחזור של גיבויי סביבת עבודה"
browser = "אוטומציית ווב/browser עם backends מתחברים (agent-browser, rust-native, computer_use). תומך בפעולות DOM ובפעולות אופציונליות ברמת מערכת ההפעלה (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) דרך sidecar של computer-use. השתמש ב-'snapshot' כדי למפות אלמנטים אינטראקטיביים ל-refs (@e1, @e2). אוכף browser.allowed_domains עבור פעולות open."
browser_delegate = "האצלת משימות מבוססות browser ל-CLI עם יכולת browser לאינטראקציה עם יישומי ווב כמו Teams, Outlook, Jira, Confluence"
browser_open = "פתיחת HTTPS URL מאושר בדפדפן המערכת. מגבלות אבטחה: רק דומיינים מרשימת ההיתרים, ללא מארחים מקומיים/פרטיים, ללא סריקה."
cloud_ops = "כלי ייעוץ לטרנספורמציה בענן. מנתח תוכניות IaC, מעריך מסלולי הגירה, סוקר עלויות ובודק ארכיטקטורה מול עמודי Well-Architected Framework. קריאה בלבד: לא יוצר ולא משנה משאבי ענן."
cloud_patterns = "ספריית תבניות ענן. בהינתן תיאור עומס עבודה, מציע תבניות ארכיטקטוניות cloud-native מתאימות (קונטיינריזציה, serverless, מודרניזציה של בסיסי נתונים וכו')."
composio = "ביצוע פעולות ב-1000+ אפליקציות דרך Composio (Gmail, Notion, GitHub, Slack וכו'). השתמש ב-action='list' לצפייה בפעולות זמינות (כולל שמות פרמטרים). action='execute' עם action_name/tool_slug ו-params להרצת פעולה. אם הפרמטרים המדויקים אינם ידועים, העבר 'text' עם תיאור בשפה טבעית (Composio יפתור את הפרמטרים הנכונים דרך NLP). action='list_accounts' או action='connected_accounts' לרשימת חשבונות מחוברי OAuth. action='connect' עם app/auth_config_id לקבלת OAuth URL. connected_account_id מזוהה אוטומטית כשלא מצוין."
content_search = "חיפוש תוכן קבצים לפי תבנית regex בסביבת העבודה. תומך ב-ripgrep (rg) עם fallback ל-grep. מצבי פלט: 'content' (שורות תואמות עם הקשר), 'files_with_matches' (נתיבי קבצים בלבד), 'count' (ספירת התאמות לכל קובץ). דוגמה: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """יצירת משימת cron מתוזמנת (shell או agent) עם לוחות זמנים cron/at/every. השתמש ב-job_type='agent' עם prompt להרצת סוכן AI לפי לוח זמנים. לשליחת פלט לערוץ (Discord, Telegram, Slack, Mattermost, Matrix), הגדר delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. זהו הכלי המועדף לשליחת הודעות מתוזמנות/מושהות למשתמשים דרך ערוצים."""
cron_list = "הצגת רשימת כל משימות ה-cron המתוזמנות"
cron_remove = "הסרת משימת cron לפי id"
cron_run = "הרצה מיידית מאולצת של משימת cron עם רישום בהיסטוריית ההרצות"
cron_runs = "הצגת היסטוריית הרצות אחרונות של משימת cron"
cron_update = "עדכון משימת cron קיימת (schedule, command, prompt, enabled, delivery, model וכו')"
data_management = "שמירת נתוני סביבת עבודה, מחיקה וסטטיסטיקות אחסון"
delegate = "האצלת תת-משימה לסוכן מתמחה. השתמש כאשר: משימה נהנית ממודל אחר (למשל סיכום מהיר, חשיבה מעמיקה, יצירת קוד). תת-הסוכן מריץ prompt בודד כברירת מחדל; עם agentic=true יכול לבצע איטרציות עם לולאת קריאות כלים מסוננת."
file_edit = "עריכת קובץ על ידי החלפת התאמת מחרוזת מדויקת בתוכן חדש"
file_read = "קריאת תוכן קובץ עם מספרי שורות. תומך בקריאה חלקית דרך offset ו-limit. מחלץ טקסט מ-PDF; קבצים בינאריים אחרים נקראים עם המרת lossy UTF-8."
file_write = "כתיבת תוכן לקובץ בסביבת העבודה"
git_operations = "ביצוע פעולות Git מובנות (status, diff, log, branch, commit, add, checkout, stash). מספק פלט JSON מפורסר ומשתלב עם מדיניות אבטחה לבקרת אוטונומיה."
glob_search = "חיפוש קבצים התואמים תבנית glob בסביבת העבודה. מחזיר רשימה ממוינת של נתיבי קבצים תואמים ביחס לשורש סביבת העבודה. דוגמאות: '**/*.rs' (כל קבצי Rust), 'src/**/mod.rs' (כל mod.rs ב-src)."
google_workspace = "אינטראקציה עם שירותי Google Workspace (Drive, Gmail, Calendar, Sheets, Docs וכו') דרך CLI של gws. דורש gws מותקן ומאומת."
hardware_board_info = "החזרת מידע מלא על לוח (שבב, ארכיטקטורה, מפת זיכרון) עבור חומרה מחוברת. השתמש כאשר: המשתמש שואל על 'board info', 'what board do I have', 'connected hardware', 'chip info', 'what hardware' או 'memory map'."
hardware_memory_map = "החזרת מפת זיכרון (טווחי כתובות flash ו-RAM) עבור חומרה מחוברת. השתמש כאשר: המשתמש שואל על 'upper and lower memory addresses', 'memory map', 'address space' או 'readable addresses'. מחזיר טווחי flash/RAM מדפי נתונים."
hardware_memory_read = "קריאת ערכי זיכרון/רגיסטרים בפועל מ-Nucleo דרך USB. השתמש כאשר: המשתמש מבקש 'read register values', 'read memory at address', 'dump memory', 'lower memory 0-126' או 'give address and value'. מחזיר hex dump. דורש Nucleo מחובר דרך USB ותכונת probe. פרמטרים: address (hex, למשל 0x20000000 לתחילת RAM), length (בתים, ברירת מחדל 128)."
http_request = "ביצוע בקשות HTTP ל-API חיצוניים. תומך בשיטות GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. מגבלות אבטחה: רק דומיינים מרשימת ההיתרים, ללא מארחים מקומיים/פרטיים, מגבלות timeout וגודל תגובה ניתנות להגדרה."
image_info = "קריאת מטא-נתוני קובץ תמונה (פורמט, מימדים, גודל) והחזרת נתונים מקודדים ב-base64 באופן אופציונלי."
jira = "אינטראקציה עם Jira: קבלת כרטיסים עם רמת פירוט ניתנת להגדרה, חיפוש נושאים ב-JQL, והוספת תגובות עם תמיכה באזכורים ועיצוב."
knowledge = "ניהול גרף ידע של החלטות ארכיטקטורה, תבניות פתרון, לקחים שנלמדו ומומחים. פעולות: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "ניהול LinkedIn: יצירת פוסטים, הצגת הפוסטים שלך, תגובה, ריאקציה, מחיקת פוסטים, צפייה במעורבות, קבלת מידע פרופיל וקריאת אסטרטגיית התוכן המוגדרת. דורש אישורי LINKEDIN_* בקובץ .env."
discord_search = "חיפוש בהיסטוריית הודעות Discord המאוחסנת ב-discord.db. השתמש למציאת הודעות קודמות, סיכום פעילות ערוץ או בדיקת מה שמשתמשים אמרו. תומך בחיפוש מילות מפתח ומסננים אופציונליים: channel_id, since, until."
memory_forget = "הסרת זיכרון לפי מפתח. השתמש למחיקת עובדות מיושנות או נתונים רגישים. מחזיר האם הזיכרון נמצא והוסר."
memory_recall = "חיפוש בזיכרון ארוך-טווח אחר עובדות, העדפות או הקשר רלוונטיים. מחזיר תוצאות מדורגות לפי רלוונטיות."
memory_store = "שמירת עובדה, העדפה או הערה בזיכרון ארוך-טווח. השתמש בקטגוריה 'core' לעובדות קבועות, 'daily' להערות סשן, 'conversation' להקשר צ'אט, או שם קטגוריה מותאם אישית."
microsoft365 = "אינטגרציה עם Microsoft 365: ניהול דואר Outlook, הודעות Teams, אירועי Calendar, קבצי OneDrive וחיפוש SharePoint דרך Microsoft Graph API"
model_routing_config = "ניהול הגדרות מודל ברירת מחדל, מסלולי ספק/מודל מבוססי תרחישים, כללי סיווג ופרופילי תת-סוכנים של delegate"
notion = "אינטראקציה עם Notion: שאילתת בסיסי נתונים, קריאה/יצירה/עדכון דפים וחיפוש בסביבת העבודה."
pdf_read = "חילוץ טקסט רגיל מקובץ PDF בסביבת העבודה. מחזיר את כל הטקסט הקריא. קובצי PDF מבוססי תמונה בלבד או מוצפנים מחזירים תוצאה ריקה. דורש תכונת בנייה 'rag-pdf'."
project_intel = "מודיעין מסירת פרויקט: הפקת דוחות סטטוס, זיהוי סיכונים, טיוטת עדכונים ללקוח, סיכום ספרינטים והערכת מאמץ. כלי ניתוח לקריאה בלבד."
proxy_config = "ניהול הגדרות proxy של ZeroClaw (היקף: environment | zeroclaw | services), כולל יישום על runtime ומשתני סביבה של תהליך"
pushover = "שליחת התראת Pushover למכשיר שלך. דורש PUSHOVER_TOKEN ו-PUSHOVER_USER_KEY בקובץ .env."
schedule = """ניהול משימות מתוזמנות ל-shell בלבד. פעולות: create/add/once/list/get/cancel/remove/pause/resume. אזהרה: כלי זה יוצר משימות shell שהפלט שלהן רק נרשם ביומן ולא נמסר לשום ערוץ. לשליחת הודעה מתוזמנת ל-Discord/Telegram/Slack/Matrix, השתמש בכלי cron_add עם job_type='agent' והגדרת delivery כמו {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "צילום מסך של המסך הנוכחי. מחזיר את נתיב הקובץ ונתוני PNG מקודדים ב-base64."
security_ops = "כלי פעולות אבטחה לשירותי אבטחת סייבר מנוהלים. פעולות: triage_alert (סיווג/תעדוף התראות), run_playbook (ביצוע שלבי תגובה לאירוע), parse_vulnerability (פירוק תוצאות סריקה), generate_report (יצירת דוחות מצב אבטחה), list_playbooks (רשימת playbooks זמינים), alert_stats (סיכום מדדי התראות)."
shell = "הרצת פקודת shell בספריית סביבת העבודה"
sop_advance = "דיווח על תוצאת שלב SOP הנוכחי והתקדמות לשלב הבא. ספק את run_id, האם השלב הצליח או נכשל וסיכום פלט קצר."
sop_approve = "אישור שלב SOP ממתין שמחכה לאישור מפעיל. מחזיר את הוראת השלב לביצוע. השתמש ב-sop_status כדי לראות אילו הרצות ממתינות."
sop_execute = "הפעלה ידנית של נוהל תפעול תקני (SOP) לפי שם. מחזיר מזהה הרצה והוראת השלב הראשון. השתמש ב-sop_list לצפייה ב-SOP זמינים."
sop_list = "הצגת כל נהלי התפעול התקניים (SOP) הטעונים עם הטריגרים, העדיפות, מספר השלבים ומספר ההרצות הפעילות שלהם. סינון אופציונלי לפי שם או עדיפות."
sop_status = "שאילתת סטטוס ביצוע SOP. ספק run_id להרצה ספציפית, או sop_name לרשימת הרצות של אותו SOP. ללא ארגומנטים, מציג את כל ההרצות הפעילות."
swarm = "תזמור נחיל סוכנים לטיפול משותף במשימה. תומך באסטרטגיות סדרתית (pipeline), מקבילית (fan-out/fan-in) וניתוב (נבחר על ידי LLM)."
tool_search = """אחזור הגדרות סכמה מלאות עבור כלי MCP נדחים כדי שניתן יהיה לקרוא להם. השתמש ב-"select:name1,name2" להתאמה מדויקת או במילות מפתח לחיפוש."""
web_fetch = "אחזור דף ווב והחזרת תוכנו כטקסט רגיל נקי. דפי HTML מומרים אוטומטית לטקסט קריא. תגובות JSON וטקסט רגיל מוחזרות כמות שהן. רק בקשות GET; עוקב אחרי הפניות. אבטחה: רק דומיינים מרשימת ההיתרים, ללא מארחים מקומיים/פרטיים."
web_search_tool = "חיפוש מידע באינטרנט. מחזיר תוצאות חיפוש רלוונטיות עם כותרות, כתובות URL ותיאורים. השתמש למציאת מידע עדכני, חדשות או נושאי מחקר."
workspace = "ניהול סביבות עבודה מרובות לקוחות. פקודות משנה: list, switch, create, info, export. כל סביבת עבודה מספקת זיכרון מבודד, ביקורת, סודות והגבלות כלים."
weather = "קבלת מזג אוויר נוכחי ותחזית עבור כל מיקום בעולם. תומך בשמות ערים (בכל שפה או כתב), קודי שדה תעופה IATA (למשל 'LAX'), קואורדינטות GPS (למשל '51.5,-0.1'), מיקודים ואיתור מיקום מבוסס דומיין. מחזיר טמפרטורה, תחושת טמפרטורה, לחות, מהירות/כיוון רוח, משקעים, ראות, לחץ, מדד UV וכיסוי עננים. תחזית אופציונלית ל-0-3 ימים עם פירוט שעתי. יחידות ברירת מחדל מטריות (°C, km/h, מ\"מ) אך ניתן להגדיר ליחידות אימפריאליות (°F, mph, אינצ'ים) לכל בקשה. לא נדרש API key."

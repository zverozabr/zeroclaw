# German tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Workspace-Backups erstellen, auflisten, verifizieren und wiederherstellen"
browser = "Web-/Browser-Automatisierung mit austauschbaren Backends (agent-browser, rust-native, computer_use). Unterstützt DOM-Aktionen sowie optionale OS-Level-Aktionen (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) über einen computer-use Sidecar. Verwende 'snapshot', um interaktive Elemente auf Refs (@e1, @e2) abzubilden. Erzwingt browser.allowed_domains für open-Aktionen."
browser_delegate = "Browser-basierte Aufgaben an ein browserfähiges CLI delegieren, um mit Webanwendungen wie Teams, Outlook, Jira, Confluence zu interagieren"
browser_open = "Eine genehmigte HTTPS-URL im Systembrowser öffnen. Sicherheitsbeschränkungen: nur Allowlist-Domains, keine lokalen/privaten Hosts, kein Scraping."
cloud_ops = "Cloud-Transformationsberatungstool. Analysiert IaC-Pläne, bewertet Migrationspfade, prüft Kosten und überprüft die Architektur anhand der Well-Architected-Framework-Säulen. Nur lesend: erstellt oder ändert keine Cloud-Ressourcen."
cloud_patterns = "Cloud-Pattern-Bibliothek. Schlägt auf Basis einer Workload-Beschreibung anwendbare cloud-native Architekturmuster vor (Containerisierung, Serverless, Datenbankmodernisierung usw.)."
composio = "Aktionen auf über 1000 Apps über Composio ausführen (Gmail, Notion, GitHub, Slack usw.). Verwende action='list', um verfügbare Aktionen anzuzeigen (inkl. Parameternamen). action='execute' mit action_name/tool_slug und params, um eine Aktion auszuführen. Bei Unsicherheit über die exakten params stattdessen 'text' mit einer natürlichsprachlichen Beschreibung übergeben (Composio löst die korrekten Parameter via NLP auf). action='list_accounts' oder action='connected_accounts', um verbundene OAuth-Konten aufzulisten. action='connect' mit app/auth_config_id, um die OAuth-URL zu erhalten. connected_account_id wird automatisch aufgelöst, wenn weggelassen."
content_search = "Dateiinhalte per regex-Muster im Workspace durchsuchen. Unterstützt ripgrep (rg) mit grep-Fallback. Ausgabemodi: 'content' (übereinstimmende Zeilen mit Kontext), 'files_with_matches' (nur Dateipfade), 'count' (Trefferanzahl pro Datei). Beispiel: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Einen geplanten Cron-Job (Shell oder Agent) mit cron/at/every-Zeitplänen erstellen. Verwende job_type='agent' mit einem Prompt, um den AI-Agenten nach Zeitplan auszuführen. Um die Ausgabe an einen Kanal zu senden (Discord, Telegram, Slack, Mattermost, Matrix), setze delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Dies ist das bevorzugte Tool zum Senden geplanter/verzögerter Nachrichten an Benutzer über Kanäle."""
cron_list = "Alle geplanten Cron-Jobs auflisten"
cron_remove = "Einen Cron-Job nach ID entfernen"
cron_run = "Einen Cron-Job sofort erzwingen und den Ausführungsverlauf aufzeichnen"
cron_runs = "Den aktuellen Ausführungsverlauf eines Cron-Jobs anzeigen"
cron_update = "Einen bestehenden Cron-Job aktualisieren (schedule, command, prompt, enabled, delivery, model usw.)"
data_management = "Workspace-Datenaufbewahrung, Bereinigung und Speicherstatistiken"
delegate = "Eine Teilaufgabe an einen spezialisierten Agenten delegieren. Verwende wenn: eine Aufgabe von einem anderen Modell profitiert (z.B. schnelle Zusammenfassung, tiefes Reasoning, Code-Generierung). Der Sub-Agent führt standardmäßig einen einzelnen Prompt aus; mit agentic=true kann er mit einer gefilterten Tool-Call-Schleife iterieren."
file_edit = "Eine Datei bearbeiten, indem eine exakte Zeichenkettenübereinstimmung durch neuen Inhalt ersetzt wird"
file_read = "Dateiinhalt mit Zeilennummern lesen. Unterstützt teilweises Lesen über offset und limit. Extrahiert Text aus PDF; andere Binärdateien werden mit verlustbehafteter UTF-8-Konvertierung gelesen."
file_write = "Inhalt in eine Datei im Workspace schreiben"
git_operations = "Strukturierte Git-Operationen ausführen (status, diff, log, branch, commit, add, checkout, stash). Liefert strukturierte JSON-Ausgabe und integriert sich mit der Sicherheitsrichtlinie für Autonomiekontrollen."
glob_search = "Nach Dateien suchen, die einem Glob-Muster im Workspace entsprechen. Gibt eine sortierte Liste von Dateipfaden relativ zum Workspace-Root zurück. Beispiele: '**/*.rs' (alle Rust-Dateien), 'src/**/mod.rs' (alle mod.rs in src)."
google_workspace = "Mit Google-Workspace-Diensten interagieren (Drive, Gmail, Calendar, Sheets, Docs usw.) über das gws-CLI. Erfordert installiertes und authentifiziertes gws."
hardware_board_info = "Vollständige Board-Informationen (Chip, Architektur, Speicherkarte) für angeschlossene Hardware zurückgeben. Verwende wenn: Benutzer nach 'Board-Info', 'welches Board habe ich', 'angeschlossene Hardware', 'Chip-Info', 'welche Hardware' oder 'Speicherkarte' fragt."
hardware_memory_map = "Die Speicherkarte (Flash- und RAM-Adressbereiche) für angeschlossene Hardware zurückgeben. Verwende wenn: Benutzer nach 'oberen und unteren Speicheradressen', 'Speicherkarte', 'Adressraum' oder 'lesbare Adressen' fragt. Gibt Flash-/RAM-Bereiche aus Datenblättern zurück."
hardware_memory_read = "Tatsächliche Speicher-/Registerwerte vom Nucleo über USB lesen. Verwende wenn: Benutzer 'Registerwerte lesen', 'Speicher an Adresse lesen', 'Speicher-Dump', 'unterer Speicher 0-126' oder 'Adresse und Wert angeben' anfragt. Gibt Hex-Dump zurück. Erfordert per USB angeschlossenes Nucleo und probe-Feature. Params: address (hex, z.B. 0x20000000 für RAM-Start), length (Bytes, Standard 128)."
http_request = "HTTP-Anfragen an externe APIs senden. Unterstützt Methoden GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Sicherheitsbeschränkungen: nur Allowlist-Domains, keine lokalen/privaten Hosts, konfigurierbares Timeout und Antwortgrößenlimits."
image_info = "Bildmetadaten (Format, Abmessungen, Größe) lesen und optional base64-kodierte Daten zurückgeben."
jira = "Mit Jira interagieren: Tickets mit konfigurierbarem Detailgrad abrufen, Issues mit JQL suchen und Kommentare mit Erwähnungs- und Formatierungsunterstützung hinzufügen."
knowledge = "Einen Wissensgraphen aus Architekturentscheidungen, Lösungsmustern, gewonnenen Erkenntnissen und Experten verwalten. Aktionen: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "LinkedIn verwalten: Beiträge erstellen, eigene Beiträge auflisten, kommentieren, reagieren, Beiträge löschen, Engagement anzeigen, Profilinfos abrufen und die konfigurierte Content-Strategie lesen. Erfordert LINKEDIN_*-Zugangsdaten in der .env-Datei."
discord_search = "Discord-Nachrichtenverlauf in discord.db durchsuchen. Verwende zum Finden vergangener Nachrichten, Zusammenfassen von Kanalaktivität oder Nachschlagen von Benutzeraussagen. Unterstützt Stichwortsuche und optionale Filter: channel_id, since, until."
memory_forget = "Eine Erinnerung nach Schlüssel entfernen. Verwende zum Löschen veralteter Fakten oder sensibler Daten. Gibt zurück, ob die Erinnerung gefunden und entfernt wurde."
memory_recall = "Langzeitgedächtnis nach relevanten Fakten, Präferenzen oder Kontext durchsuchen. Gibt nach Relevanz sortierte bewertete Ergebnisse zurück."
memory_store = "Einen Fakt, eine Präferenz oder eine Notiz im Langzeitgedächtnis speichern. Verwende Kategorie 'core' für permanente Fakten, 'daily' für Sitzungsnotizen, 'conversation' für Chat-Kontext oder einen benutzerdefinierten Kategorienamen."
microsoft365 = "Microsoft-365-Integration: Outlook-Mail, Teams-Nachrichten, Calendar-Ereignisse, OneDrive-Dateien und SharePoint-Suche über Microsoft Graph API verwalten"
model_routing_config = "Standard-Modelleinstellungen, szenariobasierte Provider-/Modellrouten, Klassifizierungsregeln und Delegate-Sub-Agenten-Profile verwalten"
notion = "Mit Notion interagieren: Datenbanken abfragen, Seiten lesen/erstellen/aktualisieren und den Workspace durchsuchen."
pdf_read = "Reinen Text aus einer PDF-Datei im Workspace extrahieren. Gibt den gesamten lesbaren Text zurück. Rein bildbasierte oder verschlüsselte PDFs geben ein leeres Ergebnis zurück. Erfordert das Build-Feature 'rag-pdf'."
project_intel = "Projektlieferungsintelligenz: Statusberichte generieren, Risiken erkennen, Kunden-Updates entwerfen, Sprints zusammenfassen und Aufwand schätzen. Schreibgeschütztes Analysetool."
proxy_config = "ZeroClaw-Proxy-Einstellungen verwalten (Scope: environment | zeroclaw | services), einschließlich Runtime- und Prozess-Umgebungsvariablen-Anwendung"
pushover = "Eine Pushover-Benachrichtigung an Ihr Gerät senden. Erfordert PUSHOVER_TOKEN und PUSHOVER_USER_KEY in der .env-Datei."
schedule = """Geplante reine Shell-Aufgaben verwalten. Aktionen: create/add/once/list/get/cancel/remove/pause/resume. WARNUNG: Dieses Tool erstellt Shell-Jobs, deren Ausgabe nur protokolliert, NICHT an einen Kanal gesendet wird. Um eine geplante Nachricht an Discord/Telegram/Slack/Matrix zu senden, verwende das cron_add-Tool mit job_type='agent' und einer delivery-Konfiguration wie {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Einen Screenshot des aktuellen Bildschirms aufnehmen. Gibt den Dateipfad und base64-kodierte PNG-Daten zurück."
security_ops = "Sicherheitsoperations-Tool für verwaltete Cybersecurity-Dienste. Aktionen: triage_alert (Alerts klassifizieren/priorisieren), run_playbook (Incident-Response-Schritte ausführen), parse_vulnerability (Scan-Ergebnisse analysieren), generate_report (Sicherheitslageberichte erstellen), list_playbooks (verfügbare Playbooks auflisten), alert_stats (Alert-Metriken zusammenfassen)."
shell = "Einen Shell-Befehl im Workspace-Verzeichnis ausführen"
sop_advance = "Das Ergebnis des aktuellen SOP-Schritts melden und zum nächsten Schritt vorrücken. Run_id angeben, ob der Schritt erfolgreich war oder fehlschlug, und eine kurze Ausgabezusammenfassung."
sop_approve = "Einen ausstehenden SOP-Schritt genehmigen, der auf Operator-Freigabe wartet. Gibt die auszuführende Schrittanweisung zurück. Verwende sop_status, um zu sehen, welche Ausführungen warten."
sop_execute = "Eine Standard Operating Procedure (SOP) manuell nach Name auslösen. Gibt die Run-ID und die Anweisung des ersten Schritts zurück. Verwende sop_list, um verfügbare SOPs anzuzeigen."
sop_list = "Alle geladenen Standard Operating Procedures (SOPs) mit ihren Triggern, Priorität, Schrittanzahl und aktiver Ausführungsanzahl auflisten. Optional nach Name oder Priorität filtern."
sop_status = "SOP-Ausführungsstatus abfragen. Run_id für eine bestimmte Ausführung oder sop_name, um Ausführungen dieser SOP aufzulisten. Ohne Argumente werden alle aktiven Ausführungen angezeigt."
swarm = "Einen Schwarm von Agenten orchestrieren, um eine Aufgabe kollaborativ zu bearbeiten. Unterstützt sequenzielle (Pipeline), parallele (Fan-out/Fan-in) und Router-Strategien (LLM-gesteuerte Auswahl)."
tool_search = """Vollständige Schema-Definitionen für aufgeschobene MCP-Tools abrufen, damit sie aufgerufen werden können. Verwende "select:name1,name2" für exakte Übereinstimmung oder Stichwörter zur Suche."""
web_fetch = "Eine Webseite abrufen und ihren Inhalt als sauberen Klartext zurückgeben. HTML-Seiten werden automatisch in lesbaren Text umgewandelt. JSON- und Klartext-Antworten werden unverändert zurückgegeben. Nur GET-Anfragen; folgt Weiterleitungen. Sicherheit: nur Allowlist-Domains, keine lokalen/privaten Hosts."
web_search_tool = "Das Web nach Informationen durchsuchen. Gibt relevante Suchergebnisse mit Titeln, URLs und Beschreibungen zurück. Verwende dies, um aktuelle Informationen, Nachrichten oder Recherchethemen zu finden."
workspace = "Multi-Client-Workspaces verwalten. Unterbefehle: list, switch, create, info, export. Jeder Workspace bietet isolierten Speicher, Audit, Geheimnisse und Tool-Beschränkungen."
weather = "Aktuelle Wetterbedingungen und Vorhersage für jeden Ort weltweit abrufen. Unterstützt Städtenamen (in jeder Sprache oder Schrift), IATA-Flughafencodes (z.B. 'LAX'), GPS-Koordinaten (z.B. '51.5,-0.1'), Postleitzahlen und domainbasierte Geolokalisierung. Gibt Temperatur, gefühlte Temperatur, Luftfeuchtigkeit, Windgeschwindigkeit/-richtung, Niederschlag, Sichtweite, Druck, UV-Index und Bewölkung zurück. Optionale 0-3-Tage-Vorhersage mit stündlicher Aufschlüsselung. Standardeinheiten metrisch (°C, km/h, mm), können aber auf imperial (°F, mph, Zoll) pro Anfrage eingestellt werden. Kein API-Key erforderlich."

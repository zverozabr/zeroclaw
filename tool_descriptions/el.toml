# Ελληνικές περιγραφές εργαλείων (Greek tool descriptions)
#
# Κάθε κλειδί κάτω από [tools] αντιστοιχεί στην τιμή επιστροφής name() του εργαλείου.
# Οι τιμές είναι οι αναγνώσιμες περιγραφές που εμφανίζονται στα system prompts.
# Τα κλειδιά που λείπουν θα χρησιμοποιούν τις αγγλικές (en.toml) περιγραφές.

[tools]
backup = "Δημιουργία, εμφάνιση, επαλήθευση και επαναφορά αντιγράφων ασφαλείας χώρου εργασίας"
browser = "Αυτοματοποίηση ιστού/περιηγητή με εναλλάξιμα backend (agent-browser, rust-native, computer_use). Υποστηρίζει ενέργειες DOM καθώς και προαιρετικές ενέργειες σε επίπεδο OS (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) μέσω sidecar computer-use. Χρησιμοποιήστε 'snapshot' για αντιστοίχιση διαδραστικών στοιχείων σε refs (@e1, @e2). Επιβάλλει browser.allowed_domains για ενέργειες open."
browser_delegate = "Ανάθεση εργασιών βασισμένων σε περιηγητή σε CLI με δυνατότητα περιηγητή για αλληλεπίδραση με εφαρμογές ιστού όπως Teams, Outlook, Jira, Confluence"
browser_open = "Άνοιγμα εγκεκριμένου HTTPS URL στον περιηγητή του συστήματος. Περιορισμοί ασφαλείας: μόνο εγκεκριμένοι τομείς, χωρίς τοπικούς/ιδιωτικούς κεντρικούς υπολογιστές, χωρίς scraping."
cloud_ops = "Συμβουλευτικό εργαλείο μετασχηματισμού cloud. Αναλύει σχέδια IaC, αξιολογεί διαδρομές μετάβασης, ελέγχει κόστη και ελέγχει την αρχιτεκτονική σύμφωνα με τους πυλώνες του Well-Architected Framework. Μόνο ανάγνωση: δεν δημιουργεί ή τροποποιεί πόρους cloud."
cloud_patterns = "Βιβλιοθήκη μοτίβων cloud. Με βάση την περιγραφή φόρτου εργασίας, προτείνει εφαρμόσιμα μοτίβα αρχιτεκτονικής cloud-native (containerization, serverless, εκσυγχρονισμός βάσεων δεδομένων κ.λπ.)."
composio = "Εκτέλεση ενεργειών σε 1000+ εφαρμογές μέσω Composio (Gmail, Notion, GitHub, Slack κ.λπ.). Χρησιμοποιήστε action='list' για να δείτε τις διαθέσιμες ενέργειες (περιλαμβάνει ονόματα παραμέτρων). action='execute' με action_name/tool_slug και params για εκτέλεση ενέργειας. Αν δεν είστε σίγουροι για τις ακριβείς παραμέτρους, στείλτε 'text' με περιγραφή σε φυσική γλώσσα (το Composio θα επιλύσει τις σωστές παραμέτρους μέσω NLP). action='list_accounts' ή action='connected_accounts' για εμφάνιση συνδεδεμένων λογαριασμών OAuth. action='connect' με app/auth_config_id για λήψη OAuth URL. Το connected_account_id επιλύεται αυτόματα όταν παραλείπεται."
content_search = "Αναζήτηση περιεχομένου αρχείων με regex μοτίβο μέσα στον χώρο εργασίας. Υποστηρίζει ripgrep (rg) με εναλλακτικό grep. Λειτουργίες εξόδου: 'content' (αντίστοιχες γραμμές με πλαίσιο), 'files_with_matches' (μόνο διαδρομές αρχείων), 'count' (πλήθος αντιστοιχιών ανά αρχείο). Παράδειγμα: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Δημιουργία προγραμματισμένου cron job (shell ή agent) με χρονοδιαγράμματα cron/at/every. Χρησιμοποιήστε job_type='agent' με prompt για εκτέλεση του AI agent σε πρόγραμμα. Για παράδοση εξόδου σε κανάλι (Discord, Telegram, Slack, Mattermost, Matrix), ορίστε delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Αυτό είναι το προτιμώμενο εργαλείο για αποστολή προγραμματισμένων/καθυστερημένων μηνυμάτων σε χρήστες μέσω καναλιών."""
cron_list = "Εμφάνιση όλων των προγραμματισμένων cron jobs"
cron_remove = "Αφαίρεση cron job με βάση το ID"
cron_run = "Αναγκαστική εκτέλεση cron job άμεσα και καταγραφή ιστορικού εκτελέσεων"
cron_runs = "Εμφάνιση πρόσφατου ιστορικού εκτελέσεων ενός cron job"
cron_update = "Τροποποίηση υπάρχοντος cron job (χρονοδιάγραμμα, εντολή, prompt, ενεργοποίηση, παράδοση, μοντέλο κ.λπ.)"
data_management = "Διατήρηση δεδομένων χώρου εργασίας, εκκαθάριση και στατιστικά αποθήκευσης"
delegate = "Ανάθεση υπο-εργασίας σε εξειδικευμένο agent. Χρήση όταν: μια εργασία ωφελείται από διαφορετικό μοντέλο (π.χ. γρήγορη σύνοψη, βαθύ συλλογισμό, δημιουργία κώδικα). Ο υπο-agent εκτελεί ένα μόνο prompt από προεπιλογή· με agentic=true μπορεί να επαναλάβει με φιλτραρισμένο βρόχο κλήσεων εργαλείων."
file_edit = "Επεξεργασία αρχείου αντικαθιστώντας μια ακριβή αντιστοιχία συμβολοσειράς με νέο περιεχόμενο"
file_read = "Ανάγνωση περιεχομένων αρχείου με αριθμούς γραμμών. Υποστηρίζει μερική ανάγνωση μέσω offset και limit. Εξαγωγή κειμένου από PDF· άλλα δυαδικά αρχεία διαβάζονται με μετατροπή UTF-8 με απώλειες."
file_write = "Εγγραφή περιεχομένων σε αρχείο στον χώρο εργασίας"
git_operations = "Εκτέλεση δομημένων λειτουργιών Git (status, diff, log, branch, commit, add, checkout, stash). Παρέχει αναλυμένη έξοδο JSON και ενσωματώνεται με την πολιτική ασφαλείας για ελέγχους αυτονομίας."
glob_search = "Αναζήτηση αρχείων που ταιριάζουν με μοτίβο glob μέσα στον χώρο εργασίας. Επιστρέφει ταξινομημένη λίστα διαδρομών αρχείων σχετικά με τη ρίζα του χώρου εργασίας. Παραδείγματα: '**/*.rs' (όλα τα αρχεία Rust), 'src/**/mod.rs' (όλα τα mod.rs στο src)."
google_workspace = "Αλληλεπίδραση με υπηρεσίες Google Workspace (Drive, Gmail, Calendar, Sheets, Docs κ.λπ.) μέσω του gws CLI. Απαιτεί εγκατεστημένο και πιστοποιημένο gws."
hardware_board_info = "Επιστροφή πλήρων πληροφοριών πλακέτας (chip, αρχιτεκτονική, χάρτης μνήμης) για συνδεδεμένο υλικό. Χρήση όταν: ο χρήστης ρωτά για πληροφορίες πλακέτας, συνδεδεμένο υλικό, πληροφορίες chip."
hardware_memory_map = "Επιστροφή χάρτη μνήμης (εύρη διευθύνσεων flash και RAM) για συνδεδεμένο υλικό. Χρήση όταν: ο χρήστης ρωτά για διευθύνσεις μνήμης, χώρο διευθύνσεων ή αναγνώσιμες διευθύνσεις. Επιστρέφει εύρη flash/RAM από φύλλα δεδομένων."
hardware_memory_read = "Ανάγνωση πραγματικών τιμών μνήμης/καταχωρητών από Nucleo μέσω USB. Χρήση όταν: ο χρήστης ζητά ανάγνωση τιμών καταχωρητών, ανάγνωση μνήμης σε διεύθυνση, αποτύπωση μνήμης. Επιστρέφει δεκαεξαδικό dump. Απαιτεί Nucleo συνδεδεμένο μέσω USB και δυνατότητα probe."
http_request = "Εκτέλεση αιτημάτων HTTP σε εξωτερικά API. Υποστηρίζει μεθόδους GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Περιορισμοί ασφαλείας: μόνο εγκεκριμένοι τομείς, χωρίς τοπικούς/ιδιωτικούς κεντρικούς υπολογιστές, ρυθμιζόμενο timeout και όρια μεγέθους απόκρισης."
image_info = "Ανάγνωση μεταδεδομένων αρχείου εικόνας (μορφή, διαστάσεις, μέγεθος) και προαιρετική επιστροφή δεδομένων κωδικοποιημένων σε base64."
jira = "Αλληλεπίδραση με Jira: λήψη εισιτηρίων με ρυθμιζόμενο επίπεδο λεπτομέρειας, αναζήτηση ζητημάτων με JQL και προσθήκη σχολίων με υποστήριξη αναφορών και μορφοποίησης."
knowledge = "Διαχείριση γράφου γνώσεων αρχιτεκτονικών αποφάσεων, μοτίβων λύσεων, αποκτημένων γνώσεων και ειδικών. Ενέργειες: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Διαχείριση LinkedIn: δημιουργία αναρτήσεων, εμφάνιση αναρτήσεων, σχόλια, αντιδράσεις, διαγραφή αναρτήσεων, προβολή αφοσίωσης, λήψη πληροφοριών προφίλ και ανάγνωση της ρυθμισμένης στρατηγικής περιεχομένου. Απαιτεί διαπιστευτήρια LINKEDIN_* στο αρχείο .env."
discord_search = "Αναζήτηση στο ιστορικό μηνυμάτων Discord αποθηκευμένο στο discord.db. Χρήση για εύρεση παλαιότερων μηνυμάτων, σύνοψη δραστηριότητας καναλιού ή αναζήτηση τι είπαν χρήστες. Υποστηρίζει αναζήτηση λέξεων-κλειδιών και προαιρετικά φίλτρα: channel_id, since, until."
memory_forget = "Αφαίρεση μνήμης με βάση κλειδί. Χρήση για διαγραφή ξεπερασμένων γεγονότων ή ευαίσθητων δεδομένων. Επιστρέφει αν η μνήμη βρέθηκε και αφαιρέθηκε."
memory_recall = "Αναζήτηση στη μακροπρόθεσμη μνήμη για σχετικά γεγονότα, προτιμήσεις ή πλαίσιο. Επιστρέφει βαθμολογημένα αποτελέσματα κατά σειρά συνάφειας."
memory_store = "Αποθήκευση γεγονότος, προτίμησης ή σημείωσης στη μακροπρόθεσμη μνήμη. Χρησιμοποιήστε κατηγορία 'core' για μόνιμα γεγονότα, 'daily' για σημειώσεις συνεδρίας, 'conversation' για πλαίσιο συνομιλίας ή προσαρμοσμένο όνομα κατηγορίας."
microsoft365 = "Ενσωμάτωση Microsoft 365: διαχείριση αλληλογραφίας Outlook, μηνυμάτων Teams, συμβάντων Calendar, αρχείων OneDrive και αναζήτησης SharePoint μέσω Microsoft Graph API"
model_routing_config = "Διαχείριση προεπιλεγμένων ρυθμίσεων μοντέλου, δρομολογήσεων παρόχου/μοντέλου βάσει σεναρίου, κανόνων ταξινόμησης και προφίλ υπο-agents ανάθεσης"
notion = "Αλληλεπίδραση με Notion: ερωτήματα σε βάσεις δεδομένων, ανάγνωση/δημιουργία/ενημέρωση σελίδων και αναζήτηση στον χώρο εργασίας."
pdf_read = "Εξαγωγή απλού κειμένου από αρχείο PDF στον χώρο εργασίας. Επιστρέφει όλο το αναγνώσιμο κείμενο. PDF μόνο με εικόνες ή κρυπτογραφημένα επιστρέφουν κενό αποτέλεσμα. Απαιτεί τη δυνατότητα build 'rag-pdf'."
project_intel = "Νοημοσύνη παράδοσης έργου: δημιουργία αναφορών κατάστασης, ανίχνευση κινδύνων, σύνταξη ενημερώσεων πελατών, σύνοψη sprints και εκτίμηση προσπάθειας. Εργαλείο ανάλυσης μόνο για ανάγνωση."
proxy_config = "Διαχείριση ρυθμίσεων proxy ZeroClaw (εύρος: environment | zeroclaw | services), συμπεριλαμβανομένης της εφαρμογής στο runtime και στο περιβάλλον διεργασίας"
pushover = "Αποστολή ειδοποίησης Pushover στη συσκευή σας. Απαιτεί PUSHOVER_TOKEN και PUSHOVER_USER_KEY στο αρχείο .env."
schedule = """Διαχείριση προγραμματισμένων εργασιών μόνο shell. Ενέργειες: create/add/once/list/get/cancel/remove/pause/resume. ΠΡΟΕΙΔΟΠΟΙΗΣΗ: Αυτό το εργαλείο δημιουργεί shell jobs των οποίων η έξοδος μόνο καταγράφεται, ΔΕΝ παραδίδεται σε κανάλι. Για αποστολή προγραμματισμένου μηνύματος σε Discord/Telegram/Slack/Matrix, χρησιμοποιήστε το εργαλείο cron_add με job_type='agent' και ρύθμιση παράδοσης όπως {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Λήψη στιγμιότυπου οθόνης της τρέχουσας οθόνης. Επιστρέφει τη διαδρομή αρχείου και δεδομένα PNG κωδικοποιημένα σε base64."
security_ops = "Εργαλείο λειτουργιών ασφαλείας για διαχειριζόμενες υπηρεσίες κυβερνοασφάλειας. Ενέργειες: triage_alert (ταξινόμηση/ιεράρχηση ειδοποιήσεων), run_playbook (εκτέλεση βημάτων αντιμετώπισης συμβάντων), parse_vulnerability (ανάλυση αποτελεσμάτων σάρωσης), generate_report (δημιουργία αναφορών στάσης ασφαλείας), list_playbooks (εμφάνιση διαθέσιμων playbooks), alert_stats (σύνοψη μετρικών ειδοποιήσεων)."
shell = "Εκτέλεση εντολής shell στον κατάλογο του χώρου εργασίας"
sop_advance = "Αναφορά αποτελέσματος του τρέχοντος βήματος SOP και προχώρηση στο επόμενο βήμα. Παρέχετε run_id, αν το βήμα πέτυχε ή απέτυχε και σύντομη σύνοψη εξόδου."
sop_approve = "Έγκριση εκκρεμούς βήματος SOP που αναμένει έγκριση χειριστή. Επιστρέφει την οδηγία βήματος για εκτέλεση. Χρησιμοποιήστε sop_status για να δείτε ποιες εκτελέσεις αναμένουν."
sop_execute = "Χειροκίνητη ενεργοποίηση Τυπικής Διαδικασίας Λειτουργίας (SOP) κατά όνομα. Επιστρέφει το ID εκτέλεσης και την οδηγία του πρώτου βήματος. Χρησιμοποιήστε sop_list για τις διαθέσιμες SOP."
sop_list = "Εμφάνιση όλων των φορτωμένων Τυπικών Διαδικασιών Λειτουργίας (SOP) με τις σκανδάλες, προτεραιότητα, αριθμό βημάτων και αριθμό ενεργών εκτελέσεων. Προαιρετικό φιλτράρισμα κατά όνομα ή προτεραιότητα."
sop_status = "Ερώτημα κατάστασης εκτέλεσης SOP. Παρέχετε run_id για συγκεκριμένη εκτέλεση ή sop_name για εμφάνιση εκτελέσεων αυτής της SOP. Χωρίς ορίσματα, εμφανίζει όλες τις ενεργές εκτελέσεις."
swarm = "Ενορχήστρωση σμήνους agents για συνεργατική διεκπεραίωση εργασίας. Υποστηρίζει διαδοχικές (pipeline), παράλληλες (fan-out/fan-in) και router (επιλεγμένες από LLM) στρατηγικές."
tool_search = """Λήψη πλήρων ορισμών schema για αναβαλλόμενα εργαλεία MCP ώστε να μπορούν να κληθούν. Χρησιμοποιήστε "select:name1,name2" για ακριβή αντιστοίχιση ή λέξεις-κλειδιά για αναζήτηση."""
web_fetch = "Λήψη ιστοσελίδας και επιστροφή περιεχομένου ως καθαρό απλό κείμενο. Οι σελίδες HTML μετατρέπονται αυτόματα σε αναγνώσιμο κείμενο. Οι απαντήσεις JSON και απλού κειμένου επιστρέφονται ως έχουν. Μόνο αιτήματα GET· ακολουθεί ανακατευθύνσεις. Ασφάλεια: μόνο εγκεκριμένοι τομείς, χωρίς τοπικούς/ιδιωτικούς κεντρικούς υπολογιστές."
web_search_tool = "Αναζήτηση πληροφοριών στο διαδίκτυο. Επιστρέφει σχετικά αποτελέσματα αναζήτησης με τίτλους, URL και περιγραφές. Χρήση για εύρεση τρεχουσών πληροφοριών, ειδήσεων ή ερευνητικών θεμάτων."
workspace = "Διαχείριση χώρων εργασίας πολλαπλών πελατών. Υποεντολές: list, switch, create, info, export. Κάθε χώρος εργασίας παρέχει απομονωμένη μνήμη, έλεγχο, μυστικά και περιορισμούς εργαλείων."
weather = "Λήψη τρεχουσών καιρικών συνθηκών και πρόγνωσης για οποιαδήποτε τοποθεσία παγκοσμίως. Υποστηρίζει ονόματα πόλεων (σε οποιαδήποτε γλώσσα ή γραφή), κωδικούς αεροδρομίου IATA (π.χ. 'ATH'), συντεταγμένες GPS (π.χ. '37.9,23.7'), ταχυδρομικούς κώδικες και γεωεντοπισμό βάσει τομέα. Επιστρέφει θερμοκρασία, αίσθηση θερμοκρασίας, υγρασία, ταχύτητα/κατεύθυνση ανέμου, βροχόπτωση, ορατότητα, πίεση, δείκτη UV και νεφοκάλυψη. Προαιρετική πρόγνωση 0–3 ημερών με ωριαία ανάλυση. Οι μονάδες είναι εξ ορισμού μετρικές (°C, km/h, mm) αλλά μπορούν να οριστούν σε αγγλοσαξονικές (°F, mph, ίντσες) ανά αίτημα. Δεν απαιτείται API κλειδί."

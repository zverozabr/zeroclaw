# Descrieri instrumente în limba română (Romanian tool descriptions)
#
# Fiecare cheie din [tools] corespunde valorii returnate de name() a instrumentului.
# Valorile sunt descrierile lizibile de om afișate în system prompts.
# Cheile lipsă vor folosi descrierile din engleză (en.toml).

[tools]
backup = "Creați, listați, verificați și restaurați copii de siguranță ale spațiului de lucru"
browser = "Automatizare web/browser cu backend-uri interschimbabile (agent-browser, rust-native, computer_use). Suportă acțiuni DOM plus acțiuni opționale la nivel de OS (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) printr-un sidecar computer-use. Folosiți 'snapshot' pentru a mapa elementele interactive la referințe (@e1, @e2). Aplică browser.allowed_domains pentru acțiunile open."
browser_delegate = "Delegați sarcini bazate pe browser către un CLI capabil de browser pentru interacțiunea cu aplicații web precum Teams, Outlook, Jira, Confluence"
browser_open = "Deschideți un URL HTTPS aprobat în browserul sistemului. Constrângeri de securitate: doar domenii din lista permisă, fără gazde locale/private, fără extragere de date."
cloud_ops = "Instrument consultativ pentru transformarea cloud. Analizează planuri IaC, evaluează căi de migrare, revizuiește costuri și verifică arhitectura conform pilonilor Well-Architected Framework. Doar citire: nu creează sau modifică resurse cloud."
cloud_patterns = "Bibliotecă de pattern-uri cloud. Pe baza descrierii sarcinii de lucru, sugerează pattern-uri arhitecturale cloud-native aplicabile (containerizare, serverless, modernizare baze de date etc.)."
composio = "Executați acțiuni pe peste 1000 de aplicații prin Composio (Gmail, Notion, GitHub, Slack etc.). Folosiți action='list' pentru a vedea acțiunile disponibile (include numele parametrilor). action='execute' cu action_name/tool_slug și params pentru a rula o acțiune. Dacă nu sunteți sigur de parametrii exacți, transmiteți 'text' cu o descriere în limbaj natural (Composio va rezolva parametrii corecți prin NLP). action='list_accounts' sau action='connected_accounts' pentru a lista conturile OAuth conectate. action='connect' cu app/auth_config_id pentru a obține URL-ul OAuth. connected_account_id este rezolvat automat când este omis."
content_search = "Căutați conținutul fișierelor după pattern regex în spațiul de lucru. Suportă ripgrep (rg) cu fallback grep. Moduri de ieșire: 'content' (linii potrivite cu context), 'files_with_matches' (doar căile fișierelor), 'count' (număr de potriviri per fișier). Exemplu: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Creați un job cron programat (shell sau agent) cu planificări cron/at/every. Folosiți job_type='agent' cu un prompt pentru a rula agentul AI conform programului. Pentru a livra ieșirea către un canal (Discord, Telegram, Slack, Mattermost, Matrix), setați delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Acesta este instrumentul preferat pentru trimiterea mesajelor programate/întârziate utilizatorilor prin canale."""
cron_list = "Listați toate joburile cron programate"
cron_remove = "Eliminați un job cron după ID"
cron_run = "Rulați forțat un job cron imediat și înregistrați istoricul rulărilor"
cron_runs = "Listați istoricul recent al rulărilor unui job cron"
cron_update = "Modificați un job cron existent (programare, comandă, prompt, activat, livrare, model etc.)"
data_management = "Retenția datelor din spațiul de lucru, curățare și statistici de stocare"
delegate = "Delegați o subsarcină unui agent specializat. Folosiți când: o sarcină beneficiază de un model diferit (de ex. sumarizare rapidă, raționament profund, generare de cod). Sub-agentul rulează implicit un singur prompt; cu agentic=true poate itera cu o buclă filtrată de apeluri de instrumente."
file_edit = "Editați un fișier prin înlocuirea unei potriviri exacte de șir cu conținut nou"
file_read = "Citiți conținutul fișierului cu numere de linie. Suportă citire parțială prin offset și limit. Extrage text din PDF; alte fișiere binare sunt citite cu conversie UTF-8 cu pierderi."
file_write = "Scrieți conținut într-un fișier din spațiul de lucru"
git_operations = "Efectuați operațiuni Git structurate (status, diff, log, branch, commit, add, checkout, stash). Oferă ieșire JSON parsată și se integrează cu politica de securitate pentru controale de autonomie."
glob_search = "Căutați fișiere care se potrivesc unui pattern glob în spațiul de lucru. Returnează o listă sortată de căi de fișiere relative la rădăcina spațiului de lucru. Exemple: '**/*.rs' (toate fișierele Rust), 'src/**/mod.rs' (toate mod.rs din src)."
google_workspace = "Interacționați cu serviciile Google Workspace (Drive, Gmail, Calendar, Sheets, Docs etc.) prin CLI-ul gws. Necesită gws instalat și autentificat."
hardware_board_info = "Returnați informații complete despre placă (cip, arhitectură, hartă de memorie) pentru hardware-ul conectat. Folosiți când: utilizatorul întreabă despre informații placă, hardware conectat, informații cip."
hardware_memory_map = "Returnați harta de memorie (intervale de adrese flash și RAM) pentru hardware-ul conectat. Folosiți când: utilizatorul întreabă despre adrese de memorie, spațiu de adrese sau adrese citibile. Returnează intervale flash/RAM din fișele tehnice."
hardware_memory_read = "Citiți valori reale de memorie/registre de la Nucleo prin USB. Folosiți când: utilizatorul cere citirea valorilor registrelor, citirea memoriei la o adresă, descărcarea memoriei. Returnează un dump hexazecimal. Necesită Nucleo conectat prin USB și funcția probe."
http_request = "Efectuați cereri HTTP către API-uri externe. Suportă metodele GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Constrângeri de securitate: doar domenii din lista permisă, fără gazde locale/private, timeout și limite de dimensiune a răspunsului configurabile."
image_info = "Citiți metadatele fișierului imagine (format, dimensiuni, mărime) și opțional returnați date codificate base64."
jira = "Interacționați cu Jira: obțineți tichete cu nivel de detaliu configurabil, căutați probleme cu JQL și adăugați comentarii cu suport pentru menționare și formatare."
knowledge = "Gestionați un graf de cunoștințe cu decizii arhitecturale, pattern-uri de soluții, lecții învățate și experți. Acțiuni: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Gestionați LinkedIn: creați postări, listați postările, comentați, reacționați, ștergeți postări, vizualizați interacțiunile, obțineți informații de profil și citiți strategia de conținut configurată. Necesită credențiale LINKEDIN_* în fișierul .env."
discord_search = "Căutați în istoricul mesajelor Discord stocat în discord.db. Folosiți pentru a găsi mesaje anterioare, a sumariza activitatea canalului sau a căuta ce au spus utilizatorii. Suportă căutare după cuvinte cheie și filtre opționale: channel_id, since, until."
memory_forget = "Eliminați o amintire după cheie. Folosiți pentru a șterge fapte depășite sau date sensibile. Returnează dacă amintirea a fost găsită și eliminată."
memory_recall = "Căutați în memoria pe termen lung fapte, preferințe sau context relevante. Returnează rezultate cu scor ordonate după relevanță."
memory_store = "Stocați un fapt, o preferință sau o notă în memoria pe termen lung. Folosiți categoria 'core' pentru fapte permanente, 'daily' pentru note de sesiune, 'conversation' pentru contextul conversației sau un nume de categorie personalizat."
microsoft365 = "Integrare Microsoft 365: gestionați e-mailul Outlook, mesajele Teams, evenimentele Calendar, fișierele OneDrive și căutarea SharePoint prin Microsoft Graph API"
model_routing_config = "Gestionați setările implicite ale modelului, rutele furnizor/model bazate pe scenarii, regulile de clasificare și profilurile sub-agenților delegați"
notion = "Interacționați cu Notion: interogați baze de date, citiți/creați/actualizați pagini și căutați în spațiul de lucru."
pdf_read = "Extrageți text simplu dintr-un fișier PDF din spațiul de lucru. Returnează tot textul lizibil. PDF-urile doar cu imagini sau criptate returnează un rezultat gol. Necesită funcția de build 'rag-pdf'."
project_intel = "Inteligență de livrare proiecte: generați rapoarte de stare, detectați riscuri, redactați actualizări pentru clienți, sumarizați sprinturi și estimați efortul. Instrument de analiză doar citire."
proxy_config = "Gestionați setările proxy ZeroClaw (domeniu: environment | zeroclaw | services), inclusiv aplicarea la runtime și mediul de proces"
pushover = "Trimiteți o notificare Pushover pe dispozitivul dvs. Necesită PUSHOVER_TOKEN și PUSHOVER_USER_KEY în fișierul .env."
schedule = """Gestionați sarcini programate doar shell. Acțiuni: create/add/once/list/get/cancel/remove/pause/resume. ATENȚIE: Acest instrument creează joburi shell a căror ieșire este doar înregistrată în jurnal, NU livrată către niciun canal. Pentru a trimite un mesaj programat către Discord/Telegram/Slack/Matrix, folosiți instrumentul cron_add cu job_type='agent' și o configurare de livrare precum {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Capturați o captură de ecran a ecranului curent. Returnează calea fișierului și datele PNG codificate base64."
security_ops = "Instrument de operațiuni de securitate pentru servicii gestionate de securitate cibernetică. Acțiuni: triage_alert (clasificare/prioritizare alerte), run_playbook (executare pași de răspuns la incidente), parse_vulnerability (parsare rezultate de scanare), generate_report (creare rapoarte de postură de securitate), list_playbooks (listare playbook-uri disponibile), alert_stats (sumarizare metrici alerte)."
shell = "Executați o comandă shell în directorul spațiului de lucru"
sop_advance = "Raportați rezultatul pasului SOP curent și avansați la pasul următor. Furnizați run_id, dacă pasul a reușit sau eșuat și un scurt rezumat al ieșirii."
sop_approve = "Aprobați un pas SOP în așteptare care așteaptă aprobarea operatorului. Returnează instrucțiunea pasului de executat. Folosiți sop_status pentru a vedea care rulări sunt în așteptare."
sop_execute = "Declanșați manual o Procedură Operațională Standard (SOP) după nume. Returnează ID-ul rulării și instrucțiunea primului pas. Folosiți sop_list pentru a vedea SOP-urile disponibile."
sop_list = "Listați toate Procedurile Operaționale Standard (SOP) încărcate cu declanșatoarele, prioritatea, numărul de pași și numărul de rulări active. Opțional filtrați după nume sau prioritate."
sop_status = "Interogați starea execuției SOP. Furnizați run_id pentru o rulare specifică sau sop_name pentru a lista rulările acelui SOP. Fără argumente, afișează toate rulările active."
swarm = "Orchestrați un roi de agenți pentru a gestiona colaborativ o sarcină. Suportă strategii secvențiale (pipeline), paralele (fan-out/fan-in) și router (selectat de LLM)."
tool_search = """Obțineți definițiile complete de schema pentru instrumente MCP amânate pentru a le putea apela. Folosiți "select:name1,name2" pentru potrivire exactă sau cuvinte cheie pentru căutare."""
web_fetch = "Preluați o pagină web și returnați conținutul ca text simplu curat. Paginile HTML sunt convertite automat în text lizibil. Răspunsurile JSON și text simplu sunt returnate ca atare. Doar cereri GET; urmărește redirecționări. Securitate: doar domenii din lista permisă, fără gazde locale/private."
web_search_tool = "Căutați pe web informații. Returnează rezultate de căutare relevante cu titluri, URL-uri și descrieri. Folosiți pentru a găsi informații actuale, știri sau subiecte de cercetare."
workspace = "Gestionați spații de lucru multi-client. Subcomenzi: list, switch, create, info, export. Fiecare spațiu de lucru oferă memorie, audit, secrete și restricții de instrumente izolate."
weather = "Obțineți condițiile meteo actuale și prognoza pentru orice locație din lume. Suportă nume de orașe (în orice limbă sau alfabet), coduri de aeroport IATA (de ex. 'OTP'), coordonate GPS (de ex. '44.4,26.1'), coduri poștale și geolocalizare bazată pe domeniu. Returnează temperatura, temperatura resimțită, umiditatea, viteza/direcția vântului, precipitațiile, vizibilitatea, presiunea, indicele UV și acoperirea norilor. Prognoză opțională de 0–3 zile cu defalcare orară. Unitățile sunt implicit metrice (°C, km/h, mm) dar pot fi setate la imperial (°F, mph, inchi) per cerere. Nu necesită cheie API."

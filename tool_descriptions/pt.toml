# Portuguese tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Criar, listar, verificar e restaurar backups do workspace"
browser = "Automação web/browser com backends plugáveis (agent-browser, rust-native, computer_use). Suporta ações DOM além de ações opcionais a nível de OS (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) através de um sidecar computer-use. Use 'snapshot' para mapear elementos interativos para refs (@e1, @e2). Aplica browser.allowed_domains para ações open."
browser_delegate = "Delegar tarefas baseadas em browser a um CLI com capacidade de browser para interagir com aplicações web como Teams, Outlook, Jira, Confluence"
browser_open = "Abrir um URL HTTPS aprovado no browser do sistema. Restrições de segurança: domínios apenas por allowlist, sem hosts locais/privados, sem scraping."
cloud_ops = "Ferramenta consultiva de transformação cloud. Analisa planos IaC, avalia caminhos de migração, revisa custos e verifica arquitetura contra os pilares do Well-Architected Framework. Somente leitura: não cria nem modifica recursos cloud."
cloud_patterns = "Biblioteca de padrões cloud. Dada uma descrição de workload, sugere padrões arquiteturais cloud-native aplicáveis (containerização, serverless, modernização de banco de dados, etc.)."
composio = "Executar ações em mais de 1000 apps via Composio (Gmail, Notion, GitHub, Slack, etc.). Use action='list' para ver ações disponíveis (inclui nomes de parâmetros). action='execute' com action_name/tool_slug e params para executar uma ação. Se não tiver certeza dos params exatos, passe 'text' com uma descrição em linguagem natural do que deseja (Composio resolverá os parâmetros corretos via NLP). action='list_accounts' ou action='connected_accounts' para listar contas OAuth conectadas. action='connect' com app/auth_config_id para obter URL OAuth. connected_account_id é resolvido automaticamente quando omitido."
content_search = "Pesquisar conteúdo de arquivos por padrão regex dentro do workspace. Suporta ripgrep (rg) com fallback para grep. Modos de saída: 'content' (linhas correspondentes com contexto), 'files_with_matches' (apenas caminhos de arquivos), 'count' (contagens de correspondências por arquivo). Exemplo: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Criar um cron job agendado (shell ou agent) com agendamentos cron/at/every. Use job_type='agent' com um prompt para executar o agente AI no agendamento. Para entregar saída a um canal (Discord, Telegram, Slack, Mattermost, Matrix), defina delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Esta é a ferramenta preferida para enviar mensagens agendadas/atrasadas a utilizadores via canais."""
cron_list = "Listar todos os cron jobs agendados"
cron_remove = "Remover um cron job por id"
cron_run = "Forçar execução imediata de um cron job e registar histórico de execução"
cron_runs = "Listar histórico recente de execuções de um cron job"
cron_update = "Atualizar um cron job existente (schedule, command, prompt, enabled, delivery, model, etc.)"
data_management = "Retenção de dados do workspace, purga e estatísticas de armazenamento"
delegate = "Delegar uma subtarefa a um agente especializado. Use quando: uma tarefa beneficia de um modelo diferente (ex. sumarização rápida, raciocínio profundo, geração de código). O sub-agente executa um único prompt por padrão; com agentic=true pode iterar com um loop de chamadas de ferramentas filtrado."
file_edit = "Editar um arquivo substituindo uma correspondência exata de string por novo conteúdo"
file_read = "Ler conteúdo de arquivo com números de linha. Suporta leitura parcial via offset e limit. Extrai texto de PDF; outros arquivos binários são lidos com conversão UTF-8 lossy."
file_write = "Escrever conteúdo num arquivo no workspace"
git_operations = "Realizar operações Git estruturadas (status, diff, log, branch, commit, add, checkout, stash). Fornece saída JSON estruturada e integra com política de segurança para controlos de autonomia."
glob_search = "Pesquisar arquivos correspondentes a um padrão glob dentro do workspace. Retorna uma lista ordenada de caminhos de arquivos relativos à raiz do workspace. Exemplos: '**/*.rs' (todos os arquivos Rust), 'src/**/mod.rs' (todos os mod.rs em src)."
google_workspace = "Interagir com serviços Google Workspace (Drive, Gmail, Calendar, Sheets, Docs, etc.) via CLI gws. Requer gws instalado e autenticado."
hardware_board_info = "Retornar informações completas da placa (chip, arquitetura, mapa de memória) para hardware conectado. Use quando: utilizador pergunta por 'board info', 'que placa tenho', 'hardware conectado', 'chip info', 'que hardware', ou 'mapa de memória'."
hardware_memory_map = "Retornar o mapa de memória (intervalos de endereços flash e RAM) para hardware conectado. Use quando: utilizador pergunta por 'endereços de memória superior e inferior', 'mapa de memória', 'espaço de endereçamento', ou 'endereços legíveis'. Retorna intervalos flash/RAM dos datasheets."
hardware_memory_read = "Ler valores reais de memória/registos do Nucleo via USB. Use quando: utilizador pede para 'ler valores de registos', 'ler memória no endereço', 'dump de memória', 'memória inferior 0-126', ou 'dar endereço e valor'. Retorna dump hexadecimal. Requer Nucleo conectado via USB e feature probe. Params: address (hex, ex. 0x20000000 para início da RAM), length (bytes, padrão 128)."
http_request = "Fazer requisições HTTP a APIs externas. Suporta métodos GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Restrições de segurança: domínios apenas por allowlist, sem hosts locais/privados, timeout e limites de tamanho de resposta configuráveis."
image_info = "Ler metadados de arquivo de imagem (formato, dimensões, tamanho) e opcionalmente retornar dados codificados em base64."
jira = "Interagir com Jira: obter tickets com nível de detalhe configurável, pesquisar issues com JQL, e adicionar comentários com suporte a menção e formatação."
knowledge = "Gerir um grafo de conhecimento de decisões arquiteturais, padrões de solução, lições aprendidas e especialistas. Ações: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Gerir LinkedIn: criar publicações, listar suas publicações, comentar, reagir, eliminar publicações, ver engagement, obter info de perfil e ler a estratégia de conteúdo configurada. Requer credenciais LINKEDIN_* no arquivo .env."
discord_search = "Pesquisar histórico de mensagens Discord armazenado em discord.db. Use para encontrar mensagens passadas, resumir atividade de canal, ou procurar o que utilizadores disseram. Suporta pesquisa por palavra-chave e filtros opcionais: channel_id, since, until."
memory_forget = "Remover uma memória por chave. Use para eliminar factos desatualizados ou dados sensíveis. Retorna se a memória foi encontrada e removida."
memory_recall = "Pesquisar memória de longo prazo para factos, preferências ou contexto relevantes. Retorna resultados pontuados ordenados por relevância."
memory_store = "Armazenar um facto, preferência ou nota na memória de longo prazo. Use categoria 'core' para factos permanentes, 'daily' para notas de sessão, 'conversation' para contexto de chat, ou um nome de categoria personalizado."
microsoft365 = "Integração Microsoft 365: gerir correio Outlook, mensagens Teams, eventos Calendar, arquivos OneDrive e pesquisa SharePoint via Microsoft Graph API"
model_routing_config = "Gerir configurações de modelo padrão, rotas de provider/modelo baseadas em cenário, regras de classificação e perfis de sub-agentes delegate"
notion = "Interagir com Notion: consultar bases de dados, ler/criar/atualizar páginas e pesquisar o workspace."
pdf_read = "Extrair texto simples de um arquivo PDF no workspace. Retorna todo o texto legível. PDFs apenas com imagem ou encriptados retornam resultado vazio. Requer a build feature 'rag-pdf'."
project_intel = "Inteligência de entrega de projetos: gerar relatórios de status, detetar riscos, rascunhar atualizações para clientes, resumir sprints e estimar esforço. Ferramenta de análise somente leitura."
proxy_config = "Gerir configurações de proxy ZeroClaw (scope: environment | zeroclaw | services), incluindo aplicação em runtime e variáveis de ambiente de processo"
pushover = "Enviar uma notificação Pushover para o seu dispositivo. Requer PUSHOVER_TOKEN e PUSHOVER_USER_KEY no arquivo .env."
schedule = """Gerir tarefas agendadas apenas shell. Ações: create/add/once/list/get/cancel/remove/pause/resume. AVISO: Esta ferramenta cria jobs shell cuja saída é apenas registada em log, NÃO entregue a nenhum canal. Para enviar uma mensagem agendada ao Discord/Telegram/Slack/Matrix, use a ferramenta cron_add com job_type='agent' e uma configuração de delivery como {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Capturar uma screenshot do ecrã atual. Retorna o caminho do arquivo e dados PNG codificados em base64."
security_ops = "Ferramenta de operações de segurança para serviços geridos de cibersegurança. Ações: triage_alert (classificar/priorizar alertas), run_playbook (executar passos de resposta a incidentes), parse_vulnerability (analisar resultados de scan), generate_report (criar relatórios de postura de segurança), list_playbooks (listar playbooks disponíveis), alert_stats (resumir métricas de alertas)."
shell = "Executar um comando shell no diretório do workspace"
sop_advance = "Reportar o resultado do passo SOP atual e avançar para o próximo passo. Forneça o run_id, se o passo teve sucesso ou falhou, e um breve resumo da saída."
sop_approve = "Aprovar um passo SOP pendente que aguarda aprovação do operador. Retorna a instrução do passo a executar. Use sop_status para ver quais execuções estão em espera."
sop_execute = "Acionar manualmente um Standard Operating Procedure (SOP) por nome. Retorna o run ID e a instrução do primeiro passo. Use sop_list para ver SOPs disponíveis."
sop_list = "Listar todos os Standard Operating Procedures (SOPs) carregados com seus triggers, prioridade, contagem de passos e contagem de execuções ativas. Opcionalmente filtrar por nome ou prioridade."
sop_status = "Consultar estado de execução de SOP. Forneça run_id para uma execução específica, ou sop_name para listar execuções desse SOP. Sem argumentos, mostra todas as execuções ativas."
swarm = "Orquestrar um enxame de agentes para lidar colaborativamente com uma tarefa. Suporta estratégias sequencial (pipeline), paralela (fan-out/fan-in) e router (seleção por LLM)."
tool_search = """Obter definições completas de schema para ferramentas MCP diferidas para que possam ser chamadas. Use "select:name1,name2" para correspondência exata ou palavras-chave para pesquisar."""
web_fetch = "Obter uma página web e retornar seu conteúdo como texto simples limpo. Páginas HTML são automaticamente convertidas em texto legível. Respostas JSON e texto simples são retornadas como estão. Apenas requisições GET; segue redirecionamentos. Segurança: domínios apenas por allowlist, sem hosts locais/privados."
web_search_tool = "Pesquisar na web por informação. Retorna resultados de pesquisa relevantes com títulos, URLs e descrições. Use para encontrar informação atual, notícias ou pesquisar tópicos."
workspace = "Gerir workspaces multi-cliente. Subcomandos: list, switch, create, info, export. Cada workspace fornece memória, auditoria, segredos e restrições de ferramentas isolados."
weather = "Obter condições meteorológicas atuais e previsão para qualquer localização mundial. Suporta nomes de cidades (em qualquer idioma ou script), códigos de aeroporto IATA (ex. 'LAX'), coordenadas GPS (ex. '51.5,-0.1'), códigos postais e geolocalização baseada em domínio. Retorna temperatura, sensação térmica, humidade, velocidade/direção do vento, precipitação, visibilidade, pressão, índice UV e cobertura de nuvens. Previsão opcional de 0-3 dias com detalhamento horário. Unidades padrão em métrico (°C, km/h, mm) mas podem ser definidas para imperial (°F, mph, polegadas) por requisição. Sem necessidade de API key."

# Korean tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "워크스페이스 백업을 생성, 나열, 검증 및 복원합니다"
browser = "플러그 가능한 백엔드(agent-browser, rust-native, computer_use)를 사용한 웹/브라우저 자동화. DOM 액션과 선택적 OS 레벨 액션(mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture)을 computer-use 사이드카를 통해 지원합니다. 'snapshot'을 사용하여 인터랙티브 요소를 ref(@e1, @e2)에 매핑합니다. open 액션에 대해 browser.allowed_domains를 적용합니다."
browser_delegate = "Teams, Outlook, Jira, Confluence 등의 웹 애플리케이션과 상호작용하기 위해 브라우저 지원 CLI에 브라우저 기반 작업을 위임합니다"
browser_open = "승인된 HTTPS URL을 시스템 브라우저에서 엽니다. 보안 제약: 허용 목록 전용 도메인, 로컬/사설 호스트 불가, 스크래핑 불가."
cloud_ops = "클라우드 전환 자문 도구. IaC 계획 분석, 마이그레이션 경로 평가, 비용 검토, Well-Architected Framework 기둥 기반 아키텍처 점검을 수행합니다. 읽기 전용: 클라우드 리소스를 생성하거나 수정하지 않습니다."
cloud_patterns = "클라우드 패턴 라이브러리. 워크로드 설명에 따라 적용 가능한 클라우드 네이티브 아키텍처 패턴(컨테이너화, 서버리스, 데이터베이스 현대화 등)을 제안합니다."
composio = "Composio를 통해 1000개 이상의 앱(Gmail, Notion, GitHub, Slack 등)에서 액션을 실행합니다. action='list'로 사용 가능한 액션(파라미터 이름 포함) 조회. action='execute'로 action_name/tool_slug와 params를 지정하여 액션 실행. 정확한 파라미터를 모르면 'text'에 자연어 설명을 전달하세요(Composio가 NLP로 올바른 파라미터를 해석합니다). action='list_accounts' 또는 action='connected_accounts'로 OAuth 연결 계정 조회. action='connect'로 app/auth_config_id를 지정하여 OAuth URL 획득. connected_account_id는 생략 시 자동 해석됩니다."
content_search = "워크스페이스 내에서 regex 패턴으로 파일 내용을 검색합니다. ripgrep(rg)을 지원하며 grep 폴백이 있습니다. 출력 모드: 'content'(컨텍스트가 포함된 매칭 라인), 'files_with_matches'(파일 경로만), 'count'(파일별 매칭 수). 예: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """cron/at/every 스케줄로 예약된 cron 작업(shell 또는 agent)을 생성합니다. job_type='agent'와 프롬프트를 사용하여 스케줄에 따라 AI 에이전트를 실행합니다. 채널(Discord, Telegram, Slack, Mattermost, Matrix)에 출력을 전달하려면 delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}를 설정하세요. 채널을 통해 사용자에게 예약/지연 메시지를 보내기 위한 권장 도구입니다."""
cron_list = "예약된 모든 cron 작업을 나열합니다"
cron_remove = "ID로 cron 작업을 제거합니다"
cron_run = "cron 작업을 즉시 강제 실행하고 실행 이력을 기록합니다"
cron_runs = "cron 작업의 최근 실행 이력을 나열합니다"
cron_update = "기존 cron 작업을 수정합니다(schedule, command, prompt, enabled, delivery, model 등)"
data_management = "워크스페이스 데이터 보존, 퍼지, 스토리지 통계"
delegate = "전문 에이전트에 하위 작업을 위임합니다. 다른 모델이 유익한 경우 사용(예: 빠른 요약, 깊은 추론, 코드 생성). 서브 에이전트는 기본적으로 단일 프롬프트를 실행하며, agentic=true로 필터링된 도구 호출 루프를 반복할 수 있습니다."
file_edit = "정확히 일치하는 문자열을 새 내용으로 교체하여 파일을 편집합니다"
file_read = "줄 번호가 포함된 파일 내용을 읽습니다. offset과 limit을 통한 부분 읽기를 지원합니다. PDF에서 텍스트 추출. 기타 바이너리 파일은 lossy UTF-8 변환으로 읽습니다."
file_write = "워크스페이스의 파일에 내용을 씁니다"
git_operations = "구조화된 Git 작업(status, diff, log, branch, commit, add, checkout, stash)을 수행합니다. 파싱된 JSON 출력을 제공하고 자율 제어를 위한 보안 정책과 통합됩니다."
glob_search = "워크스페이스 내에서 glob 패턴과 일치하는 파일을 검색합니다. 워크스페이스 루트 기준 상대 경로의 정렬된 매칭 파일 목록을 반환합니다. 예: '**/*.rs'(모든 Rust 파일), 'src/**/mod.rs'(src 내 모든 mod.rs)."
google_workspace = "gws CLI를 통해 Google Workspace 서비스(Drive, Gmail, Calendar, Sheets, Docs 등)와 상호작용합니다. gws 설치 및 인증이 필요합니다."
hardware_board_info = "연결된 하드웨어의 전체 보드 정보(칩, 아키텍처, 메모리 맵)를 반환합니다. 사용 시점: 사용자가 '보드 정보', '연결된 하드웨어', '칩 정보', '메모리 맵'에 대해 질문할 때."
hardware_memory_map = "연결된 하드웨어의 메모리 맵(flash 및 RAM 주소 범위)을 반환합니다. 사용 시점: 사용자가 '상위 및 하위 메모리 주소', '메모리 맵', '주소 공간', '읽기 가능한 주소'에 대해 질문할 때. 데이터시트에서 flash/RAM 범위를 반환합니다."
hardware_memory_read = "USB를 통해 Nucleo에서 실제 메모리/레지스터 값을 읽습니다. 사용 시점: 사용자가 '레지스터 값 읽기', '주소의 메모리 읽기', '메모리 덤프', '하위 메모리 0-126', '주소와 값'에 대해 질문할 때. 16진 덤프를 반환합니다. USB로 연결된 Nucleo와 probe 기능이 필요합니다. 파라미터: address(16진수, 예: RAM 시작 0x20000000), length(바이트, 기본값 128)."
http_request = "외부 API에 HTTP 요청을 보냅니다. GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS 메서드를 지원합니다. 보안 제약: 허용 목록 전용 도메인, 로컬/사설 호스트 불가, 구성 가능한 타임아웃 및 응답 크기 제한."
image_info = "이미지 파일의 메타데이터(형식, 크기, 해상도)를 읽고 선택적으로 base64 인코딩 데이터를 반환합니다."
jira = "Jira와 상호작용: 구성 가능한 세부 수준으로 티켓 조회, JQL로 이슈 검색, 멘션 및 서식을 지원하는 코멘트 추가."
knowledge = "아키텍처 결정, 솔루션 패턴, 교훈, 전문가의 지식 그래프를 관리합니다. 액션: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "LinkedIn 관리: 게시물 작성, 게시물 목록, 댓글, 반응, 게시물 삭제, 참여도 확인, 프로필 정보 조회, 설정된 콘텐츠 전략 읽기. .env 파일에 LINKEDIN_* 자격 증명이 필요합니다."
discord_search = "discord.db에 저장된 Discord 메시지 이력을 검색합니다. 과거 메시지 찾기, 채널 활동 요약, 사용자 발언 검색에 사용합니다. 키워드 검색과 선택적 필터(channel_id, since, until)를 지원합니다."
memory_forget = "키로 메모리를 삭제합니다. 오래된 사실이나 민감한 데이터를 삭제할 때 사용합니다. 메모리를 찾아서 삭제했는지 여부를 반환합니다."
memory_recall = "장기 메모리에서 관련 사실, 설정, 컨텍스트를 검색합니다. 관련성으로 순위가 매겨진 점수 결과를 반환합니다."
memory_store = "사실, 설정 또는 메모를 장기 메모리에 저장합니다. 영구 사실에는 카테고리 'core', 세션 메모에는 'daily', 채팅 컨텍스트에는 'conversation' 또는 사용자 지정 카테고리 이름을 사용합니다."
microsoft365 = "Microsoft 365 통합: Microsoft Graph API를 통해 Outlook 메일, Teams 메시지, Calendar 이벤트, OneDrive 파일, SharePoint 검색을 관리"
model_routing_config = "기본 모델 설정, 시나리오 기반 프로바이더/모델 라우트, 분류 규칙, delegate 서브 에이전트 프로필을 관리합니다"
notion = "Notion과 상호작용: 데이터베이스 쿼리, 페이지 읽기/생성/업데이트, 워크스페이스 검색."
pdf_read = "워크스페이스 내 PDF 파일에서 일반 텍스트를 추출합니다. 읽을 수 있는 모든 텍스트를 반환합니다. 이미지 전용 또는 암호화된 PDF는 빈 결과를 반환합니다. 'rag-pdf' 빌드 기능이 필요합니다."
project_intel = "프로젝트 전달 인텔리전스: 상태 보고서 생성, 리스크 감지, 고객 업데이트 초안, 스프린트 요약, 공수 추정. 읽기 전용 분석 도구."
proxy_config = "ZeroClaw proxy 설정 관리(scope: environment | zeroclaw | services), 런타임 및 프로세스 env 적용 포함"
pushover = "기기에 Pushover 알림을 보냅니다. .env 파일에 PUSHOVER_TOKEN과 PUSHOVER_USER_KEY가 필요합니다."
schedule = """셸 전용 예약 작업을 관리합니다. 액션: create/add/once/list/get/cancel/remove/pause/resume. 경고: 이 도구는 셸 작업을 생성하지만 출력은 로그에만 기록되며 채널로 전달되지 않습니다. Discord/Telegram/Slack/Matrix에 예약 메시지를 보내려면 cron_add 도구에서 job_type='agent'와 delivery 설정(예: {"mode":"announce","channel":"discord","to":"<channel_id>"})을 사용하세요."""
screenshot = "현재 화면의 스크린샷을 캡처합니다. 파일 경로와 base64 인코딩된 PNG 데이터를 반환합니다."
security_ops = "관리형 사이버 보안 서비스용 보안 운영 도구. 액션: triage_alert(알림 분류/우선순위 지정), run_playbook(인시던트 대응 절차 실행), parse_vulnerability(스캔 결과 파싱), generate_report(보안 태세 보고서 생성), list_playbooks(사용 가능한 플레이북 목록), alert_stats(알림 메트릭 요약)."
shell = "워크스페이스 디렉토리에서 셸 명령을 실행합니다"
sop_advance = "현재 SOP 단계의 결과를 보고하고 다음 단계로 진행합니다. run_id, 단계 성공/실패 여부, 간략한 출력 요약을 제공하세요."
sop_approve = "운영자 승인을 기다리는 보류 중인 SOP 단계를 승인합니다. 실행할 단계 지침을 반환합니다. sop_status를 사용하여 대기 중인 실행을 확인하세요."
sop_execute = "표준 운영 절차(SOP)를 이름으로 수동 실행합니다. 실행 ID와 첫 번째 단계 지침을 반환합니다. sop_list로 사용 가능한 SOP를 확인하세요."
sop_list = "로드된 모든 표준 운영 절차(SOP)를 트리거, 우선순위, 단계 수, 활성 실행 수와 함께 나열합니다. 이름 또는 우선순위로 필터링 가능."
sop_status = "SOP 실행 상태를 조회합니다. 특정 실행에는 run_id를, SOP의 실행 목록에는 sop_name을 지정합니다. 인수 없이 모든 활성 실행을 표시합니다."
swarm = "작업을 협력적으로 처리하는 에이전트 스웜을 오케스트레이션합니다. 순차(파이프라인), 병렬(팬아웃/팬인), 라우터(LLM 선택) 전략을 지원합니다."
tool_search = """지연 로드된 MCP 도구의 전체 스키마 정의를 가져와 호출 가능하게 합니다. 정확한 매칭에는 "select:name1,name2"를, 키워드 검색에는 키워드를 사용하세요."""
web_fetch = "웹 페이지를 가져와 깨끗한 일반 텍스트로 내용을 반환합니다. HTML 페이지는 자동으로 읽기 쉬운 텍스트로 변환됩니다. JSON 및 일반 텍스트 응답은 그대로 반환됩니다. GET 요청만 가능하며 리다이렉트를 따릅니다. 보안: 허용 목록 전용 도메인, 로컬/사설 호스트 불가."
web_search_tool = "웹에서 정보를 검색합니다. 제목, URL, 설명이 포함된 관련 검색 결과를 반환합니다. 최신 정보, 뉴스, 연구 주제를 찾는 데 사용합니다."
workspace = "다중 클라이언트 워크스페이스를 관리합니다. 하위 명령: list, switch, create, info, export. 각 워크스페이스는 격리된 메모리, 감사, 시크릿, 도구 제한을 제공합니다."
weather = "전 세계 모든 위치의 현재 날씨와 예보를 가져옵니다. 도시 이름(모든 언어와 문자 지원), IATA 공항 코드(예: 'LAX'), GPS 좌표(예: '51.5,-0.1'), 우편번호, 도메인 기반 지오로케이션을 지원합니다. 기온, 체감 온도, 습도, 풍속/풍향, 강수량, 가시거리, 기압, UV 지수, 구름양을 반환합니다. 선택적으로 0~3일 예보(시간별 상세 포함). 단위는 기본적으로 미터법(°C, km/h, mm)이며 요청별로 야드파운드법(°F, mph, inches)으로 설정 가능합니다. API 키 불필요."

# Russian tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "Создание, просмотр, проверка и восстановление резервных копий рабочего пространства"
browser = "Автоматизация веб/browser с подключаемыми бэкендами (agent-browser, rust-native, computer_use). Поддерживает DOM-действия и опциональные действия на уровне ОС (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) через sidecar computer-use. Используйте 'snapshot' для сопоставления интерактивных элементов с refs (@e1, @e2). Применяет browser.allowed_domains для действий open."
browser_delegate = "Делегирование browser-задач CLI с поддержкой browser для взаимодействия с веб-приложениями (Teams, Outlook, Jira, Confluence)"
browser_open = "Открыть одобренный HTTPS URL в системном browser. Ограничения безопасности: только домены из белого списка, без локальных/частных хостов, без скрапинга."
cloud_ops = "Консультационный инструмент облачной трансформации. Анализирует планы IaC, оценивает пути миграции, проверяет затраты и сверяет архитектуру с принципами Well-Architected Framework. Только чтение: не создаёт и не изменяет облачные ресурсы."
cloud_patterns = "Библиотека облачных паттернов. По описанию рабочей нагрузки предлагает применимые облачно-нативные архитектурные паттерны (контейнеризация, serverless, модернизация баз данных и т.д.)."
composio = "Выполнение действий в 1000+ приложениях через Composio (Gmail, Notion, GitHub, Slack и т.д.). Используйте action='list' для просмотра доступных действий (включая имена параметров). action='execute' с action_name/tool_slug и params для запуска действия. Если точные params неизвестны, передайте 'text' с описанием на естественном языке (Composio разрешит параметры через NLP). action='list_accounts' или action='connected_accounts' для списка OAuth-подключённых аккаунтов. action='connect' с app/auth_config_id для получения OAuth URL. connected_account_id автоматически определяется при отсутствии."
content_search = "Поиск содержимого файлов по regex-паттерну в рабочем пространстве. Поддерживает ripgrep (rg) с fallback на grep. Режимы вывода: 'content' (совпавшие строки с контекстом), 'files_with_matches' (только пути файлов), 'count' (количество совпадений по файлам). Пример: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Создание запланированного cron-задания (shell или agent) с расписанием cron/at/every. Используйте job_type='agent' с промптом для запуска AI-агента по расписанию. Для доставки вывода в канал (Discord, Telegram, Slack, Mattermost, Matrix) установите delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Предпочтительный инструмент для отправки запланированных/отложенных сообщений пользователям через каналы."""
cron_list = "Список всех запланированных cron-заданий"
cron_remove = "Удаление cron-задания по id"
cron_run = "Принудительный немедленный запуск cron-задания с записью в историю выполнений"
cron_runs = "Список последних выполнений cron-задания"
cron_update = "Обновление существующего cron-задания (schedule, command, prompt, enabled, delivery, model и т.д.)"
data_management = "Управление хранением данных рабочего пространства, очистка и статистика хранилища"
delegate = "Делегирование подзадачи специализированному агенту. Используйте когда: задача выигрывает от другой модели (например, быстрое суммирование, глубокий анализ, генерация кода). Подагент по умолчанию выполняет один промпт; с agentic=true может итерировать с фильтрованным циклом вызова инструментов."
file_edit = "Редактирование файла путём замены точного совпадения строки новым содержимым"
file_read = "Чтение содержимого файла с номерами строк. Поддерживает частичное чтение через offset и limit. Извлекает текст из PDF; другие бинарные файлы читаются с lossy UTF-8 преобразованием."
file_write = "Запись содержимого в файл рабочего пространства"
git_operations = "Выполнение структурированных Git-операций (status, diff, log, branch, commit, add, checkout, stash). Предоставляет парсированный JSON-вывод и интегрируется с политикой безопасности для контроля автономности."
glob_search = "Поиск файлов по glob-паттерну в рабочем пространстве. Возвращает отсортированный список путей файлов относительно корня рабочего пространства. Примеры: '**/*.rs' (все Rust-файлы), 'src/**/mod.rs' (все mod.rs в src)."
google_workspace = "Взаимодействие с сервисами Google Workspace (Drive, Gmail, Calendar, Sheets, Docs и т.д.) через CLI gws. Требуется установленный и аутентифицированный gws."
hardware_board_info = "Возврат полной информации о плате (чип, архитектура, карта памяти) для подключённого оборудования. Используйте когда: пользователь спрашивает о 'board info', 'what board do I have', 'connected hardware', 'chip info', 'what hardware' или 'memory map'."
hardware_memory_map = "Возврат карты памяти (диапазоны адресов flash и RAM) для подключённого оборудования. Используйте когда: пользователь спрашивает о 'upper and lower memory addresses', 'memory map', 'address space' или 'readable addresses'. Возвращает диапазоны flash/RAM из даташитов."
hardware_memory_read = "Чтение реальных значений памяти/регистров с Nucleo через USB. Используйте когда: пользователь просит 'read register values', 'read memory at address', 'dump memory', 'lower memory 0-126' или 'give address and value'. Возвращает hex-дамп. Требуется подключённый Nucleo через USB и функция probe. Параметры: address (hex, например 0x20000000 для начала RAM), length (байты, по умолчанию 128)."
http_request = "Выполнение HTTP-запросов к внешним API. Поддерживает методы GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Ограничения безопасности: только домены из белого списка, без локальных/частных хостов, настраиваемые тайм-аут и лимиты размера ответа."
image_info = "Чтение метаданных изображения (формат, размеры, объём) с опциональным возвратом данных в base64."
jira = "Взаимодействие с Jira: получение тикетов с настраиваемым уровнем детализации, поиск задач по JQL, добавление комментариев с поддержкой упоминаний и форматирования."
knowledge = "Управление графом знаний: архитектурные решения, шаблоны решений, извлечённые уроки и эксперты. Действия: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Управление LinkedIn: создание постов, просмотр своих постов, комментирование, реакции, удаление постов, просмотр вовлечённости, получение информации профиля и чтение настроенной контент-стратегии. Требуются учётные данные LINKEDIN_* в файле .env."
discord_search = "Поиск по истории сообщений Discord, хранящихся в discord.db. Используйте для поиска прошлых сообщений, суммирования активности канала или просмотра сказанного пользователями. Поддерживает поиск по ключевым словам и опциональные фильтры: channel_id, since, until."
memory_forget = "Удаление записи из памяти по ключу. Используйте для удаления устаревших фактов или конфиденциальных данных. Возвращает, была ли запись найдена и удалена."
memory_recall = "Поиск в долговременной памяти релевантных фактов, предпочтений или контекста. Возвращает результаты с оценкой релевантности."
memory_store = "Сохранение факта, предпочтения или заметки в долговременной памяти. Используйте категорию 'core' для постоянных фактов, 'daily' для заметок сеанса, 'conversation' для контекста чата или произвольное имя категории."
microsoft365 = "Интеграция с Microsoft 365: управление почтой Outlook, сообщениями Teams, событиями Calendar, файлами OneDrive и поиском SharePoint через Microsoft Graph API"
model_routing_config = "Управление настройками модели по умолчанию, маршрутами провайдера/модели по сценариям, правилами классификации и профилями подагентов delegate"
notion = "Взаимодействие с Notion: запросы к базам данных, чтение/создание/обновление страниц и поиск по рабочему пространству."
pdf_read = "Извлечение простого текста из PDF-файла в рабочем пространстве. Возвращает весь читаемый текст. PDF только с изображениями или зашифрованные PDF возвращают пустой результат. Требуется функция сборки 'rag-pdf'."
project_intel = "Аналитика доставки проекта: генерация отчётов о статусе, выявление рисков, черновики обновлений для клиентов, суммирование спринтов и оценка трудозатрат. Инструмент только для чтения."
proxy_config = "Управление настройками proxy ZeroClaw (область: environment | zeroclaw | services), включая применение к runtime и переменным окружения процесса"
pushover = "Отправка Pushover-уведомления на ваше устройство. Требуются PUSHOVER_TOKEN и PUSHOVER_USER_KEY в файле .env."
schedule = """Управление запланированными задачами только для shell. Действия: create/add/once/list/get/cancel/remove/pause/resume. ПРЕДУПРЕЖДЕНИЕ: этот инструмент создаёт shell-задания, вывод которых только записывается в лог и НЕ доставляется ни в один канал. Для отправки запланированного сообщения в Discord/Telegram/Slack/Matrix используйте инструмент cron_add с job_type='agent' и конфигурацией delivery вроде {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Захват снимка экрана. Возвращает путь к файлу и данные PNG в кодировке base64."
security_ops = "Инструмент операций безопасности для управляемых сервисов кибербезопасности. Действия: triage_alert (классификация/приоритизация алертов), run_playbook (выполнение шагов реагирования на инциденты), parse_vulnerability (парсинг результатов сканирования), generate_report (создание отчётов о состоянии безопасности), list_playbooks (список доступных плейбуков), alert_stats (сводка метрик алертов)."
shell = "Выполнение shell-команды в директории рабочего пространства"
sop_advance = "Отчёт о результате текущего шага SOP и переход к следующему шагу. Укажите run_id, успешно ли завершился шаг или нет, и краткую сводку вывода."
sop_approve = "Одобрение ожидающего шага SOP, который ждёт подтверждения оператора. Возвращает инструкцию шага для выполнения. Используйте sop_status, чтобы узнать, какие запуски ожидают."
sop_execute = "Ручной запуск стандартной операционной процедуры (SOP) по имени. Возвращает ID запуска и инструкцию первого шага. Используйте sop_list для просмотра доступных SOP."
sop_list = "Список всех загруженных стандартных операционных процедур (SOP) с их триггерами, приоритетом, количеством шагов и числом активных запусков. Опционально фильтрация по имени или приоритету."
sop_status = "Запрос статуса выполнения SOP. Укажите run_id для конкретного запуска или sop_name для списка запусков данной SOP. Без аргументов показывает все активные запуски."
swarm = "Оркестрация роя агентов для совместного выполнения задачи. Поддерживает последовательную (pipeline), параллельную (fan-out/fan-in) и маршрутизирующую (выбор LLM) стратегии."
tool_search = """Получение полных определений схем для отложенных MCP-инструментов для их вызова. Используйте "select:name1,name2" для точного соответствия или ключевые слова для поиска."""
web_fetch = "Загрузка веб-страницы и возврат её содержимого как чистого текста. HTML-страницы автоматически преобразуются в читаемый текст. Ответы JSON и простой текст возвращаются как есть. Только GET-запросы; следует редиректам. Безопасность: только домены из белого списка, без локальных/частных хостов."
web_search_tool = "Поиск информации в интернете. Возвращает релевантные результаты поиска с заголовками, URL и описаниями. Используйте для поиска актуальной информации, новостей или исследовательских тем."
workspace = "Управление мультиклиентскими рабочими пространствами. Подкоманды: list, switch, create, info, export. Каждое рабочее пространство обеспечивает изолированную память, аудит, секреты и ограничения инструментов."
weather = "Получение текущих погодных условий и прогноза для любого места в мире. Поддерживает названия городов (на любом языке и письменности), коды аэропортов IATA (например 'LAX'), GPS-координаты (например '51.5,-0.1'), почтовые индексы и геолокацию по домену. Возвращает температуру, ощущаемую температуру, влажность, скорость/направление ветра, осадки, видимость, давление, UV-индекс и облачность. Опциональный прогноз на 0–3 дня с почасовой разбивкой. Единицы по умолчанию метрические (°C, км/ч, мм), но могут быть установлены в имперские (°F, mph, дюймы) для каждого запроса. API-ключ не требуется."

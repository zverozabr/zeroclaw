# Japanese tool descriptions
#
# Each key under [tools] matches the tool's name() return value.
# Values are the human-readable descriptions shown in system prompts.

[tools]
backup = "ワークスペースのバックアップの作成、一覧表示、検証、復元を行います"
browser = "プラグ可能なバックエンド（agent-browser、rust-native、computer_use）を使用したWeb/ブラウザ自動化。DOMアクションに加え、オプションのOSレベルアクション（mouse_move、mouse_click、mouse_drag、key_type、key_press、screen_capture）をcomputer-useサイドカーを通じてサポート。'snapshot'を使用してインタラクティブ要素をref（@e1、@e2）にマッピング。openアクションに対してbrowser.allowed_domainsを適用します。"
browser_delegate = "Teams、Outlook、Jira、Confluenceなどのウェブアプリケーションとやり取りするために、ブラウザ対応CLIにブラウザベースのタスクを委任します"
browser_open = "承認済みのHTTPS URLをシステムブラウザで開きます。セキュリティ制約：許可リストのみのドメイン、ローカル/プライベートホスト禁止、スクレイピング禁止。"
cloud_ops = "クラウド変革アドバイザリーツール。IaCプランの分析、移行パスの評価、コストレビュー、Well-Architected Frameworkの柱に基づくアーキテクチャチェックを行います。読み取り専用：クラウドリソースの作成や変更は行いません。"
cloud_patterns = "クラウドパターンライブラリ。ワークロードの説明に基づき、適用可能なクラウドネイティブアーキテクチャパターン（コンテナ化、サーバーレス、データベースモダナイゼーションなど）を提案します。"
composio = "Composioを通じて1000以上のアプリ（Gmail、Notion、GitHub、Slackなど）でアクションを実行します。action='list'で利用可能なアクション（パラメータ名を含む）を表示。action='execute'でaction_name/tool_slugとparamsを指定してアクションを実行。正確なパラメータが不明な場合は、代わりに'text'で自然言語の説明を渡してください（ComposioがNLPで正しいパラメータを解決します）。action='list_accounts'またはaction='connected_accounts'でOAuth接続済みアカウントを一覧表示。action='connect'でapp/auth_config_idを指定してOAuth URLを取得。connected_account_idは省略時に自動解決されます。"
content_search = "ワークスペース内でregexパターンによるファイル内容検索を行います。ripgrep（rg）をサポートし、grepフォールバックあり。出力モード：'content'（コンテキスト付きマッチ行）、'files_with_matches'（ファイルパスのみ）、'count'（ファイルごとのマッチ数）。例：pattern='fn main', include='*.rs', output_mode='content'。"
cron_add = """スケジュールされたcronジョブ（shellまたはagent）をcron/at/everyスケジュールで作成します。job_type='agent'とプロンプトを使用して、スケジュールに従ってAIエージェントを実行します。チャンネル（Discord、Telegram、Slack、Mattermost、Matrix）に出力を配信するには、delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}を設定します。チャンネル経由でユーザーにスケジュール/遅延メッセージを送信するための推奨ツールです。"""
cron_list = "スケジュールされた全てのcronジョブを一覧表示します"
cron_remove = "IDを指定してcronジョブを削除します"
cron_run = "cronジョブを即座に強制実行し、実行履歴を記録します"
cron_runs = "cronジョブの最近の実行履歴を一覧表示します"
cron_update = "既存のcronジョブを更新します（schedule、command、prompt、enabled、delivery、modelなど）"
data_management = "ワークスペースのデータ保持、パージ、ストレージ統計"
delegate = "専門エージェントにサブタスクを委任します。異なるモデルが有益な場合に使用（例：高速な要約、深い推論、コード生成）。サブエージェントはデフォルトで単一プロンプトを実行し、agentic=trueでフィルタ付きツール呼び出しループを反復できます。"
file_edit = "完全一致する文字列を新しい内容に置換してファイルを編集します"
file_read = "行番号付きでファイル内容を読み取ります。offsetとlimitによる部分読み取りをサポート。PDFからテキスト抽出。その他のバイナリファイルはlossy UTF-8変換で読み取ります。"
file_write = "ワークスペース内のファイルに内容を書き込みます"
git_operations = "構造化されたGit操作（status、diff、log、branch、commit、add、checkout、stash）を実行します。パース済みJSON出力を提供し、自律制御のセキュリティポリシーと統合します。"
glob_search = "ワークスペース内でglobパターンに一致するファイルを検索します。ワークスペースルートからの相対パスでソートされたマッチファイルリストを返します。例：'**/*.rs'（全Rustファイル）、'src/**/mod.rs'（src内の全mod.rs）。"
google_workspace = "Google Workspaceサービス（Drive、Gmail、Calendar、Sheets、Docsなど）とgws CLIを介して連携します。gwsのインストールと認証が必要です。"
hardware_board_info = "接続されたハードウェアの完全なボード情報（チップ、アーキテクチャ、メモリマップ）を返します。使用場面：ユーザーが「ボード情報」「接続されたハードウェア」「チップ情報」「メモリマップ」について質問した場合。"
hardware_memory_map = "接続されたハードウェアのメモリマップ（flashとRAMのアドレス範囲）を返します。使用場面：ユーザーが「上位・下位メモリアドレス」「メモリマップ」「アドレス空間」「読み取り可能なアドレス」について質問した場合。データシートからflash/RAM範囲を返します。"
hardware_memory_read = "USB経由でNucleoから実際のメモリ/レジスタ値を読み取ります。使用場面：ユーザーが「レジスタ値の読み取り」「アドレスのメモリ読み取り」「メモリダンプ」「下位メモリ 0-126」「アドレスと値」について質問した場合。16進ダンプを返します。USB接続されたNucleoとprobe機能が必要です。パラメータ：address（16進数、例：RAMの先頭は0x20000000）、length（バイト数、デフォルト128）。"
http_request = "外部APIへのHTTPリクエストを実行します。GET、POST、PUT、DELETE、PATCH、HEAD、OPTIONSメソッドをサポート。セキュリティ制約：許可リストのみのドメイン、ローカル/プライベートホスト禁止、設定可能なタイムアウトとレスポンスサイズ制限。"
image_info = "画像ファイルのメタデータ（フォーマット、サイズ、寸法）を読み取り、オプションでbase64エンコードデータを返します。"
jira = "Jiraと連携：設定可能な詳細レベルでチケットを取得、JQLでイシューを検索、メンションとフォーマットをサポートしたコメントの追加。"
knowledge = "アーキテクチャ決定、ソリューションパターン、学んだ教訓、エキスパートのナレッジグラフを管理します。アクション：capture、search、relate、suggest、expert_find、lessons_extract、graph_stats。"
linkedin = "LinkedInを管理：投稿の作成、投稿一覧、コメント、リアクション、投稿削除、エンゲージメント閲覧、プロフィール情報取得、設定済みコンテンツ戦略の読み取り。.envファイルにLINKEDIN_*認証情報が必要です。"
discord_search = "discord.dbに保存されたDiscordメッセージ履歴を検索します。過去のメッセージの検索、チャンネルアクティビティの要約、ユーザーの発言の検索に使用。キーワード検索とオプションのフィルター（channel_id、since、until）をサポート。"
memory_forget = "キーを指定してメモリを削除します。古くなった事実や機密データの削除に使用。メモリが見つかって削除されたかどうかを返します。"
memory_recall = "長期メモリから関連する事実、設定、コンテキストを検索します。関連性でランク付けされたスコア付き結果を返します。"
memory_store = "事実、設定、またはメモを長期メモリに保存します。永続的な事実にはカテゴリ'core'、セッションメモには'daily'、チャットコンテキストには'conversation'、またはカスタムカテゴリ名を使用します。"
microsoft365 = "Microsoft 365統合：Microsoft Graph API経由でOutlookメール、Teamsメッセージ、Calendarイベント、OneDriveファイル、SharePoint検索を管理"
model_routing_config = "デフォルトモデル設定、シナリオベースのプロバイダー/モデルルート、分類ルール、delegateサブエージェントプロファイルを管理します"
notion = "Notionと連携：データベースのクエリ、ページの読み取り/作成/更新、ワークスペースの検索。"
pdf_read = "ワークスペース内のPDFファイルからプレーンテキストを抽出します。読み取り可能な全テキストを返します。画像のみまたは暗号化されたPDFは空の結果を返します。'rag-pdf'ビルドフィーチャーが必要です。"
project_intel = "プロジェクト配信インテリジェンス：ステータスレポート生成、リスク検出、クライアント更新の下書き、スプリント要約、工数見積もり。読み取り専用の分析ツール。"
proxy_config = "ZeroClaw proxyの設定管理（scope: environment | zeroclaw | services）、ランタイムとプロセスenv適用を含む"
pushover = "デバイスにPushover通知を送信します。.envファイルにPUSHOVER_TOKENとPUSHOVER_USER_KEYが必要です。"
schedule = """シェル専用のスケジュールタスクを管理します。アクション：create/add/once/list/get/cancel/remove/pause/resume。警告：このツールはシェルジョブを作成しますが、出力はログに記録されるだけで、チャンネルには配信されません。Discord/Telegram/Slack/Matrixにスケジュールメッセージを送信するには、cron_addツールでjob_type='agent'とdelivery設定（例：{"mode":"announce","channel":"discord","to":"<channel_id>"}）を使用してください。"""
screenshot = "現在の画面のスクリーンショットをキャプチャします。ファイルパスとbase64エンコードされたPNGデータを返します。"
security_ops = "マネージドサイバーセキュリティサービス用セキュリティ運用ツール。アクション：triage_alert（アラートの分類/優先順位付け）、run_playbook（インシデント対応手順の実行）、parse_vulnerability（スキャン結果の解析）、generate_report（セキュリティ態勢レポートの作成）、list_playbooks（利用可能なプレイブックの一覧）、alert_stats（アラートメトリクスの要約）。"
shell = "ワークスペースディレクトリでシェルコマンドを実行します"
sop_advance = "現在のSOPステップの結果を報告し、次のステップに進みます。run_id、ステップの成功/失敗、簡単な出力サマリーを提供してください。"
sop_approve = "オペレーターの承認待ちの保留中SOPステップを承認します。実行するステップの指示を返します。sop_statusを使用して待機中の実行を確認してください。"
sop_execute = "標準業務手順書（SOP）を名前で手動実行します。実行IDと最初のステップの指示を返します。sop_listで利用可能なSOPを確認してください。"
sop_list = "読み込まれた全ての標準業務手順書（SOP）をトリガー、優先度、ステップ数、アクティブ実行数とともに一覧表示します。名前または優先度でフィルタ可能。"
sop_status = "SOP実行ステータスを照会します。特定の実行にはrun_idを、SOPの実行一覧にはsop_nameを指定します。引数なしで全てのアクティブ実行を表示します。"
swarm = "タスクを協力して処理するエージェントスウォームをオーケストレーションします。シーケンシャル（パイプライン）、パラレル（ファンアウト/ファンイン）、ルーター（LLM選択）戦略をサポート。"
tool_search = """遅延読み込みされたMCPツールの完全なスキーマ定義を取得して呼び出し可能にします。完全一致には"select:name1,name2"を、キーワード検索にはキーワードを使用してください。"""
web_fetch = "ウェブページを取得し、クリーンなプレーンテキストとして内容を返します。HTMLページは自動的に読みやすいテキストに変換されます。JSONとプレーンテキストのレスポンスはそのまま返されます。GETリクエストのみ、リダイレクトに追従。セキュリティ：許可リストのみのドメイン、ローカル/プライベートホスト禁止。"
web_search_tool = "ウェブで情報を検索します。タイトル、URL、説明を含む関連する検索結果を返します。最新の情報、ニュース、リサーチトピックの検索に使用。"
workspace = "マルチクライアントワークスペースを管理します。サブコマンド：list、switch、create、info、export。各ワークスペースは独立したメモリ、監査、シークレット、ツール制限を提供します。"
weather = "世界中の任意の場所の現在の天気と予報を取得します。都市名（あらゆる言語・文字対応）、IATA空港コード（例：'LAX'）、GPS座標（例：'51.5,-0.1'）、郵便番号、ドメインベースのジオロケーションをサポート。気温、体感温度、湿度、風速/風向、降水量、視程、気圧、UVインデックス、雲量を返します。オプションで0〜3日間の予報（時間別内訳あり）。単位はデフォルトでメートル法（°C、km/h、mm）、リクエストごとにヤードポンド法（°F、mph、inches）に設定可能。APIキー不要。"

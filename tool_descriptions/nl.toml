# Dutch tool descriptions (Nederlandse gereedschapsbeschrijvingen)
#
# Elke sleutel onder [tools] komt overeen met de name()-retourwaarde van het gereedschap.
# Waarden zijn de voor mensen leesbare beschrijvingen die in systeemprompts worden getoond.
# Ontbrekende sleutels vallen terug op de Engelse beschrijvingen (en.toml).

[tools]
backup = "Back-ups van de werkruimte aanmaken, weergeven, verifiëren en herstellen"
browser = "Web-/browserautomatisering met verwisselbare backends (agent-browser, rust-native, computer_use). Ondersteunt DOM-acties plus optionele OS-niveau-acties (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) via een computer-use sidecar. Gebruik 'snapshot' om interactieve elementen toe te wijzen aan refs (@e1, @e2). Handhaaft browser.allowed_domains voor open-acties."
browser_delegate = "Browsergebaseerde taken delegeren aan een browsercapabele CLI voor interactie met webapplicaties zoals Teams, Outlook, Jira, Confluence"
browser_open = "Een goedgekeurde HTTPS URL openen in de systeembrowser. Beveiligingsbeperkingen: alleen domeinen op de allowlist, geen lokale/privéhosts, geen scraping."
cloud_ops = "Adviesgereedschap voor cloudtransformatie. Analyseert IaC-plannen, beoordeelt migratietrajecten, beoordeelt kosten en toetst architectuur aan de pijlers van het Well-Architected Framework. Alleen-lezen: maakt geen cloudresources aan en wijzigt ze niet."
cloud_patterns = "Cloudpatroonbibliotheek. Suggereert op basis van een workloadbeschrijving toepasbare cloud-native architectuurpatronen (containerisatie, serverless, databasemodernisering, enz.)."
composio = "Acties uitvoeren op 1000+ apps via Composio (Gmail, Notion, GitHub, Slack, enz.). Gebruik action='list' om beschikbare acties te bekijken (inclusief parameternamen). action='execute' met action_name/tool_slug en params om een actie uit te voeren. Als u niet zeker bent van de exacte parameters, geef dan 'text' mee met een beschrijving in natuurlijke taal (Composio lost de juiste parameters op via NLP). action='list_accounts' of action='connected_accounts' om met OAuth verbonden accounts weer te geven. action='connect' met app/auth_config_id om een OAuth URL te verkrijgen. connected_account_id wordt automatisch opgelost als het wordt weggelaten."
content_search = "Bestandsinhoud doorzoeken op regex-patroon binnen de werkruimte. Ondersteunt ripgrep (rg) met grep als terugvaloptie. Uitvoermodi: 'content' (overeenkomende regels met context), 'files_with_matches' (alleen bestandspaden), 'count' (aantal treffers per bestand). Voorbeeld: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Een geplande cron-taak (shell of agent) aanmaken met cron/at/every-schema's. Gebruik job_type='agent' met een prompt om de AI-agent volgens schema uit te voeren. Om uitvoer naar een kanaal te sturen (Discord, Telegram, Slack, Mattermost, Matrix), stel delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"} in. Dit is het voorkeursgereedschap voor het verzenden van geplande/vertraagde berichten aan gebruikers via kanalen."""
cron_list = "Alle geplande cron-taken weergeven"
cron_remove = "Een cron-taak verwijderen op basis van ID"
cron_run = "Een cron-taak onmiddellijk geforceerd uitvoeren en de uitvoeringsgeschiedenis vastleggen"
cron_runs = "Recente uitvoeringsgeschiedenis van een cron-taak weergeven"
cron_update = "Een bestaande cron-taak bijwerken (schema, opdracht, prompt, ingeschakeld, bezorging, model, enz.)"
data_management = "Gegevensretentie, opschoning en opslagstatistieken van de werkruimte"
delegate = "Een subtaak delegeren aan een gespecialiseerde agent. Gebruik wanneer: een taak baat heeft bij een ander model (bijv. snelle samenvatting, diep redeneren, codegeneratie). De sub-agent voert standaard één prompt uit; met agentic=true kan deze itereren met een gefilterde tool-call-lus."
file_edit = "Een bestand bewerken door een exacte tekenreeksovereenkomst te vervangen door nieuwe inhoud"
file_read = "Bestandsinhoud lezen met regelnummers. Ondersteunt gedeeltelijk lezen via offset en limit. Extraheert tekst uit PDF; andere binaire bestanden worden gelezen met verliesgevende UTF-8-conversie."
file_write = "Inhoud naar een bestand in de werkruimte schrijven"
git_operations = "Gestructureerde Git-bewerkingen uitvoeren (status, diff, log, branch, commit, add, checkout, stash). Levert geparseerde JSON-uitvoer en integreert met beveiligingsbeleid voor autonomiecontroles."
glob_search = "Bestanden zoeken die overeenkomen met een glob-patroon binnen de werkruimte. Retourneert een gesorteerde lijst van bestandspaden relatief aan de werkruimteroot. Voorbeelden: '**/*.rs' (alle Rust-bestanden), 'src/**/mod.rs' (alle mod.rs in src)."
google_workspace = "Interactie met Google Workspace-diensten (Drive, Gmail, Calendar, Sheets, Docs, enz.) via de gws CLI. Vereist dat gws geïnstalleerd en geauthenticeerd is."
hardware_board_info = "Volledige boardinformatie retourneren (chip, architectuur, geheugenkaart) voor aangesloten hardware. Gebruik wanneer: gebruiker vraagt naar boardinfo, aangesloten hardware, chipinfo of geheugenkaart."
hardware_memory_map = "De geheugenkaart retourneren (Flash- en RAM-adresbereiken) voor aangesloten hardware. Gebruik wanneer: gebruiker vraagt naar geheugenkaart, adresruimte of leesbare adressen. Retourneert Flash/RAM-bereiken uit datasheets."
hardware_memory_read = "Werkelijke geheugen-/registerwaarden lezen van Nucleo via USB. Gebruik wanneer: gebruiker vraagt om registerwaarden te lezen, geheugen op adres te lezen, geheugen te dumpen, enz. Retourneert hex dump. Vereist Nucleo aangesloten via USB en probe-functie. Parameters: address (hex, bijv. 0x20000000 voor RAM-start), length (bytes, standaard 128)."
http_request = "HTTP-verzoeken naar externe API's versturen. Ondersteunt GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS methoden. Beveiligingsbeperkingen: alleen domeinen op de allowlist, geen lokale/privéhosts, configureerbare timeout en limieten voor responsgrootte."
image_info = "Metadata van een afbeeldingsbestand lezen (formaat, afmetingen, grootte) en optioneel base64-gecodeerde gegevens retourneren."
jira = "Interactie met Jira: tickets ophalen met configureerbaar detailniveau, issues zoeken met JQL, en opmerkingen toevoegen met vermeldings- en opmaakondersteuning."
knowledge = "Een kennisgraph beheren van architectuurbeslissingen, oplossingspatronen, geleerde lessen en experts. Acties: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "LinkedIn beheren: berichten aanmaken, berichten weergeven, reageren, liken, berichten verwijderen, betrokkenheid bekijken, profielinformatie ophalen en de geconfigureerde contentstrategie lezen. Vereist LINKEDIN_*-referenties in het .env-bestand."
discord_search = "Discord-berichtgeschiedenis doorzoeken die is opgeslagen in discord.db. Gebruik om eerdere berichten te vinden, kanaalactiviteit samen te vatten of op te zoeken wat gebruikers hebben gezegd. Ondersteunt zoeken op trefwoorden en optionele filters: channel_id, since, until."
memory_forget = "Een herinnering verwijderen op basis van sleutel. Gebruik om verouderde feiten of gevoelige gegevens te verwijderen. Retourneert of de herinnering is gevonden en verwijderd."
memory_recall = "Langetermijngeheugen doorzoeken op relevante feiten, voorkeuren of context. Retourneert gescoorde resultaten gerangschikt op relevantie."
memory_store = "Een feit, voorkeur of notitie opslaan in het langetermijngeheugen. Gebruik categorie 'core' voor permanente feiten, 'daily' voor sessienotities, 'conversation' voor chatcontext, of een aangepaste categorienaam."
microsoft365 = "Microsoft 365-integratie: Outlook-mail, Teams-berichten, Agenda-evenementen, OneDrive-bestanden en SharePoint-zoekopdrachten beheren via Microsoft Graph API"
model_routing_config = "Standaardmodelinstellingen beheren, scenariogebaseerde provider-/modelroutes, classificatieregels en profielen van gedelegeerde sub-agents"
notion = "Interactie met Notion: databases bevragen, pagina's lezen/aanmaken/bijwerken en de werkruimte doorzoeken."
pdf_read = "Platte tekst extraheren uit een PDF-bestand in de werkruimte. Retourneert alle leesbare tekst. PDF's met alleen afbeeldingen of versleutelde PDF's retourneren een leeg resultaat. Vereist de 'rag-pdf' build feature."
project_intel = "Projectleveringsintelligentie: statusrapporten genereren, risico's detecteren, klantenupdates opstellen, sprints samenvatten en inspanning schatten. Alleen-lezen analysetools."
proxy_config = "ZeroClaw proxy-instellingen beheren (bereik: environment | zeroclaw | services), inclusief runtime- en procesomgevingstoepassing"
pushover = "Een Pushover-melding naar uw apparaat sturen. Vereist PUSHOVER_TOKEN en PUSHOVER_USER_KEY in het .env-bestand."
schedule = """Geplande taken (alleen shell) beheren. Acties: create/add/once/list/get/cancel/remove/pause/resume. WAARSCHUWING: Dit gereedschap maakt shell-taken aan waarvan de uitvoer alleen wordt gelogd en NIET wordt bezorgd aan een kanaal. Om een gepland bericht naar Discord/Telegram/Slack/Matrix te sturen, gebruik het cron_add-gereedschap met job_type='agent' en een bezorgconfiguratie zoals {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Een schermafbeelding maken van het huidige scherm. Retourneert het bestandspad en base64-gecodeerde PNG-gegevens."
security_ops = "Beveiligingsoperatiegereedschap voor beheerde cyberbeveiligingsdiensten. Acties: triage_alert (classificeren/prioriteren van meldingen), run_playbook (incidentresponsstappen uitvoeren), parse_vulnerability (scanresultaten parseren), generate_report (beveiligingsstatusrapporten aanmaken), list_playbooks (beschikbare playbooks weergeven), alert_stats (meldingsstatistieken samenvatten)."
shell = "Een shell-opdracht uitvoeren in de werkruimtedirectory"
sop_advance = "Het resultaat van de huidige SOP-stap rapporteren en doorgaan naar de volgende stap. Geef de run_id op, of de stap geslaagd of mislukt is, en een korte uitvoersamenvatting."
sop_approve = "Een wachtende SOP-stap goedkeuren die wacht op goedkeuring van de operator. Retourneert de stapinstructie om uit te voeren. Gebruik sop_status om te zien welke runs wachten."
sop_execute = "Handmatig een Standard Operating Procedure (SOP) starten op naam. Retourneert de run-ID en de instructie van de eerste stap. Gebruik sop_list om beschikbare SOP's te bekijken."
sop_list = "Alle geladen Standard Operating Procedures (SOP's) weergeven met hun triggers, prioriteit, aantal stappen en aantal actieve runs. Optioneel filteren op naam of prioriteit."
sop_status = "SOP-uitvoeringsstatus opvragen. Geef run_id op voor een specifieke run, of sop_name om runs voor die SOP weer te geven. Zonder argumenten worden alle actieve runs getoond."
swarm = "Een zwerm agents orkestreren om gezamenlijk een taak uit te voeren. Ondersteunt sequentiële (pipeline), parallelle (fan-out/fan-in) en router (LLM-geselecteerde) strategieën."
tool_search = """Volledige schemadefinities ophalen voor uitgestelde MCP-gereedschappen zodat ze kunnen worden aangeroepen. Gebruik "select:name1,name2" voor exacte overeenkomst of trefwoorden om te zoeken."""
web_fetch = "Een webpagina ophalen en de inhoud als schone platte tekst retourneren. HTML-pagina's worden automatisch omgezet naar leesbare tekst. JSON- en platte-tekstresponses worden ongewijzigd geretourneerd. Alleen GET-verzoeken; volgt redirects. Beveiliging: alleen domeinen op de allowlist, geen lokale/privéhosts."
web_search_tool = "Het web doorzoeken naar informatie. Retourneert relevante zoekresultaten met titels, URL's en beschrijvingen. Gebruik om actuele informatie, nieuws of onderzoeksonderwerpen te vinden."
workspace = "Werkruimten voor meerdere klanten beheren. Subopdrachten: list, switch, create, info, export. Elke werkruimte biedt geïsoleerd geheugen, audit, geheimen en gereedschapsbeperkingen."
weather = "Huidige weersomstandigheden en voorspelling opvragen voor elke locatie wereldwijd. Ondersteunt plaatsnamen (in elke taal of schrift), IATA-luchthavencodes (bijv. 'AMS'), GPS-coördinaten (bijv. '52.4,4.9'), postcodes en domeingebaseerde geolocatie. Retourneert temperatuur, gevoelstemperatuur, luchtvochtigheid, windsnelheid/-richting, neerslag, zicht, luchtdruk, UV-index en bewolking. Optionele 0–3 dagenvoorspelling met uurlijkse uitsplitsing. Standaard metrische eenheden (°C, km/h, mm), maar instelbaar op imperiaal (°F, mph, inches) per verzoek. Geen API-sleutel vereist."

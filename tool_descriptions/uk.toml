# Ukrainian tool descriptions (Українські описи інструментів)
#
# Кожен ключ у секції [tools] відповідає значенню, яке повертає name() інструменту.
# Значення — це зрозумілі людині описи, що відображаються у системних промптах.
# Відсутні ключі використовують англійські описи (en.toml) як запасний варіант.

[tools]
backup = "Створення, перегляд, перевірка та відновлення резервних копій робочого простору"
browser = "Автоматизація вебу/браузера зі змінними бекендами (agent-browser, rust-native, computer_use). Підтримує дії DOM та додаткові дії на рівні ОС (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) через computer-use sidecar. Використовуйте 'snapshot' для зіставлення інтерактивних елементів із посиланнями (@e1, @e2). Примусово застосовує browser.allowed_domains для дій open."
browser_delegate = "Делегування завдань на основі браузера CLI з підтримкою браузера для взаємодії з вебзастосунками, такими як Teams, Outlook, Jira, Confluence"
browser_open = "Відкриття затвердженого HTTPS URL у системному браузері. Обмеження безпеки: лише домени зі списку дозволених, без локальних/приватних хостів, без скрейпінгу."
cloud_ops = "Консультаційний інструмент хмарної трансформації. Аналізує плани IaC, оцінює шляхи міграції, перевіряє витрати та аналізує архітектуру за стовпами Well-Architected Framework. Лише читання: не створює та не змінює хмарні ресурси."
cloud_patterns = "Бібліотека хмарних патернів. На основі опису робочого навантаження пропонує відповідні cloud-native архітектурні патерни (контейнеризація, serverless, модернізація баз даних тощо)."
composio = "Виконання дій у 1000+ застосунках через Composio (Gmail, Notion, GitHub, Slack тощо). Використовуйте action='list' для перегляду доступних дій (включно з назвами параметрів). action='execute' з action_name/tool_slug та params для запуску дії. Якщо ви не впевнені в точних параметрах, передайте 'text' з описом природною мовою (Composio визначить правильні параметри через NLP). action='list_accounts' або action='connected_accounts' для перегляду підключених облікових записів OAuth. action='connect' з app/auth_config_id для отримання URL OAuth. connected_account_id автоматично визначається, якщо не вказано."
content_search = "Пошук вмісту файлів за regex-шаблоном у робочому просторі. Підтримує ripgrep (rg) із запасним варіантом grep. Режими виводу: 'content' (відповідні рядки з контекстом), 'files_with_matches' (лише шляхи до файлів), 'count' (кількість збігів на файл). Приклад: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """Створення запланованого завдання cron (shell або agent) із розкладами cron/at/every. Використовуйте job_type='agent' з промптом для запуску AI-агента за розкладом. Для доставки результату в канал (Discord, Telegram, Slack, Mattermost, Matrix) налаштуйте delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"}. Це рекомендований інструмент для надсилання запланованих/відкладених повідомлень користувачам через канали."""
cron_list = "Перегляд усіх запланованих завдань cron"
cron_remove = "Видалення завдання cron за ID"
cron_run = "Примусовий негайний запуск завдання cron із записом історії виконання"
cron_runs = "Перегляд останньої історії виконання завдання cron"
cron_update = "Оновлення існуючого завдання cron (розклад, команда, промпт, увімкнено, доставка, модель тощо)"
data_management = "Зберігання даних робочого простору, очищення та статистика сховища"
delegate = "Делегування підзавдання спеціалізованому агенту. Використовуйте, коли: завдання виграє від іншої моделі (напр., швидке резюмування, глибоке міркування, генерація коду). Субагент за замовчуванням виконує один промпт; з agentic=true може ітерувати через відфільтрований цикл викликів інструментів."
file_edit = "Редагування файлу шляхом заміни точного збігу рядка новим вмістом"
file_read = "Читання вмісту файлу з номерами рядків. Підтримує часткове читання через offset та limit. Витягує текст із PDF; інші бінарні файли читаються з втратною конвертацією UTF-8."
file_write = "Запис вмісту у файл робочого простору"
git_operations = "Виконання структурованих операцій Git (status, diff, log, branch, commit, add, checkout, stash). Надає розпарсений JSON-вивід та інтегрується з політикою безпеки для контролю автономності."
glob_search = "Пошук файлів за glob-шаблоном у робочому просторі. Повертає відсортований список шляхів до файлів відносно кореня робочого простору. Приклади: '**/*.rs' (усі файли Rust), 'src/**/mod.rs' (усі mod.rs у src)."
google_workspace = "Взаємодія зі службами Google Workspace (Drive, Gmail, Calendar, Sheets, Docs тощо) через gws CLI. Потрібен встановлений та автентифікований gws."
hardware_board_info = "Повернення повної інформації про плату (чіп, архітектура, карта пам'яті) для підключеного обладнання. Використовуйте, коли: користувач запитує інформацію про плату, підключене обладнання, інформацію про чіп або карту пам'яті."
hardware_memory_map = "Повернення карти пам'яті (діапазони адрес Flash та RAM) для підключеного обладнання. Використовуйте, коли: користувач запитує адреси пам'яті, адресний простір або читабельні адреси. Повертає діапазони Flash/RAM із даташитів."
hardware_memory_read = "Читання фактичних значень пам'яті/регістрів з Nucleo через USB. Використовуйте, коли: користувач просить прочитати значення регістрів, прочитати пам'ять за адресою, зробити дамп пам'яті тощо. Повертає hex-дамп. Потрібен Nucleo, підключений через USB, та функція probe. Параметри: address (hex, напр. 0x20000000 для початку RAM), length (байти, за замовчуванням 128)."
http_request = "Надсилання HTTP-запитів до зовнішніх API. Підтримує методи GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS. Обмеження безпеки: лише домени зі списку дозволених, без локальних/приватних хостів, налаштовуваний тайм-аут та ліміти розміру відповіді."
image_info = "Читання метаданих файлу зображення (формат, розміри, розмір) та необов'язкове повернення даних у кодуванні base64."
jira = "Взаємодія з Jira: отримання тікетів із налаштовуваним рівнем деталізації, пошук задач за JQL та додавання коментарів із підтримкою згадок та форматування."
knowledge = "Керування графом знань архітектурних рішень, шаблонів розв'язання, засвоєних уроків та експертів. Дії: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "Керування LinkedIn: створення дописів, перегляд дописів, коментування, реакції, видалення дописів, перегляд залученості, отримання інформації профілю та читання налаштованої стратегії контенту. Потрібні облікові дані LINKEDIN_* у файлі .env."
discord_search = "Пошук в історії повідомлень Discord, збереженій у discord.db. Використовуйте для пошуку минулих повідомлень, підсумовування активності каналу або пошуку того, що казали користувачі. Підтримує пошук за ключовими словами та необов'язкові фільтри: channel_id, since, until."
memory_forget = "Видалення спогаду за ключем. Використовуйте для видалення застарілих фактів або конфіденційних даних. Повертає, чи було знайдено та видалено спогад."
memory_recall = "Пошук відповідних фактів, вподобань або контексту в довготривалій пам'яті. Повертає оцінені результати, ранжовані за релевантністю."
memory_store = "Збереження факту, вподобання або нотатки в довготривалій пам'яті. Використовуйте категорію 'core' для постійних фактів, 'daily' для нотаток сеансу, 'conversation' для контексту чату або власну назву категорії."
microsoft365 = "Інтеграція з Microsoft 365: керування поштою Outlook, повідомленнями Teams, подіями Календаря, файлами OneDrive та пошуком SharePoint через Microsoft Graph API"
model_routing_config = "Керування налаштуваннями моделі за замовчуванням, маршрутизацією провайдерів/моделей за сценарієм, правилами класифікації та профілями делегованих субагентів"
notion = "Взаємодія з Notion: запити до баз даних, читання/створення/оновлення сторінок та пошук у робочому просторі."
pdf_read = "Вилучення звичайного тексту з файлу PDF у робочому просторі. Повертає весь читабельний текст. PDF лише з зображеннями або зашифровані PDF повертають порожній результат. Потрібна build-функція 'rag-pdf'."
project_intel = "Аналітика доставки проєкту: генерація звітів про стан, виявлення ризиків, підготовка оновлень для клієнтів, підсумовування спринтів та оцінка трудовитрат. Аналітичний інструмент лише для читання."
proxy_config = "Керування налаштуваннями проксі ZeroClaw (область: environment | zeroclaw | services), включно із застосуванням до середовища виконання та процесу"
pushover = "Надсилання сповіщення Pushover на ваш пристрій. Потрібні PUSHOVER_TOKEN та PUSHOVER_USER_KEY у файлі .env."
schedule = """Керування запланованими завданнями лише для shell. Дії: create/add/once/list/get/cancel/remove/pause/resume. УВАГА: Цей інструмент створює shell-завдання, вивід яких лише записується в журнал і НЕ доставляється в жоден канал. Для надсилання запланованих повідомлень у Discord/Telegram/Slack/Matrix використовуйте інструмент cron_add з job_type='agent' та конфігурацією доставки, як-от {"mode":"announce","channel":"discord","to":"<channel_id>"}."""
screenshot = "Захоплення знімка поточного екрана. Повертає шлях до файлу та дані PNG у кодуванні base64."
security_ops = "Інструмент операцій безпеки для керованих послуг кібербезпеки. Дії: triage_alert (класифікація/пріоритизація сповіщень), run_playbook (виконання кроків реагування на інциденти), parse_vulnerability (розбір результатів сканування), generate_report (створення звітів про стан безпеки), list_playbooks (перегляд доступних плейбуків), alert_stats (підсумок метрик сповіщень)."
shell = "Виконання команди shell у каталозі робочого простору"
sop_advance = "Звіт про результат поточного кроку SOP та перехід до наступного кроку. Вкажіть run_id, чи крок був успішним або невдалим, та короткий підсумок виводу."
sop_approve = "Затвердження очікуючого кроку SOP, який чекає на схвалення оператора. Повертає інструкцію кроку для виконання. Використовуйте sop_status, щоб побачити, які запуски очікують."
sop_execute = "Ручний запуск стандартної операційної процедури (SOP) за назвою. Повертає ID запуску та інструкцію першого кроку. Використовуйте sop_list для перегляду доступних SOP."
sop_list = "Перегляд усіх завантажених стандартних операційних процедур (SOP) з їхніми тригерами, пріоритетом, кількістю кроків та кількістю активних запусків. Необов'язкове фільтрування за назвою або пріоритетом."
sop_status = "Запит стану виконання SOP. Вкажіть run_id для конкретного запуску або sop_name для переліку запусків цього SOP. Без аргументів показує всі активні запуски."
swarm = "Оркестрація рою агентів для спільного виконання завдання. Підтримує послідовну (pipeline), паралельну (fan-out/fan-in) та маршрутизаторну (LLM обирає) стратегії."
tool_search = """Отримання повних визначень схем для відкладених інструментів MCP, щоб їх можна було викликати. Використовуйте "select:name1,name2" для точного збігу або ключові слова для пошуку."""
web_fetch = "Завантаження вебсторінки та повернення її вмісту у вигляді чистого тексту. HTML-сторінки автоматично перетворюються на читабельний текст. JSON та текстові відповіді повертаються без змін. Лише GET-запити; слідує за перенаправленнями. Безпека: лише домени зі списку дозволених, без локальних/приватних хостів."
web_search_tool = "Пошук інформації в інтернеті. Повертає релевантні результати пошуку із заголовками, URL та описами. Використовуйте для пошуку актуальної інформації, новин або дослідницьких тем."
workspace = "Керування робочими просторами для кількох клієнтів. Підкоманди: list, switch, create, info, export. Кожен робочий простір забезпечує ізольовану пам'ять, аудит, секрети та обмеження інструментів."
weather = "Отримання поточних погодних умов та прогнозу для будь-якого місця у світі. Підтримує назви міст (будь-якою мовою чи письмом), коди аеропортів IATA (напр. 'KBP'), GPS-координати (напр. '50.4,30.5'), поштові індекси та геолокацію на основі домену. Повертає температуру, відчуття температури, вологість, швидкість/напрямок вітру, опади, видимість, тиск, UV-індекс та хмарність. Необов'язковий прогноз на 0–3 дні з погодинною деталізацією. За замовчуванням метричні одиниці (°C, км/год, мм), можна встановити імперські (°F, mph, дюйми) для окремого запиту. API-ключ не потрібен."

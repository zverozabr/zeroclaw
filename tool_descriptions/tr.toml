# Turkish tool descriptions (Türkçe araç açıklamaları)
#
# [tools] altındaki her anahtar, aracın name() dönüş değeriyle eşleşir.
# Değerler, sistem istemlerinde gösterilen insan tarafından okunabilir açıklamalardır.
# Eksik anahtarlar İngilizce açıklamalara (en.toml) geri döner.

[tools]
backup = "Çalışma alanı yedeklerini oluşturma, listeleme, doğrulama ve geri yükleme"
browser = "Değiştirilebilir arka uçlarla (agent-browser, rust-native, computer_use) web/tarayıcı otomasyonu. DOM eylemlerini ve computer-use yardımcısı aracılığıyla isteğe bağlı OS düzeyindeki eylemleri (mouse_move, mouse_click, mouse_drag, key_type, key_press, screen_capture) destekler. Etkileşimli öğeleri referanslara (@e1, @e2) eşlemek için 'snapshot' kullanın. open eylemleri için browser.allowed_domains zorunlu kılar."
browser_delegate = "Tarayıcı tabanlı görevleri, Teams, Outlook, Jira, Confluence gibi web uygulamalarıyla etkileşim için tarayıcı özellikli bir CLI'ye devretme"
browser_open = "Onaylanmış bir HTTPS URL'yi sistem tarayıcısında açma. Güvenlik kısıtlamaları: yalnızca izin listesindeki alan adları, yerel/özel ana bilgisayarlar yok, veri kazıma yok."
cloud_ops = "Bulut dönüşüm danışmanlık aracı. IaC planlarını analiz eder, geçiş yollarını değerlendirir, maliyetleri inceler ve mimariyi Well-Architected Framework sütunlarına göre kontrol eder. Salt okunur: bulut kaynakları oluşturmaz veya değiştirmez."
cloud_patterns = "Bulut desen kitaplığı. Bir iş yükü açıklamasına göre uygulanabilir cloud-native mimari desenleri (konteynerleştirme, serverless, veritabanı modernizasyonu vb.) önerir."
composio = "Composio aracılığıyla 1000'den fazla uygulamada eylem yürütme (Gmail, Notion, GitHub, Slack vb.). Kullanılabilir eylemleri görmek için action='list' kullanın (parametre adlarını içerir). Bir eylemi çalıştırmak için action='execute' ile action_name/tool_slug ve params kullanın. Kesin parametrelerden emin değilseniz, bunun yerine doğal dilde açıklama içeren 'text' gönderin (Composio doğru parametreleri NLP ile çözümleyecektir). OAuth bağlı hesapları listelemek için action='list_accounts' veya action='connected_accounts' kullanın. OAuth URL almak için action='connect' ile app/auth_config_id kullanın. Atlandığında connected_account_id otomatik çözümlenir."
content_search = "Çalışma alanı içinde regex deseniyle dosya içeriklerini arama. ripgrep (rg) desteği ile grep yedek seçeneği. Çıktı modları: 'content' (bağlamlı eşleşen satırlar), 'files_with_matches' (yalnızca dosya yolları), 'count' (dosya başına eşleşme sayısı). Örnek: pattern='fn main', include='*.rs', output_mode='content'."
cron_add = """cron/at/every zamanlamalarıyla planlanmış bir cron görevi (shell veya agent) oluşturma. AI ajanını zamanlamaya göre çalıştırmak için job_type='agent' ile bir prompt kullanın. Çıktıyı bir kanala (Discord, Telegram, Slack, Mattermost, Matrix) göndermek için delivery={"mode":"announce","channel":"discord","to":"<channel_id_or_chat_id>"} ayarlayın. Bu, kanallar aracılığıyla kullanıcılara planlanmış/gecikmeli mesaj göndermenin tercih edilen aracıdır."""
cron_list = "Tüm planlanmış cron görevlerini listeleme"
cron_remove = "Bir cron görevini ID'ye göre kaldırma"
cron_run = "Bir cron görevini hemen zorla çalıştırma ve çalıştırma geçmişini kaydetme"
cron_runs = "Bir cron görevinin son çalıştırma geçmişini listeleme"
cron_update = "Mevcut bir cron görevini güncelleme (zamanlama, komut, prompt, etkin, teslimat, model vb.)"
data_management = "Çalışma alanı veri saklama, temizleme ve depolama istatistikleri"
delegate = "Bir alt görevi uzmanlaşmış bir ajana devretme. Şu durumlarda kullanın: bir görev farklı bir modelden fayda sağladığında (ör. hızlı özetleme, derin muhakeme, kod üretimi). Alt ajan varsayılan olarak tek bir prompt çalıştırır; agentic=true ile filtrelenmiş bir araç çağrısı döngüsüyle iterasyon yapabilir."
file_edit = "Tam dize eşleşmesini yeni içerikle değiştirerek bir dosyayı düzenleme"
file_read = "Satır numaralarıyla dosya içeriğini okuma. offset ve limit ile kısmi okumayı destekler. PDF'den metin çıkarır; diğer ikili dosyalar kayıplı UTF-8 dönüşümüyle okunur."
file_write = "Çalışma alanındaki bir dosyaya içerik yazma"
git_operations = "Yapılandırılmış Git işlemleri gerçekleştirme (status, diff, log, branch, commit, add, checkout, stash). Ayrıştırılmış JSON çıktısı sağlar ve özerklik kontrolleri için güvenlik politikasıyla entegre olur."
glob_search = "Çalışma alanı içinde bir glob desenine uyan dosyaları arama. Çalışma alanı köküne göre sıralanmış dosya yolları listesi döndürür. Örnekler: '**/*.rs' (tüm Rust dosyaları), 'src/**/mod.rs' (src içindeki tüm mod.rs)."
google_workspace = "Google Workspace hizmetleriyle (Drive, Gmail, Calendar, Sheets, Docs vb.) gws CLI aracılığıyla etkileşim. gws'nin yüklü ve kimliği doğrulanmış olması gerekir."
hardware_board_info = "Bağlı donanım için tam kart bilgisi (çip, mimari, bellek haritası) döndürme. Şu durumlarda kullanın: kullanıcı kart bilgisi, bağlı donanım, çip bilgisi veya bellek haritası sorduğunda."
hardware_memory_map = "Bağlı donanım için bellek haritasını (Flash ve RAM adres aralıkları) döndürme. Şu durumlarda kullanın: kullanıcı bellek adresleri, adres alanı veya okunabilir adresler sorduğunda. Veri sayfalarından Flash/RAM aralıklarını döndürür."
hardware_memory_read = "USB üzerinden Nucleo'dan gerçek bellek/yazmaç değerlerini okuma. Şu durumlarda kullanın: kullanıcı yazmaç değerlerini okumak, adresten bellek okumak, bellek dökümü almak istediğinde. Hex dump döndürür. USB üzerinden bağlı Nucleo ve probe özelliği gerektirir. Parametreler: address (hex, ör. 0x20000000 RAM başlangıcı için), length (bayt, varsayılan 128)."
http_request = "Harici API'lere HTTP istekleri gönderme. GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS yöntemlerini destekler. Güvenlik kısıtlamaları: yalnızca izin listesindeki alan adları, yerel/özel ana bilgisayarlar yok, yapılandırılabilir zaman aşımı ve yanıt boyutu sınırları."
image_info = "Görüntü dosyası meta verilerini (format, boyutlar, dosya boyutu) okuma ve isteğe bağlı olarak base64 kodlanmış verileri döndürme."
jira = "Jira ile etkileşim: yapılandırılabilir ayrıntı düzeyiyle bilet alma, JQL ile sorun arama ve söz etme ile biçimlendirme desteğiyle yorum ekleme."
knowledge = "Mimari kararlar, çözüm desenleri, öğrenilen dersler ve uzmanlardan oluşan bir bilgi grafiği yönetme. Eylemler: capture, search, relate, suggest, expert_find, lessons_extract, graph_stats."
linkedin = "LinkedIn yönetimi: gönderi oluşturma, gönderileri listeleme, yorum yapma, tepki verme, gönderi silme, etkileşimi görüntüleme, profil bilgilerini alma ve yapılandırılmış içerik stratejisini okuma. .env dosyasında LINKEDIN_* kimlik bilgileri gerektirir."
discord_search = "discord.db'de depolanan Discord mesaj geçmişini arama. Geçmiş mesajları bulmak, kanal etkinliğini özetlemek veya kullanıcıların ne söylediğini aramak için kullanın. Anahtar kelime aramasını ve isteğe bağlı filtreleri destekler: channel_id, since, until."
memory_forget = "Bir anıyı anahtarına göre kaldırma. Güncelliğini yitirmiş gerçekleri veya hassas verileri silmek için kullanın. Anının bulunup kaldırılıp kaldırılmadığını döndürür."
memory_recall = "Uzun süreli bellekte ilgili gerçekleri, tercihleri veya bağlamı arama. Alaka düzeyine göre sıralanmış puanlı sonuçlar döndürür."
memory_store = "Uzun süreli belleğe bir gerçek, tercih veya not kaydetme. Kalıcı gerçekler için 'core', oturum notları için 'daily', sohbet bağlamı için 'conversation' kategorisini veya özel bir kategori adı kullanın."
microsoft365 = "Microsoft 365 entegrasyonu: Microsoft Graph API aracılığıyla Outlook postası, Teams mesajları, Takvim etkinlikleri, OneDrive dosyaları ve SharePoint aramasını yönetme"
model_routing_config = "Varsayılan model ayarlarını, senaryo tabanlı sağlayıcı/model yönlendirmelerini, sınıflandırma kurallarını ve temsilci alt ajan profillerini yönetme"
notion = "Notion ile etkileşim: veritabanlarını sorgulama, sayfaları okuma/oluşturma/güncelleme ve çalışma alanında arama."
pdf_read = "Çalışma alanındaki bir PDF dosyasından düz metin çıkarma. Tüm okunabilir metni döndürür. Yalnızca resim içeren veya şifrelenmiş PDF'ler boş sonuç döndürür. 'rag-pdf' build özelliği gerektirir."
project_intel = "Proje teslimat istihbaratı: durum raporları oluşturma, riskleri tespit etme, müşteri güncellemeleri hazırlama, sprintleri özetleme ve iş gücü tahmini. Salt okunur analiz aracı."
proxy_config = "ZeroClaw proxy ayarlarını yönetme (kapsam: environment | zeroclaw | services), çalışma zamanı ve süreç ortamı uygulaması dahil"
pushover = "Cihazınıza bir Pushover bildirimi gönderme. .env dosyasında PUSHOVER_TOKEN ve PUSHOVER_USER_KEY gerektirir."
schedule = """Yalnızca shell olan planlanmış görevleri yönetme. Eylemler: create/add/once/list/get/cancel/remove/pause/resume. UYARI: Bu araç, çıktısı yalnızca günlüğe kaydedilen ve herhangi bir kanala TESLİM EDİLMEYEN shell görevleri oluşturur. Discord/Telegram/Slack/Matrix'e planlanmış mesaj göndermek için job_type='agent' ve {"mode":"announce","channel":"discord","to":"<channel_id>"} gibi bir teslimat yapılandırmasıyla cron_add aracını kullanın."""
screenshot = "Geçerli ekranın ekran görüntüsünü alma. Dosya yolunu ve base64 kodlanmış PNG verilerini döndürür."
security_ops = "Yönetilen siber güvenlik hizmetleri için güvenlik operasyonları aracı. Eylemler: triage_alert (uyarıları sınıflandırma/önceliklendirme), run_playbook (olay müdahale adımlarını yürütme), parse_vulnerability (tarama sonuçlarını ayrıştırma), generate_report (güvenlik durum raporları oluşturma), list_playbooks (kullanılabilir playbook'ları listeleme), alert_stats (uyarı metriklerini özetleme)."
shell = "Çalışma alanı dizininde bir shell komutu yürütme"
sop_advance = "Geçerli SOP adımının sonucunu raporlama ve bir sonraki adıma ilerleme. run_id, adımın başarılı mı yoksa başarısız mı olduğunu ve kısa bir çıktı özetini sağlayın."
sop_approve = "Operatör onayı bekleyen beklemedeki bir SOP adımını onaylama. Yürütülecek adım talimatını döndürür. Hangi çalışmaların beklediğini görmek için sop_status kullanın."
sop_execute = "Bir Standart İşletim Prosedürünü (SOP) ada göre manuel olarak tetikleme. Çalıştırma ID'sini ve ilk adım talimatını döndürür. Kullanılabilir SOP'ları görmek için sop_list kullanın."
sop_list = "Tüm yüklenmiş Standart İşletim Prosedürlerini (SOP) tetikleyicileri, öncelikleri, adım sayıları ve aktif çalıştırma sayılarıyla listeleme. İsteğe bağlı olarak ada veya önceliğe göre filtreleme."
sop_status = "SOP yürütme durumunu sorgulama. Belirli bir çalıştırma için run_id veya bir SOP'un çalıştırmalarını listelemek için sop_name sağlayın. Argüman olmadan tüm aktif çalıştırmaları gösterir."
swarm = "Bir görevi işbirlikçi olarak ele almak için bir ajan sürüsünü düzenleme. Sıralı (pipeline), paralel (fan-out/fan-in) ve yönlendirici (LLM tarafından seçilen) stratejileri destekler."
tool_search = """Çağrılabilmeleri için ertelenmiş MCP araçlarının tam şema tanımlarını getirme. Tam eşleşme için "select:name1,name2" veya arama için anahtar kelimeler kullanın."""
web_fetch = "Bir web sayfasını getirme ve içeriğini temiz düz metin olarak döndürme. HTML sayfaları otomatik olarak okunabilir metne dönüştürülür. JSON ve düz metin yanıtları olduğu gibi döndürülür. Yalnızca GET istekleri; yönlendirmeleri takip eder. Güvenlik: yalnızca izin listesindeki alan adları, yerel/özel ana bilgisayarlar yok."
web_search_tool = "Web'de bilgi arama. Başlıklar, URL'ler ve açıklamalar içeren ilgili arama sonuçlarını döndürür. Güncel bilgileri, haberleri veya araştırma konularını bulmak için kullanın."
workspace = "Çok istemcili çalışma alanlarını yönetme. Alt komutlar: list, switch, create, info, export. Her çalışma alanı izole bellek, denetim, gizli anahtarlar ve araç kısıtlamaları sağlar."
weather = "Dünya genelinde herhangi bir konum için mevcut hava koşullarını ve tahminini alma. Şehir adlarını (herhangi bir dilde veya yazı sisteminde), IATA havalimanı kodlarını (ör. 'IST'), GPS koordinatlarını (ör. '41.0,29.0'), posta kodlarını ve alan adı tabanlı coğrafi konumlandırmayı destekler. Sıcaklık, hissedilen sıcaklık, nem, rüzgar hızı/yönü, yağış, görüş mesafesi, basınç, UV endeksi ve bulutluluk döndürür. İsteğe bağlı 0–3 günlük tahmin ile saatlik ayrıntı. Varsayılan metrik birimler (°C, km/h, mm), istek başına emperyal (°F, mph, inç) olarak ayarlanabilir. API anahtarı gerekmez."

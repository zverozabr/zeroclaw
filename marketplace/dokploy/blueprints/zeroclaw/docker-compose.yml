version: "3.8"
services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:0.6.4
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
      - PROVIDER=${PROVIDER:-openrouter}
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
    volumes:
      - zeroclaw-data:/zeroclaw-data
    expose:
      - 42617
volumes:
  zeroclaw-data: {}
